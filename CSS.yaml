        折り返し: | #keyword: CSS pre
            white-space: pre;
選択子 (CSS セレクター): #keyword: CSS selector
    基本:
        (div): <div>
        (.class-1): #// <div class="class-1">
            - <div class="class-1">
            - <div class="class-1 class-2">  #// 同じ CSS 属性に関しては、CSSのカスケード（優先順位）ルールに従って、class-2 が優先されます
        (#id-1): <div id="id-1">
    擬似クラス、擬似要素: #glossary: CSS  #ref: ${programming}/HTML ブラウザ/CSS.svg#pseudo_classes
        （書式）:
            - __TagName__:__Pseudo__  #// 指定した HTML タグのうち、指定の擬似クラス、擬似要素
            - :__Pseudo__  #// 全ての要素のうち、指定の擬似クラス、擬似要素
        :link:  #// 未訪問のハイパーリンク
        :visited:  #// 訪問済みのハイパーリンク
        :disabled:  #// 無効状態
        :read-only:  #// 読み取り専用。 ドロップダウンリストも
        :nth-child(odd):  #// 表の奇数行の選択子
        :first-child:  #// 複数にマッチするときの最初の要素
        :last-child:  #// 複数にマッチするときの最後の要素
        :not(:first-child):  #// 複数にマッチするときの最初以外の要素
        :before:  #// 要素の前（に要素を入れる）
        :contains("__Text__"):  #// 指定したテキストを含む要素  #未確認  #ref: https://stackoverflow.com/questions/36862270/i-need-css-selector-to-select-elements-that-contain-a-given-text
            Playwright: :text("__Text__")  #ref: https://playwright.dev/docs/other-locators#css-matching-by-text
    BEM: #keyword:  #// Block Element Modifier  #ref: https://en.bem.info/methodology/
        概要: HTML の class 属性の命名規則の1つ
        Block:
            サンプル: menu, button, error
            その他: ネストできる
                <header class="header">
                    <div class="logo"></div>
        Block ではない:
            サンプル: red
        Element, 要素:
            書式: Block__Element
            クラス名のサンプル: search-form__button
            要素のサンプル: item, text, input, content
値:
    margin, padding の 4方向:
        値が 4つの場合: 上右下左 または 12時→3時→6時→9時
        値が 2つの場合: 1番目：上下 (top, bottom), 2番目：左右 (left, right)
    CSS カラー: #keyword: CSS color
        カラー キーワード:  #// green, gray など
            一覧: #ref: https://developer.mozilla.org/en-US/docs/Web/CSS/color_value#color_keywords
