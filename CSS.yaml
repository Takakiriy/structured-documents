    項目の動的削除(Jon Miles treeview): |
        const treeNodeIds = {
            companies: 0,
            use_services: 1,
            users: 2,
            employees: 3,
            order_logs: 4,
            settlements: 5,
            logout: 6,
        };

        function modifyMenuItems() {
            let  enabledTreeNodes = {};

            enabledTreeNodes = Object.assign(enabledTreeNodes, getHashFromArray([
                'companies',
                'use_services',
                'users',
                'employees',
                'settlements',
                'logout',
            ]));

            for (const treeNodeName of Object.keys(treeNodeIds)) {
                if (!(treeNodeName in enabledTreeNodes)) {

                    removeTreeItem(treeNodeIds[treeNodeName], 1);
                }
            }
        }

        function removeTreeItem(treeNodeID, count) {

            tree.splice(treeNodeID, count);  // remove items
            keys = Object.keys(treeNodeIds)
            keys.splice(0, treeNodeID + 1)
            for (const key of keys) {

                treeNodeIds[key] -= count;
            }
        }

        function getHashFromArray(array, hashItem) {
            return array.reduce((result, item) => {
                return { ...result, [ item ] : hashItem };
            }, {});
        }

        modifyMenuItems();
