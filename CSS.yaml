CSS プロパティ:  #glossary: CSS
    animation-timing-function: #keyword: CSS animation
        CSSのイージング関数を簡単に使えるようにできる「Easing Wizard」:  #ref: https://gigazine.net/news/20251108-easing-wizard/
    font-weight: |  #keyword: CSS 太字
        font-weight: normal;
        font-weight: bold;     /* 太字 */
    margin:
        #// 外） margin - border - padding - content （内
        親要素の属性としての余白:
            div 要素を使う場合:
                React: |
                    <div style={{height: '20px'}}></div>
            gap 属性を使う場合:
    text-wrap:
        pretty:  #ref: https://gigazine.net/news/20250409-safari-better-typography-text-wrap-pretty/
    overflow-wrap:  #// 単語の途中でも折り返します
        値: [ break-word, normal, anywhere ]
        iOS 対応（2021年）:
            問題: anywhere は無視されます
            サンプル: | #ref: http://var.blog.jp/archives/75503761.html
                .anywhere {
                    overflow-wrap: break-word;
                    overflow: hidden;
                }
        参考: #ref: https://developer.mozilla.org/ja/docs/Web/CSS/overflow-wrap
    overflow-x, overflow-y:  #// ページの中の要素をスクロールします
        横スクロール:
            操作:  #// ユーザーの操作
                横スクロールは、領域の下にあるスクロールバー、またはマウスドラッグ、またはキーボードの ←, → キー で行います。
                縦スクロールは、ページのスクロールで行います。
                ズームは、ブラウザーのズーム機能で行います。
            コード:  #focus: flowchart-container, flowchart, width, height, top
                HTML: |
                    <div class="flowchart-container">
                        <div class="flowchart">
                CSS: |
                    .flowchart-container {
                        overflow-x: auto;
                        overflow-y: hidden;
                        height: 1100px;  /* コンテンツの高さ。ズームの影響を受けます */
                    }

                    .flowchart {
                        width: 2400px;   /* コンテンツのズームはここで決まります */
                        position: relative;
                        top: -400px;  /* コンテンツの上側をカットする高さ。ズームの影響を受けます */
                    }
                script: |
                    // 上に要素の定義があること。querySelector には overflow-x: auto がある div 要素を指定します。
                    <script>
                        let startX, scrollLeft;
                        const el = document.querySelector('.flowchart-container');
                        el.addEventListener('mousedown', (e) => {
                            startX = e.pageX - el.offsetLeft;
                            scrollLeft = el.scrollLeft;
                            el.classList.add('active');
                        });
                        el.addEventListener('mouseleave', () => {
                            el.classList.remove('active');
                        });
                        el.addEventListener('mouseup', () => {
                            el.classList.remove('active');
                        });
                        el.addEventListener('mousemove', (e) => {
                            if (!el.classList.contains('active')) return;
                            e.preventDefault();
                            const x = e.pageX - el.offsetLeft;
                            const walk = (x - startX) * 3; // スクロール速度を調整
                            el.scrollLeft = scrollLeft - walk;
                        });
                    </script>
    padding:
        #search: CSS margin
    text-indent:  #keyword: CSS text-indent, CSS インデント 字下げ
        HTML:
            1行目をインデントする: |
                text-indent: 1em;
            2行目以降をインデントする: |
                    padding-left: 2em;
                    text-indent: -1em;
