            Markdown のコード（空白4つ）では機能しません。
            空白 6つの Markdown を書いてください。
    text-transform:
        uppercase: 大文字にします。ただし、音声読み上げソフトでは1文字ずつ読み上げません。例 who は WHO で表示されるが who で読み上げます
    transform:  #ref: ${programming}/HTML ブラウザ/CSS.svg#transform
        makeStyles: |  #search: makeStyles
            transform: "translateY(0.4rem) rotate(90deg)",
    vertical-align: #keyword: vertical-align, HTML td valign
        baseline, top, middle, bottom
    width:
        サンプル: calc(min(100% - 8rem, 60rem));
        max-width:  #ref: ${programming}/HTML%20ブラウザ/CSS.svg#max_width
        min-width:
