<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Marmaid による図解</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: true,
      flowchart: {
        useMaxWidth: false
      }
    });
    mermaid.parseError = function(err, hash) {
        const el = document.getElementById('mermaid-error');
        if (!el) return;
        el.textContent = `Mermaid文法エラー: ${err.message}`;
        el.style.display = 'block';
    };
  </script>
<style>
  .mermaid svg {
    max-width: none !important;
    height: auto;
    transform-origin: top left;
  }
  .mermaid foreignObject div {
    white-space: nowrap !important;
  }
</style>
</head>
<body>
  <div id="mermaid-error" style="display:none; background:#fee; color:#600; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; white-space:pre-wrap;"></div>
  <div id="diagram-wrapper" style="overflow-x:auto; width:100%;"></div>
    <pre class="mermaid">

sequenceDiagram
    participant C as クライアント
    participant R as ルーター/iptables
    participant S as Squid
    participant O as 外部サービス

    C->>R: HTTPリクエスト（Squidを知らない）
    Note over R: 80番ポートを検知<br/>Squidへリダイレクト
    R->>S: 強制転送（3129番ポート）
    S->>O: リクエストを中継
    O->>S: レスポンス
    S->>C: レスポンスを返す    </pre>
  </div>
</body>
</html>
