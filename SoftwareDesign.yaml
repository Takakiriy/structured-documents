        PHP 8.0 での仕様変更:
            サンプル: |
                true ? 'true' : false ? 't' : 'f'
            PHP 8.0以降: |  #// 1つ目の : より 2つ目の ? のほうが結合が強いです。 2つ目の ? : は、1つ目が真なら評価されず、偽なら後で結合した式が評価されます
                true ? 'true' : false ? 't' : 'f'
                    ↓
