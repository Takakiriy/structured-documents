                        -   それでデプロイするプロジェクトに変更があった場合、メンテナンス後にリポジトリにフィードバックします
                theirs 差分のチェック: #keyword: Ansible theirs 差分
                    -   古い release ブランチで ansible-playbook ____ --check を実行し、監視対象のファイルに差分が無いこと
