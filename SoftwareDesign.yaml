                    lock ファイルがある場合: リポジトリに含めます
                （必要なら）:
                    一度、少し古いバージョンをインストールします:  #// バージョン指定したときの動作確認
                        バージョンを指定します
                    最新に戻します:
                テストします:
            対象環境で:
                最新をインストールします:
                    （必要なら）バージョンを指定します
                結合テストをします:
    １つだけ更新:
        構成するモジュールをすべて最新に更新するのではなく、１つだけ最新に更新すると、
        バージョンの依存関係が複雑になるため非推奨です。
    １つだけ追加:
        当時のバージョンを追加します。当時から少し新しめがよい。
        そうしないと、バージョンの依存関係が複雑になるため、それ以外の操作は非推奨です。
