    SOLID 原則: #keyword:
        #ref: Clean Architecture Book >> 第7〜11章
        Single Responsibility Principle（単一責任の原則）:
            モジュールは1つのアクターに対してのみ責任を持つべき。「変更する理由が1つだけであるべき」という言い方もします。
        Open/Closed Principle（オープン・クローズドの原則）:  #keyword: 開放/閉鎖原則
            - 既存コードを変更せずに、新しいコードを追加するだけで機能を拡張できる状態を目指す原則。
            - ファイルなどの open/close ではありません。 #search: close を確実にする手段
            - 拡張に対してオープン、修正に対してクローズドであるべき。新しい機能を追加するとき、既存のコードを変更せず追加だけで済む設計が理想。
        Liskov Substitution Principle（リスコフの置換原則）:
            派生クラスは基底クラスと置き換えられるべき。サブクラスを使っても親クラスと同じように動くべきという原則。
        Interface Segregation Principle（インターフェース分離の原則）:
            使わないメソッドへの依存を強制すべきでない。大きなインターフェースより小さく分割されたインターフェースの方がよい。
        Dependency Inversion Principle（依存関係逆転の原則）:
            上位モジュールは下位モジュールに依存すべきでない。どちらも抽象に依存すべき。
デザイン パターン:  #keyword: design pattern
    GoF: #keyword:  #ref: ${programming}/方法論/オブジェクト指向.svg#gof
        Abstract Factory パターン: #keyword:
            _: パラメーターによって異なるサブクラスのオブジェクトを生成する
                create(name)
                #ref: ${programming}/方法論/オブジェクト指向.svg#AbstractFactory
                #ref: https://xtech.nikkei.com/it/article/COLUMN/20051202/225609/
            Abstract Factory の続きの処理:  #keyword: Abstract Factory next operation,  event service privider DI
                デメリット:
                    返したオブジェクトがサービス一覧やイベント管理などの場合、
                    Abstract Factory で行う（初期化）処理の後の処理が追えなくなる。
                    なぜなら、サービス一覧はオブジェクトを渡すことしかしないため。
                対処:
                    - 返したオブジェクトのメソッドを追う
                    - （初期化）処理中に書かれているコールバックされる無名関数などを追う
            関連:
                #search: DI
                #search: Factory Method パターン
        Adapter パターン: #keyword:
            Target Interface - Adapter - Adaptee
            #ref: https://qiita.com/shoheiyokoyama/items/bd1c692db480b640c976
        Command パターン: #keyword:
            メリット:
                処理内容を抽象化して順序を制御する:
                    ただし、処理の組み替えが頻繁に起きる場合でなければメリットはほぼ無い
                キューイングや遅延実行:
                    ただし、リストに関数を入れるだけで実現できる。
                ロールバック, リトライ:
                    ただし、例外処理やロールバック関数の呼び出しやループで代替可能
                ログ・監査証跡:
                    ただし、関数内でログの出力をよびだせば十分
            デメリット:
                不要な抽象化: 処理内容を抽象化する必要がない場合、処理内容が分からなくなる
                    file.save()
                    printer.print()
                    ここでは
                        execute()
                    という抽象化を入れてもメリットがありません。
                    呼び出し側は
                        save を呼ぶ
                        print を呼ぶ
                    を普通に書けばよいからです。
            #↓ 関連
            トランザクション:  #search: transaction
            Unit of Work: #search:
        Chain of Responsibility パターン: #keyword:
            解説:  #ref: https://refactoring.guru/ja/design-patterns/chain-of-responsibility
            不要なケース:  #// 関数コールで十分なケース
                処理者が事前に決まっている
                すべての処理を必ず実行
            有用なケース:
                条件分岐が複雑
                処理者が動的に変わる
                最初にマッチしたら終了
                ハンドラーの追加頻度が高い
            関数呼び出しや Pipeline/Middleware との比較:
                普通の関数呼び出し: 決められた処理を順次実行
                Chain of Responsibility: 動的に最初に成功した処理まで実行、または、マッチした処理だけ実行
                Pipeline/Middleware: すべてのステージを通過
                #ref: ${typrm_files}/ref/SoftwareDesign/Chain_of_Responsibility_Compare.md
                #search: Middleware pattern
                    #ref: ${typrm_files}/ref/SoftwareDesign/PipelineMiddleware_pattern.html
        Facade パターン: #keyword:  #// ファサード
            概要: 大きなプログラムを使って処理を行う場合、 関係しあっているたくさんのクラスを適切に制御しなくてはいけません。
                その処理を行うための「窓口」を用意しておくと、 個別にたくさんのクラスを制御しなくても、「窓口」に対して、要求するだけですみます。
                サブシステムを１つのクラスとみなし、構成するクラスによる分類の否定に相当します。
            Facade インターフェース:
                窓口の実装はインターフェースが適しています。
                ドキュメントやコメントだけで十分なこともよくあります。
            注意: #search: 過剰設計
                Facade は構造体ではなく、オリジナルの computed プロパティ（getter＋メモ化）にすること。そうしないとデータのソースがどこにあるのかかなり分かりにくくなります。
                追加の情報が欲しいときに、Facade も変更しなければならなくなってしまいます。
            Clean Archtecture:  #search: The Clean Archtecture Facade
            Wikipadiaより:  #ref: https://ja.wikipedia.org/wiki/Facade_パターン
                - Facadeクラスはあくまでサブシステム内部に仕事を投げるだけで複雑な実装は持たない。
                - Facadeパターンはサブシステムの直接使用を妨げない。
            サンプル:
                コンパイラー = 字句解析器, 構文解析器, ... の Facade  #ref: https://ja.wikipedia.org/wiki/Facade_パターン
        Factory Method パターン: #keyword:
            _: 関連するオブジェクトを生成するメソッド
                #ref: ${programming}/方法論/オブジェクト指向.svg#FactoryMethod
                #ref: https://xtech.nikkei.com/it/article/COLUMN/20051202/225609/
            メリット: 関連するクラスが一覧できる。関連を持ったオブジェクトを返せる
            関連するオブジェクトを生成する:
                ClassA.createB()
            関連するオブジェクト一式を生成する:
                ClassA.createObjects()
            関連:
                #search: Abstract Factory パターン
