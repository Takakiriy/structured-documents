    PublicError: #keyword: PublicError
        概要:
            - 見せる相手（ロール）ごとに エラー メッセージ の内容を変えられる PublicError 例外
            - 見せる媒体（チャンネル）ごとに、表示（取得）するメッセージをフィルタリングします。
                たとえば、サポートチーム用メッセージは、開発チームの媒体（ログ）にも出力しますが、顧客の媒体には表示しません
        Python: |
            from django.utils.translation import gettext
            from typing import List

            class PublicError(Exception):
                def __init__(self, *, for_customer: str = "", for_support: str = "", for_developer = ""):
                    self.for_customer = for_customer
                    self.for_support = for_support
                    self.for_developer = for_developer

                @property
                def message_to_customer_channel(self) -> str:
                    return (PublicError).collect_message([self.for_customer])

                @property
                def message_to_support_channel(self) -> str:
                    return (PublicError).collect_message([self.for_customer, self.for_support])

                @property
                def message_to_developer_channel(self) -> str:
                    return (PublicError).collect_message([self.for_customer, self.for_support, self.for_developer])

                @staticmethod
                def collect_message(messages: List[str]) -> str:
                    message = '; '.join(x for x in messages if x)
                    if message.strip() == "":
                        message = "Error occurred."
                    return gettext(message)
