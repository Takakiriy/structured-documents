            C言語:
                _:
                    C の時代は「定数かどうか」が言語機能として保証されていなかったので、命名で区別する必要がありました。
                    それが Java → JavaScript → TypeScript と引き継がれてきた慣習です。
                    TypeScript では const や as const が型レベルで不変性を保証するので、命名で強調する意味は薄いです。
                サンプル: |
                    #define MAX_SIZE 100  // プリプロセッサで置換される「本物の定数」
                    int maxSize = 100;    // 変数（再代入できる）
                スコープ派: |
                    const MAX_RETRY_COUNT = 3;  // グローバルな設定値という意図を示したい
                    function fetchData() {
                        const retryCount = 0;   // ローカルな変数
                    }
