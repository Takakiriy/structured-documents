            Go: #ref: ${programming}/プログラミング言語、環境/go_language.svg#import_cycle_not_allowed
            Python: #search: Python 相互 import
            Swift:
                弱参照: |  #keyword: weak reference
                    weak var documentBrowserViewController: UIDocumentBrowserViewController?
