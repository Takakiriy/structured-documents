#keyword: SoftwareDesign.yaml, 設計, Software
アーキテクチャー:  #keyword:
    MVC: #keyword: MVC,  model view controller
        Model: データ、ビジネス ロジック
        View: 状態（値）を持つ。ほとんどはライブラリが提供
        Controller: マウス位置からUI部品へのイベント伝達
        実装: Win32 API, MFCより前?
        参考: https://ja.wikipedia.org/wiki/Model_View_Controller
        関連: #search: Swift MVC
    データ型の位置づけ:
        Model のデータ型と View のデータ型は MVC とは別に存在します。
        そのデータ型とは、int string などの基本型、バイナリ型、画像型、音声型など。
        列挙型も Model と View の両方で共有する場合は MVC とは別の場所に定義します。
    Document-View:
        概要: MVC の View と Controller を分けないアーキテクチャー。 Django の views
        参考: https://ja.wikipedia.org/wiki/Model_View_Controller
    Presentation Model パターン:
        Model: データ
        View: MVVM と同じだが、XAMLに未対応
        Presentation Model: ModelView と同じ
        参考: #ref: https://ja.wikipedia.org/wiki/Model_View_ViewModel
    MVVM: #keyword:
        Model: データ
        View: 状態（値）は持たない。ModelView から渡される。ほとんどはライブラリが提供。ModelView へ delegate する
            ViewはViewModelを参照し、ViewModelの状態変更を監視します
            ViewModelが更新されると、Viewは自動的に更新されます
            ユーザーの入力はViewで受け取り、ViewModelに委譲（delegate）されます
            ViewModelはModelとの通信を担当し、ビジネスロジックを処理します
            #keyword: MVVM delegate
        ModelView: イベントの応答。View と Model の伝達
        実装: WPF, Vue.js, AngilarJS
        参考: #ref: https://ja.wikipedia.org/wiki/Model_View_ViewModel
    ドメイン駆動設計, DDD: #keyword:
        概要:
            ドメインの専門家からの入力に従ってドメインに一致するようにソフトウェアをモデル化。
            ローンの申し込みを処理するソフトウェアには、LoanApplication や Customerなどのクラスと、
            AcceptOffer や Withdraw どのメソッドが含まれる。
        用語, ユビキタス言語:  #keyword:
            ドメイン駆動設計において、コードにドメインの用語を使用することは非常に重要です。
            これは「ユビキタス言語（Ubiquitous Language）」と呼ばれる概念の中心的な部分です。
        偶発的複雑性: #keyword: 偶発的複雑性,  Accidental Complexity
            - 問題そのものの本質的な難しさではなく、私たちが選んだ解決手段や道具、プロセスによって生じる複雑さのこと
            - フレッド・ブルックス（Fred Brooks）が1986年の論文「No Silver Bullet」で提唱した概念で、本質的複雑性（Essential Complexity）と対比されます。
        レイヤード アーキテクチャ:
            UserInterface: プレゼンテーション層 = クライアントとの入出力をする層
            Application: ビジネスロジック層 = ユースケースの実現をする層
            Domain: ビジネスロジック層 = ルールや制約などのドメイン知識の実現をする層
            Infrastructure: データアクセス層 = データベースとの入出力をする層
            #ref: https://zenn.dev/ayumukob/articles/ff183004d09ede
        Domain:
            他の層に依存させないこと, Isolating the Domain: #keyword: Isolating the Domain,  Domain 依存関係
                参考:
                    - the domain model layer should not take a dependency on any other layer
                        #ref: https://learn.microsoft.com/en-us/dotnet/architecture/microservices/microservice-ddd-cqrs-patterns/ddd-oriented-microservice
                    - Isolating the Domain  #// 見出し
                        #ref: https://www.barnesandnoble.com/w/domain-driven-design-eric-evans/1125702453  >> Table of Contents >> Show More
                    - all approaches are fine as long as they maintain the isolation of the domain layer, allowing domain objects to be designed without simultaneously thinking about the user interface that might interact with them.
                        #ref: https://www.goodreads.com/work/quotes/173058-domain-driven-design-tackling-complexity-in-the-heart-of-software
                手段:
                    ロジックの途中にある Infra（ファイル アクセス など）は、インターフェースや引数に渡す関数にします
                反論:
                    Domain は Infra に依存してはいけないという原則より、現実のコードが循環せず動く: #keyword: DDD import type
                        #// 原則は守られている。単純な変換コードを省略できる。getter で対応できる。制限するときは Go のような同ファイル内インターフェース（または関数渡し。その移植のコツ）
                        #// 実質依存している
                        TypeScript:
                            - Domain に書く import は import type にする  #search: import type
                        Python:
                            - Domain に書く import は TYPE_CHECKING のときだけにする  #search: TYPE_CHECKING
                        #ref: https://claude.ai/chat/9fc31a40-6db2-4101-84d7-5d07dfbad0cd
        依存性逆転の原則, 依存性逆転の法則, DIP: #keyword: DDD 依存性逆転の原則
            逆転: 通常、通常、高レベルのモジュール（ビジネスロジックなど）は、
                低レベルのモジュール（データアクセスロジック、ユーティリティ、ライブラリなど）に依存します。
                それを逆転させます
            方針: クラスの詳細がインターフェイスに依存すべきである  #// ただし不要なインターフェースが多い
            #search: The Clean Archtecture 依存性逆転の原則
        enum と変換層:
            変換層は早すぎる:
                _: 将来の変更可能性だけを理由に最初から、ドメインのコードの enum と YAML のコードの enum を分けて、変換層を入れる必要はありません。
                悪い例:
                    domain/member_status.py: |
                        from enum import Enum

                        class Status(Enum):
                            ACTIVE = "ACTIVE"
                            INACTIVE = "INACTIVE"
                    infrastructure/yaml_loader.py: |
                        def to_status(value: str) -> Status:
                            mapping = {
                                "active": Status.ACTIVE,
                                "inactive": Status.INACTIVE,
                            }
                            try:
                                return mapping[value]
                            except KeyError:
                                raise ValueError(f"Invalid status: {value}")
                良い例:
                    domain/member_status.py: |
                        from enum import Enum

                        class MemberStatus(Enum):
                            ACTIVE = "active"
                            SUSPENDED = "suspended"
                    infrastructure/yaml_loader.py: |
                        import yaml
                        from domain.member_status import MemberStatus

                        def load_member_status(yaml_text: str) -> MemberStatus:
                            data = yaml.safe_load(yaml_text)
                            return MemberStatus(data["member"]["status"])
        参考:
            書籍, Domain-Driven Design (Eric Evans):  #// Tackling Complexity in the Heart of Software by Eric Evans
    クリーン アーキテクチャー: #keyword: The Clean Architecture
        概要:
            ビジネス ロジック を中心に書き、インフラの実装に依存させないインターフェースを挟む
            クリーンとは、依存関係、ビジネス ロジック、関心事 が重要でないもの（技術的な詳細）に汚されていない状態
            問題点も多い
        構成, 依存関係ルール, The Dependency Rule:
            （最重要ルール）: 外側→内側の依存関係ルール。内側の円にあるものは、外側の円にあるものについて一切知ることはできません。
            中心, Enterprise Business Rule:  #// 他の構成要素に依存しない（import しない）
                Entities:
            その外1, Application Business Rule:
                Use Cases:
            その外2, Interface Adapter:
                Controllers:  #// 外部からの入力（HTTPリクエスト、フォームデータなど）を、Use Case が理解できる形式（Input DTO）に変換します。
                Gateways:  #// sUse Case が定義したインターフェースを実装し、DBやAPIなどの外部リソースへのアクセスを抽象化します
                Presenters:  #// Use Case の出力（Output DTO）を、View やクライアントが必要とする形式（ViewModel, JSON など）に変換します。表示ロジックはここに集まります。
            その外3, Framework:
                Web:
                UI:
                DB:
                Devices:
                External Interfaces:
        境界を越える, Crossing boundaries:
            図: #ref: https://blog.cleancoder.com/uncle-bob/images/2012-08-13-the-clean-architecture/CleanArchitecture.jpg
            - 制御は、コントローラー（入力）で始まり、ユースケース（処理）を通過し、最終的にプレゼンター（出力）で実行されます  #// 図のピンクの線
            - 依存関係は、コントローラー → ユースケース ← プレゼンター  #// 、プレゼンターからユースケースの関係が制御と依存関係で逆になっている
            - インターフェース（Output Port）だけを知っている
                #// こうすることで、ビジネス ロジック（Use Case）をUIやフレームワークの変更から守ります
            - インターフェースのメソッドの引数にあるデータは、ビジネス ロジック のみ
        実装方法:
            第11章 依存性逆転の原則:  #keyword: The Clean Archtecture 依存性逆転の原則
                ポイント:  #search: Clean Architecture Book
                    - 具象に依存するべきではない
                    - 安定した抽象インターフェース
                補足:
                    import type で十分:
                        相互依存できる
            第22章 クリーンアーキテクチャ >> 依存性のルール:
            第23章 プレゼンターと Humble Object:
                #// 書きかけ
        通信クライアント:  #// インフラ層
            スレッドセーフかどうか:
                適切にロックすれば安全なものはスレッドセーフではない
            マルチスレッドかどうか:
                注意: 自分でスレッドを生成しなくても、フレームワーク側でスレッドを生成している可能性があります
                Django REST Framework: Gunicorn などの Web サーバーの設定次第です
                Gnicorn:
                    引数指定の場合:
                        gunicorn --workers=4 --threads=2 myapp.wsgi
                    ファイル指定の場合:
                        コマンド:
                            gunicorn -c /etc/gunicorn_conf.py
                        gunicorn_conf.py:
                            workers = 1
                            threads = 2
            トランザクション:
                スレッドセーフによってオブジェクトの内部状態は壊れませんが、
                データの整合性は別途ユーザーが必ず保証する必要があります
            接続状態:
                常にオブジェクトを持っていても、接続は自動的に切れて、再接続もできます
            オブジェクトの配置: |
                |                | スレッドセーフ              | スレッドセーフでない Session        |
                |----------------|-----------------------------|-------------------------------------|
                | オブジェクト   | Singleton                   | 関数ローカル や Factory など        |
                | インスタンス数 | アプリ全体で1つ             | スレッド数分                        |
                | 理由           | 内部で安全に管理されている  | 競合を避けるためスレッドごとに分離  |
            早すぎる Factory 化を避ける:
                インスタンスがリードオンリーの場合:
                    singleton で配置して、ユーザーは直接参照することができます
                クラスや関数をグローバルに配置する場合:
                    ラッパーが create 関数だけの場合:  #// これでもスレッドごとに分離できます
                        ① 関数内（メソッド内）で create 関数を呼び出して with を書く:
                    ラッパーがクラスの場合:
                        ① 関数内（メソッド内）で create 関数を呼び出して try/finally を書く:
                        ② 関数内（メソッド内）で create 関数を呼び出して with を書く:
                            コンテキスト マネージャ プロトコル への対応が必要
                    #↓ 参考
                    close を確実にする手段: | #keyword:
                        | 仕組み             | 言語          | 自動か       |
                        |--------------------|---------------|--------------|
                        | closeメソッド      | 多くの言語    | ❌ 手動     |
                        | try/finally        | 多くの言語    | ⚠️ 半自動   |
                        | with / using       | Python, C#    | ✅ 自動     |
                        | defer              | Go            | ✅ 自動     |
                        | RAII               | C++           | ✅ 自動     |
                        | スマートポインタ   | C++           | ✅ 自動     |
                インスタンスをグローバルに配置する場合:
                    ⓪ singleton を直接持つ:  #// 危険
                    ① ラッパークラスで保護する:  #// Web サーバーではマルチスレッドになっているものが多いです
                        スレッドが変わっていないことをチェックします
                    ② Factory パターンで生成を抽象化する:
                        スレッドローカル: スレッドが生成されて get すると生成され、スレッドが削除されるとオブジェクトも削除されます
                        コネクション プール: 最大スレッド数と合わせる必要があります
        問題点:
            複雑:  #ref: https://x.com/ts_neko/status/2037733678496067751
                #ref: クリーン アーキテクチャー p255
            「安定した抽象インターフェース」は存在しない:
                インフラの変更より ビジネス ロジック のほうが変化が激しいので、インターフェースと具象の両方を変えるケースが多発する
                関数化するだけでインターフェースは存在する。著者が言う安定を持っている
                    データベースゲートウェイ
                Java の interface を書くことだけではない。
                    日本語で言うと何と言うか知っていますか？馬鹿の一つ覚えです。
            守る方法:
                直接呼び出さないように CI test で守らせる。大規模開発でも同じ。
                インターフェースを作ったところで直接呼び出しから守られるわけではない。動的にする必要性がない
            独自インターフェース仕様に依存してしまう:
                各種言語の抽象化ライブラリの挑戦
            早すぎる抽象化:  #search: DDD import type
