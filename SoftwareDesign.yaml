    疎結合, 独立性: #keyword: 疎結合, 独立性 モジュール化 モジュール性 高凝集 凝集性 カプセル化 分離
        制御の抽象化
    過度な抽象化, 早すぎる抽象化: #keyword: Over-abstraction,  Over-engineering,  Premature Abstraction,  オーバー エンジニアリング,  過度な抽象化, 早すぎる抽象化, 過剰な抽象化, 行き過ぎた抽象化, 野心的
        #// 将来を見越して抽象的なモジュールを開発したけど、いざその時になったら使い物にならなかった
        _: 実際に共通化ができるまでは、公式化しないでください。
        #ref: ${typrm_files}/ref/SoftwareDesign-AI.yaml#label: Over-abstraction
        3回ルール: #keyword: rule of three,  3回ルール  #ref: https://en.wikipedia.org/wiki/Rule_of_three_(computer_programming)
            _: 類似コードの2つのインスタンスはリファクタリングを必要としないが、類似したコードが3回使われた場合は新しい手続きに抽出すべき
                DRY 原則 よりも YAGNI 原則（You Aren't Gonna Need It）を優先
        YAGNI 原則: #keyword:  #ref: https://ja.wikipedia.org/wiki/YAGNI
            実際に必要となるまで機能を追加しない方が良い
        1回しか参照されない変数:  #// かつ、値に対する属性情報が付加されていない、かつ、説明変数ではない
    リーキー抽象: #keyword: Leaky Abstraction, リーキー抽象
        #ref: https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/
        #ref: https://en.wikipedia.org/wiki/Leaky_abstraction
        抽象化は便利だが、実装を理解しないといけない場面が来る:  #// 避けられない現実
            反論:  #// 避けられない現実ではない
                「実装を理解しないといけない場面が来る」ことは、名前に実装を漏らす理由にならない
                「実装を理解しないといけない場面が来る」は事実としてあり得る。
                しかしその場面では、開発者は名前ではなく実装のコードやドキュメントを直接見る。
                名前を見る場面と実装を見る場面は別々に存在しており、混在させる必要がない。
                したがって「実装を理解しないといけない場面が来る」ことは、名前に実装を漏らす理由にはならない。
                名前は常に意図だけを表せばよく、実装を理解しないといけない場面への対処は、実装を直接見ることで行われる。
                unlink はその典型的な失敗例である。ファイルを削除したい場面では unlink という名前は不要な知識を要求し、
                実際にハードリンクの仕組みを理解しないといけない場面が来たとしても、
                開発者はソースコードやOSのドキュメントを直接参照するのであって、名前から得られる情報に頼るわけではない。
                #search: POSIX unlink
            抽象化への支持:  #ref: https://www.cs.cornell.edu/courses/cs211/2006sp/Lectures/L08-Abstraction/08_abstraction.html
                抽象化はクライアントとインプリメンターという二つの役割を作り出す。
                The interface creates a contract between the client and the implementer.
                クライアントは実装がどのように動いているかを理解しなくても関数を呼び出せる。
                もし問題が起きた場合、インターフェースの存在により「クライアントがインターフェースを誤って使っているのか、
                インプリメンターが実装を誤っているのか」のどちらかに責任を切り分けることができ、
                どちらかのコードを修正すればよいことが明確になる
