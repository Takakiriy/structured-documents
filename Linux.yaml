            概要:
                状況:
                    たとえば、var="2" のとき、 Func 1 $var 3 と呼び出すと 1, 2, 3 が渡されます。
                    undef var のとき、 Func 1 $var 3 と呼び出すと 1, 3 が渡されます。これが「値を渡さない」です。
                    var="2 5" のとき、 Func 1 "$var" 3 と呼び出すと 1, 2 5, 3 が渡されます。これが「空白を含む値を渡す」です。
                    「値を渡さない」と「空白を含む値を渡す」の両方に対応するには、
                    Func 1 $var 3 と Func 1 "$var" 3 の違いに対応しなければなりません。
