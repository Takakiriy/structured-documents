                            docker logs fluentd-fluentd-1
                                [error]: config error file="/fluentd/etc/fluent.conf" error_class=Fluent::ConfigError error="out_file: `/fluentd/log/fluent.log.20241107_**.log` is not writable"
                        対処:
                            chmod 777 ./log    #// コンテナ―内の /fluentd/log に対応するホスト内のフォルダー
                    - #// no patterns matched tag
