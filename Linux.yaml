    stress: #keyword: Linux stress, 負荷試験, CPU 負荷
        インストール:
            CentOS7:
                sudo yum install epel-release -y
                sudo yum install stress -y
                stress --version
                stress --help
        CPU の負荷を高めます:
            stress  --cpu 1  --timeout 20  #// 1つのスレッドを 20秒間だけ動かし続けます
        メモリーの空き容量を減らします:
            stress -m 1 --vm-bytes 200M  #// プロセスを起動し、そのプロセスが 200MB 使います
    disown:  #// https://qiita.com/inosy22/items/341cfc589494b8211844#実行中のジョブをログアウト時もバックグラウンド実行する
    優先度: #keyword: Linux CPU resource priority  #// プロセスの優先度の変更
        実行するコマンド:
            nice コマンド:  #// プロセスの優先度を指定してコマンドを実行します
                書式:
                    nice -n __LowPriorityValue__  __Command__
                __LowPriorityValue__:  #// 利用可能な CPU リソースが枯渇した場合にのみ効果があります
                    19: 最も低い優先度
                    ...: 
                    -20: 最も高い優先度
                サンプル:  #// 最も低い優先度でファイルを圧縮します
                    -   nice -n 19 gzip largefile.txt
                    -   nice -n -10 wall <<__HERE_DOCUMENT__
                        System shutdown in 2 minutes!
                        __HERE_DOCUMENT__
                子プロセス:
                    -   優先度は子プロセスにも孫プロセスにも引き継がれます
                    -   上昇させるには root 権限が必要です
                    -   nice sh -c top と起動した場合
                        -   nice が起動するのは /bin/sh で、この sh の nice 値は 30
                        -   /bin/sh が子プロセスとして /usr/bin/top を起動するが（nice から見て top は孫プロセス）その top も nice 値 30
                    #ref: https://ja.stackoverflow.com/questions/88448/niceとioniceは併用できるのか
                #ref: https://www.ibm.com/docs/ja/aix/7.1.0?topic=n-nice-command
            ionice コマンド:  #// I/O アクセス の優先度を指定してコマンドを実行します。アクセスするスケジュールを調整します
                サンプル:
                    sudo ionice -c 3 nice -n 19 dd if=/dev/xvdc of=/dev/null bs=1M
                #ref: https://www.slideshare.net/slideshow/ionice/38682400
        systemd のサービス:
            unit ファイル: #keyword:  #// 優先度に関する設定を試すときは、Drop-in ディレクトリ に設定を書くとよいです
                サンプル: |
                    /etc/systemd/system/httpd.service.d/cpu.conf  #search: systemd drop-in directory
                        [Service]
                        CPUQuota=50%
                    sudo systemctl daemon-reload
                    sudo systemctl restart httpd.service
                    systemctl cat httpd.service  #// または systemctl show httpd.service
                CPUQuota: | #keyword: systemd CPUQuota  #// 使える最大の CPU 使用率
                    [Service]
                    CPUQuota=20%
                CPUShares: |  #// 他のサービスと比較する優先度
                        [Service]
                        CPUShares=1500
                    #// CPU時間の割合は、そのサービスのCPUShares値 ÷ 全アクティブサービスのCPUShares合計値
                    #// CPU使用率が100%未満の場合: CPUSharesは効果を持ちません。各サービスは必要なだけCPUを使用できます。
                CPUAffinity:  #// 特定のCPUコアに固定
                MemoryLimit:
                BlockIOWeight:
                #ref: https://docs.redhat.com/ja/documentation/red_hat_enterprise_linux/7/html/resource_management_guide/sec-modifying_unit_files
            systemd-run コマンド:
                サンプル:
                    systemd-run --scope -p CPUQuota=50% gzip largefile.txt
                CPUQuota:
                    50% など
                    200% は、2つの CPU コア 100% 
                    利用可能な CPU 時間合計に対してサービスが受け取る CPU 時間の最大比率
                CPUWeight:
                    1～10,000。デフォルトは 100。
                    200 は 他の全サービスと比べて 2 倍の CPU を割り当てます
                    利用可能な CPU リソースが枯渇した場合にのみ適用されます。
                #ref: https://docs.redhat.com/ja/documentation/red_hat_enterprise_linux/8/html/managing_monitoring_and_updating_the_kernel/ref_cpu-time-allocation-policy-options-with-systemd_assembly_configuring-resource-management-using-systemd_managing-monitoring-and-updating-the-kernel
