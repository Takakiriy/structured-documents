ユーザーとパーミッション:
    概念:
        ファイルの属性:
            パーミッション:  #serach: chmod
            オーナー:  #search: chown
        ファイルシステム: #keyword: Linux file system
            手順 >> 仮想ハードディスクの物理容量を増やします:  #search: increase VirtualBox VHDD size
            コマンド: #keyword: Linux file system commands  #glossary: Linux
                df:
                    入力: df -h /path/to/your/file
                    出力:
                        Linux 一般: |
                            Filesystem      Size  Used Avail Use% Mounted on
                            /dev/sda1        40G   36G  5.0G  88% /
                        Vagrant 共有フォルダー: |
                            Filesystem      Size  Used Avail Use% Mounted on
                            vagrant         476G  414G   63G  87% /vagrant
                chmod:
                    Windows との共有フォルダー判定: #search: Linux Windows shared file
                growpart:  #// 既存パーティションの末尾をディスクいっぱいまで広げます。ファイルシステムの拡張はしません
                    #ref: https://manual.sakura.ad.jp/cloud/storage/modifydisk/resize-partition.html#growpart
                    トラブルシューティング:
                        NOCHANGE: #keyword: growpart NOCHANGE
                            手順: growpart コマンド
                            ログ: |
                                NOCHANGE: partition 4 could only be grown by 3 [fudge=2048]
                            対処:
                                NOCHANGE から始まる場合:
                                    無視できます。拡張余地がなかっただけ
                xfs: #keyword: XFS commands  #glossary: XFS  #// XFS ファイル システム に関するコマンド
                    mkfs.xfs:
                    xfs_growfs:
                LVM のコマンド: #keyword: LVM commands,  LVM  #// Logical Volume Manager
                    構造:  #search: Linux storage partitions
                    メリット:  #ref: ${typrm_files}/ref/VMWare-AI.yaml#label: LVM merit
                    インストール:
                        sudo yum install -y  lvm2
                    物理ボリューム(PV):  #glossary: LVM
                        pvs:
                        pvdisplay:
                        pvcreate:
                        pvresize:
                        pvremove:
                    ボリューム グループ (VG):  #glossary: LVM
                        vgcreate:
                        vgextend:
                        vgremove:
                    論理ボリューム(LV):  #glossary: LVM
                        lvs:
                        lvdisplay:
                        lvcreate:
                            lvcreate -l 100%FREE -n [LV名] [VG名]
                        lvextend:
                        lvremove:
            構成:
                ディスクの構造: #keyword: Linux storage partitions
                    ボリュームを扱わない場合:  #// VirtualBox を使うときは通常こちらで十分です
                        - パーティション >> ファイル システム(xfs, ext4 など) >> mount
                    ボリュームを扱う場合:
                        - パーティション >> 物理ボリューム (LVM PV) >> ボリューム グループ (LVM VG) >> 論理ボリューム (LVM LV) >> ファイル システム(xfs, ext4 など) >> mount
                    LVM を使っているか調べます:
                        インストール:
                            sudo yum install -y  lvm2
                        表示:
                            pvs
                                #// sda2 が表示されたら LVM あり
                ディスクのフォーマット:
                    ディスクの構造:  #search: Linux storage partitions
                    XFS:
                        コマンド:  #search: XFS command
                    ext4:
        シェルのユーザー:
            シェルのユーザーを変更します:  #serach: Linux su
            コマンドを実行するユーザーを変更します:  #serach: sudo
        ユーザー: #keyword: Linux user,  Linux users
            root ユーザーと標準ユーザー:  #keyword: Linux root user, Linux standard user
            追加, 全般の設定: #search: create Linux user
                useradd:  #search: Linux useradd  #// ID を指定する場合
                adduser:  #search: Linux adduser
                Ansible:  #ref: #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/multi_vm_ansible/branch_zabbix/playbook.yml#Set new zabbix HOME folder path
            削除: #search: userdel,  delete Linux user
            ユーザー名: #search: $USER
            一覧: #keyword: list Linux user
                cat /etc/passwd
            表示: #keyword: read Linux user
                grep $USER /etc/passwd
            ID: #search: UID,  Linux id
            パスワード: #keyword: Linux password
                （親）パスワード:  #search: password
                設定:  #search: Linux passwd
                変更:  #search: chpasswd  #// Linux ユーザーのパスワードを設定します
                入力しないで済むようにします: eval `ssh-agent` && ssh-add ~/.ssh/sub_id_rsa  #search: ssh-agent
                対応方針:  #search: client password
                スクリプト:  #search: bash .env  #// パスワードの入力が必要なコマンドを実行するスクリプトを作る上での注意
                ロック: sudo cat /etc/shadow  #search: /etc/shadow password
                ファイル:  #// /etc/passwd と /etc/shadow  #glossary: Linux
                    /etc/passwd: #// 誰でもアクセスでき、/etc/shadow があるときは、パスワード以外のユーザーの情報だけあります
                    /etc/shadow: #// root ユーザーだけアクセスでき、パスワードのハッシュやステータスなどの情報があります
                        #↓ 第nフィールド
                        1: ユーザ名
                        2: #// パスワード  #keyword: /etc/shadow password
                            ハッシュ: |
                                ログインするときに使われるパスワードのハッシュ
                            (*): | #keyword: disabled Linux password  #// 無効
                                * のときは、パスワードが設定されていません。root 経由や SSH キー などによる認証はできるかもしれません。
                                root 以外からログインしようとするとパスワードが要求されますが、パスワードによるログインはできません。
                            (!!): |  #// ロック
                                !! のときは、パスワードによる認証がロックされています。SH キー などによる認証はできるかもしれません
                        3: パスワードを最後に変更した日
                        4: 変更可能最短期間
                        5: 未変更可能最長期間
                        6: 未変更時警告日
                        7: ログインしない場合に無効になる日数
                        8: アカウントが失効になるまでの日数
                        9: フラグ
            所属関係: #search: Linux group users
            ホーム フォルダー:  #search: Linux HOME folder,  ホーム ディレクトリ
            ルート フォルダー:  #search: Linux chroot,  ルート ディレクトリ
            シェル: #keyword: Linux user shell  #// ログインしたときのシェル
                表示:  #search: read Linux user
                設定:
                    関連 >> ユーザー関連の設定:  #search: create Linux user
                    コマンド:  #search: usermod shell
                    Ansible:  #search: ansible user
        グループ: #keyword: Linux group
            認可条件: #keyword: file permission denied,  フォルダー グループ アクセス権  #// Permission Denied にならない条件
                - ファイルやフォルダーの所有権を持っているグループが、ユーザーが所属している１つ以上のグループの中にあること
                - 行おうとしている操作に対応する rwx (Read Write Execute) のビットが立っていること
            追加:  #search: groupadd
            一覧:  #search: getent group,  cat /etc/group,  list Linux group
            GID:  #search: read Linux group
            削除:  #search: groupdel
            wheel: #keyword: Linux wheel user
                ルートのようなアクセス権を持つグループ。sudo をよく使う標準ユーザーが所属することがある。
                #ref: https://unix.stackexchange.com/questions/1262/where-did-the-wheel-group-get-its-name
            所属関係: #keyword: Linux group users  #search: gpasswd
                追加:
                    #search: create gpasswd
                    #search: usermod -aG
                削除: #search: delete gpasswd
                一覧:
                    （ユーザーが所属する）グループ一覧: #keyword: Linux groups
                        #// 以下のいずれか
                        - groups $USER
                        - groups __UserName__
                    （グループに所属する）ユーザーの一覧:
                        /etc/group: #keyword:
                            コマンド: cat /etc/group
                            出力書式: __GroupName__:x:__User1__:__User2__...
                        getent: getent group __GroupName__  #search: getent group
            ID:    #search: Linux id g_option
            パスワード:
                設定: #search: Linux group password
                削除: #search: delete Linux group password
    コマンド:  #glossary: Linux
        adduser:  #// 一般ユーザーを追加します
            書式:
                adduser __AccountName__
                #// passwd コマンドも実行してください
            useradd コマンドとの比較:
                adduser  |  useradd
                -------- | -------------------
                CLI 向き | スクリプト向き
                対話可能 | UID, GID 指定可能
        chmod:  #keyword: chmod, permission, パーミッション
            ファイルの属性を変えます:  #// 書き込み属性や実行属性をオンまたはオフにします
                一般的な属性:
                    ファイル:   644
                    フォルダー: 755    #// 実行属性が無ければ、フォルダー内のファイルに read/write アクセスもできません
                    実行ファイル: 755
                    秘密のファイル: 600  #keyword: chmod 600  #// 特定のサーバーの特定の Linux ユーザー にログインできる人だけがアクセスできます
                        #// 自アカウントと root のみリードとライトができます
                実行できるようにします: #keyword: Linux 実行属性,  Linux 実行可能モード 実行権限 実行モード  #ref: https://ja.wikipedia.org/wiki/Chmod
                    Linux: chmod +x __Path__
                        #// 実行属性を設定しないで実行しようとすると Permission denied エラーになります  #keyword: Permission denied
                        #// chmod +x で実行属性をオンにすると実行できるようになります
                    Git:  #// Linux ファイルの実行属性も Git リポジトリに記録されます。
                        ただし core.fileMode が true であること
                        #search: git diff mode
                    Windows:
                        ファイルの先頭行（シェバン）に下記があると実行モードがオンになります
                            #!/bin/sh
                        #search: bash shebang
                    サンプル: #search: disable git commit
                    #ref: https://ja.wikipedia.org/wiki/Chmod
                    #ref: https://en.wikipedia.org/wiki/Chmod
                読み取り専用にします: #keyword: Linux read only
                    Linux の 1つのファイル:
                        chmod 444 __Path__
                    フォルダーの中の全ファイル:  #// フォルダーの中の全ファイルを読み取り専用にします
                        find __FolderPath__ -type f  | xargs chmod 444
                    所有者以外は書き込みできないようにします(Linux):
                        chmod 755 __Path__
                    Windows との共有フォルダー内: #keyword: Linux Windows shared file read only
                        モードを変えます:
                            - chmod 444 __Path__   #// 結果は 444 または 555 になります。
                                #// この方法で Windows と共有しているファイルであるかどうかを判定できません
                                #// 直後は 444 です。sleep 1s の後なら 555 です。ただし環境によるかもしれません。
                                #search: Linux file system
                            - chmod 555 __Path__
                            #// chmod -w __Path__ は失敗します
                            #// chmod +w __Path__ は成功します
                        制限:  #search: Linux Windows shared file limit
                全員が読み書きできるようにします:  chmod 777 __Path__
                全員に実行権限を追加します:  chmod a+x __Path__
            フォルダーのモードを変えます:
                リードオンリーにします:
                    フォルダーの中のすべてのファイルの書き込みモードをオフにします:
                        find __FolderPath__ -type f  |  xargs -I{} chmod a-w "{}"
            a+x のバリエーション:  #// モードを変える
                +x: ユーザーに +x
                u+x: ユーザーに +x
                g+x: グループに +x
                o+x: その他に +x
                a+x: ユーザーとグループとその他に +x
                ug+x: ユーザーとグループに +x
            親子関係:
                親フォルダーが拒否していてもファイルが許可されていたら許可になります:
            関連:
                権限を数字で参照します:  #search: Linux stat
                ファイル システム:  #search: Linux file system
                新規ファイルのパーミッション:  #search: umask
        umask:  #// 新規ファイルのパーミッション
        cat /etc/group:
        chown:  #// ファイルの所有者を変えます
            手順:
                ファイルの所有者とグループを変えます: sudo chown  __User__:__Group__  __FilePath__
                フォルダーの所有者とグループを変えます: sudo chown -hR  __User__:__Group__  __FolderPath__  #keyword: chown -hR  #// サブフォルダーも変えます
                ファイルの所有者を変えます: chown  __User__  __FilePath__  #// 通常、所有者だけ変えることはなく、グループも変えます
                サンプル: |
                    $ ls -l file
                    -rw-r--r-- 1 root root 0 May 10 06:46 file

                    $ sudo chown user1:user1 file
                    $ ls -l file
                    -rw-r--r-- 1 user1 user1 0 May 10 06:46 file
                -h: シンボリックリンクのリンク先を対象外にします
                -R: 指定したフォルダーとその中のフォルダーやファイルに対して処理します
                -v: 処理の詳細を表示します
            機能, 動作:
                root ユーザーが vi で編集したとき: #keyword: chown vi  #// 所有者が変更されるかどうか
                    既存ファイル: 変わりません  #// 既存のファイルの所有者とグループから変わりません。root に変わることはありません
                    新規ファイル: root  #// ファイルの所有者とグループは root になります
                    （vi以外）: 不明  #// 内部で削除と新規作成をするときなど、root に変わってしまう場合があります
            参考: https://webkaru.net/linux/chown-command/
        chpasswd:  #// Linux ユーザーのパスワードを設定します
            echo  "__UserName__:__Password__"  |  chpasswd
        chroot:  #// サブフォルダーを指定したユーザーの ルート フォルダー に設定します
            chroot  --userspec=__User__:__Group__  "__RootFolderPath__"  "__CommandAndParameters__"
        getent:
            group,  cat /etc/group:  #keyword: getent group,  /etc/group
                #// getent group と cat /etc/group は同じ出力です
                一覧: #keyword: list Linux group
                    サンプル: |
                        $ getent group
                        root:x:0:
                        bin:x:1:
                        daemon:x:2:
                    出力の書式:
                        __GroupName__:x:__GID__:__UsersCSV__
                GID: #keyword: read Linux group
                    コマンド:  #// 以下のいずれか
                        - getent group __GroupName__
                    出力:
                        - __GroupName__:__Password__:__GID__
                        - __GroupName__:__Password__:__GID__:__UsersCSV__
                    サンプル: |
                        $ getent group daemon
                        daemon:x:2:
                #// 関連  #search: Linux group
        getfacl:  #ref: https://atmarkit.itmedia.co.jp/ait/articles/1808/17/news026.html
        gpasswd:  #// ユーザーとグループの関係
            所属関係:
                追加: #keyword: create gpasswd
                    コマンド:
                        sudo gpasswd --add __UserName__  __GroupName__
                        #// すでに関係があるときは、出力が同じですが、何もしません
                削除: #keyword: delete gpasswd
                    sudo gpasswd --delete __UserName__  __GroupName__ 
            グループのパスワード:
                設定: #keyword: Linux group password
                    sudo gpasswd  __GroupName__
                削除: #keyword: delete Linux group password
                    sudo gpasswd  --delete-password  __GroupName__
            参考: #ref: https://atmarkit.itmedia.co.jp/ait/articles/1612/12/news016.html
            関連:  #search: Linux group
        groupadd: #keyword: create Linux group  #// グループを新規作成します
            基本: sudo groupadd __NewGroupName__
                #ref: https://atmarkit.itmedia.co.jp/ait/articles/1811/15/news025.html
            GID 指定: sudo groupadd __NewGroupName__  --gid __NewGID__
            #// 関連  #search: Linux group
        groupdel: #keyword: delete Linux group
            #// 関連  #search: Linux group
        groupmod: #keyword: update Linux group
            グループ ID を変更します:
                groupmod -g  __NewGroupID__  __GroupName__
        id コマンド:  #keyword: Linux id
            概要:
                UID, GID: #keyword:  #// user ID, group ID
                    UID: $UID,  myID=$(id -u)
                    GID: $GID ではない,  $(id -g)
                    #search: Linux user  #search: Linux group
                主な番号:
                    0: root
                    1000: 初めて作ったユーザーの UID および GID
            #↓取得するもの
            UID:GID: #keyword: read UID:GID  #// ユーザーID:グループID
                現在のプロセス:
                    echo $(id -u):$(id -g)
                ファイルやフォルダー: #keyword: file folder UID:GID
                    - ls -l  __ParentFolderPath__  #// 所有権を持つユーザー名とグループ名を表示します
                ユーザーの属性:
                    - id -u  __UserName__  #// UID を表示します
                    - id -g  __UserName__  #// primary の GID を表示します
            UID: #keyword:  #// ユーザーID
                現在のプロセス:
                    - id -u
                    #// または
                    - id -u  $USER
                ユーザー名 → UID: |
                    id -u  __UserName__
            GID: #keyword:  #// グループID
                現在のプロセス: #keyword: Linux id g_option  #// primary の GID
                    id -g
                ユーザー名 → GID:  #// primary の GID
                    id -g  __UserName__
                グループ名 → GID: |
                    -   $ getent group  __GroupName__
                        __GroupName__:x:__GID__:__UserNamesCSV__
                    #// または
                    -   $ getent group  __GroupName__  |  cut -d: -f3
                        __GID__
            ユーザー名:
                現在のプロセス:
                    - $USER  #keyword: $USER
                    #// または
                    - id -un
                UID → ユーザー名: |  #focus: __UserName__
                    -   $ getent passwd  __UID__
                        __UserName__:__UID__:__GID__:__UserFullName__:__HomeFolderPath__:__LogInShell__
                    #// または
                    -   $ getent passwd  __UID__  |  cut -d: -f1
            グループ名:
                現在のプロセス:  #// 現在のプロセスのユーザーが所属する１つ以上のグループ
                    プライマリ グループ の名前:
                        id -gn
                    所属する全グループの名前:
                        id -Gn
                        #// 空白区切り。最初のグループ名は プライマリ グループ
                GID → グループ名: |  #focus: __GroupName__
                    -   $ getent group  __GID__
                        __GroupName__:x:__GID__:__UserNamesCSV__
                    #// または
                    -   $ getent group  __GID__  |  cut -d: -f1
                        __GroupName__
        useradd:  #// ユーザーを新規作成します
            コマンド: sudo useradd __UserName__
            UID を指定する場合:
                - sudo useradd __UserName__  --uid __UID__
                - sudo useradd __UserName__  -u __UID__
            その他オプション: -c "__UserFullName__"
            サンプル: #keyword: user2
                #// Ubuntu 20.04
                - sudo useradd user2  --home /home/user2  --shell /bin/bash   #// ユーザーを新規作成します
                - sudo passwd user2  #// パスワードを設定します（Enter を押した後で入力します）
                - sudo mkdir -p /home/user2
                - sudo chown  -hR  user2:user2  /home/user2 
                - su user2  #// user2 に変わります
                #// /home/user2 を作らなかった場合
                - export PS1='user2 $ '  #// プロンプトを見やすくします。 '\u:\w $ ' に設定してもユーザー名などには置き換わりません
            参考: #ref: https://qiita.com/LostEnryu/items/c21ac157908dd5f09c83#useradd
            関連 >> ホーム フォルダー を変更します:  #search: usermod home
        userdel:  #// ユーザーを削除します
            コマンド: sudo userdel -r __UserName__
            -r オプション: ユーザーの ホーム ディレクトリ も削除します
            参考: #ref: https://qiita.com/LostEnryu/items/c21ac157908dd5f09c83#userdel
        newgr:  #// グループにログインします。グループを一時的に切り替えます
            newgr __GroupName__
            __Command__
            exit
        passwd:  #// 既定の Linux ユーザーのパスワードを設定します
            コマンド: passwd __UserName__
            関連:  #search: Linux password
        setfacl:  #// ACL を設定します  #ref: https://atmarkit.itmedia.co.jp/ait/articles/1808/23/news026.html
            #search: getfacl
        stat: #keyword: Linux stat  #// ファイルの属性
            ファイル サイズ: #keyword: Linux file size
                コマンド: |
                    stat --format=%s "__FilePath__"
                7z の中のファイルサイズ:  #search: 7-Zip file size
            権限を数字で参照します:  #ref: https://unix.stackexchange.com/questions/46915/get-the-chmod-numerical-value-for-a-file
                Git bash, CentOS7:
                    stat --format '%a' __FilePath__  #// 777
        su:  #keyword: su  #// ログインします。またはユーザーを変えて実行します
            注意: #keyword: disabled root
                - Ubuntu では root ユーザー にログインできないようになっています  #ref: https://gihyo.jp/admin/serial/01/ubuntu-recipe/0410  >>  UID=0
                - 有効にすることもできるようです。 上記 URL  >> rootアカウントを有効にする
            ログインします:
                一般ユーザーから root ユーザーにログインします:
                    コマンド:
                        su --login
                    短縮形のコマンド:  #keyword: su - root
                        su -
                    sudo を使う場合:  #keyword: sudo su  #// su - や su - root で入れないときはこれ
                        sudo su
                root ユーザーから一般ユーザーにログインします:
                    su  __UserName__  #// --login オプションを指定すると ~/.bashrc をロードしません
                一般ユーザーから root ユーザーを経由して別のユーザーにログインします:  #keyword: su user via root,  su --login
                    #// root ユーザーを経由します
                    su --login
                    su --login  __UserName__
                    #search: disabled root
                一般ユーザーから別の一般ユーザーにログインします:
                    コマンド:
                        su --login __UserName__
                    短縮形のコマンド:
                        su - __UserName__
                ログインできないユーザーになります:
                    ログインできないユーザーであることを確認します:
                        下記のように user:/nonexistent:/sbin/nologin が表示されたらログインできません:
                            $ cat /etc/passwd | grep __UserName__
                            __UserName__:x:996:991:__UserName__ user:/nonexistent:/sbin/nologin
                                #// どちらかの __UserName__ は __GroupName__ かも
