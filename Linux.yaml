        readlink:  #keyword:
            シンボリックリンクのリンク先を調べます:  #search: Linux full path
                $ readlink -f __SourcePath__
                __DestinationPath__
            フルパスに変換します: #keyword: Linux full path
                基本:
                    $ readlink -f __RelativePath__
                    __FullPath__
                互換性:
                    存在しない場合:  #// __RelativePath__ にファイルまたはフォルダーが存在しない場合
                        CentOS7:  #// 出力あり
                            $ readlink -f __NotFoundRelativePath__
                            __FullPath__
                        Ubuntu 20.04, macOS13:  #// 出力なし
                            $ readlink -f __NotFoundRelativePath__
                    ファイルの親:  #// __FilePath__/..
                        Ubuntu 20.04:  #// 出力なし
                            $ readlink -f __FilePath__/..
                        参考:  #search: bashlib GetFullPath
        シンボリックリンクのリンク先を調べます:  #// 相対パスからフルパスを調べることもできます
            $ readlink -f __SourcePath__
            __DestinationPath__
        シンボリック リンク かどうかを表示します:
            書式: |
                [[ -L "sub" ]]; echo $?  #// 0 (true), 1 (false)
            ファイルが シンボリック リンク のフォルダーの中にあるかどうかを調べます:  #keyword: in link,  linux bash file folder directory path is in symbolic link
                フルパスの場合:
                    _path=__FileFullPath__;  echo "$_path";  _link=$(readlink -f "$_path");  echo "$_link";  if [[ "$_path" == "$_link" ]];  then echo "not in link";  else echo "in link";  fi;  unset _path;  unset _link
                    #// __FileFullPath__ の先頭に $HOME の代わりとなる ~ を含めることもできます
                    #// Windows の Git Bash でも同じコマンドです
                相対パスの場合: |
                    __FileFullPath__: "$(pwd)/__FileRelativePath__"
                mac の場合:
                    _path=__FileFullPath__;  echo "$_path";  _link=$(python -c "import os,sys;print(os.path.realpath('$_path'))");  echo "$_link";  if [[ "$_path" == "$_link" ]];  then echo "not in link";  else echo "in link";  fi;  unset _path;  unset _link
            ファイルがリンク先に含まれている シンボリック リンク フォルダー を一覧します:  #keyword: link references,  list up references of linux bash file folder directory symbolic link
                #// 下記「出力例」を参考
                ケースの例:
                    - ./main/a.txt
                    - ./sub1 -> ./main
                    - ./sub2 -> ./other
                    - ./sub3 -> ./main
                    - ./a.txt -> ./main/a.txt
                上記ケースを作るコマンド:  #// Windows Git bash の場合の ln コマンドは #search: Windows ln
                    mkdir -p main  &&  echo a > main/a.txt
                    ln -sf  ./main  ./sub1
                    ln -sf  ./other ./sub2
                    ln -sf  ./main  ./sub3
                    ln -sf  ./main/a.txt  ./a.txt
                    ls -l
                入力例: #// リンクによって複数のパスにある1つのファイルのうち、どれか1つのパス
                    $(pwd)/main/a.txt
                出力例:  #// $(pwd)/main/a.txt は、シンボリックリンクによって ./sub1/a.txt と ./sub3/a.txt と ./a.txt にもあるという意味です
                    ./sub1 -> ./main (/__FullPath__/main)
                    ./sub3 -> ./main (/__FullPath__/main)
                    ./a.txt -> ./main/a.txt (/__FullPath__/main/a.txt)
                入力するコマンド:
                    準備:
                        シンボリック リンク の一覧を一時ファイル _links.txt に保存します:  #// grep -v /node_modules/ | は必要な場合のみ
                            find "." -type l -ls | grep -v /node_modules/ | awk '{print $11,$12,$13}' | tee ~/_links.txt
                        リンク先のファイルのパスを環境変数 _path に設定します:  #// __FullPath__ の例 $(pwd)/main/a.txt
                            #// 「_full_path.txt ファイルに書きます」の間違い？
                            echo "__FullPath__" > ~/_full_path.txt;  cat ~/_full_path.txt
                        for 文の区切りを改行に設定します:
                            IFS=$'\n'
                    メイン:
                        for  line  in $(cat ~/_links.txt); do
                            readlink -f ${line%% *} | xargs -i  grep {}  ~/_full_path.txt > /dev/null && echo "${line%% *} -> ${line##* } ($(readlink -f ${line%% *}))"
                        done
                    後始末:
                        unset IFS
                        rm ~/_full_path.txt
                        rm ~/_links.txt
            調査記録: |
                mkdir -p ~/_tmp  &&  cd  ~/_tmp
                mkdir -p "sub"

                ln -sf  "./sub"  "./sub2"
                echo 'a' > "sub/a.txt"
                cat "sub2/a.txt"  #// a
                [[ -f "sub"  ]]; echo $?  #// 1 (false)
                [[ -d "sub"  ]]; echo $?  #// 0 (true)
                [[ -L "sub"  ]]; echo $?  #// 1 (false)
                [[ -f "sub2" ]]; echo $?  #// 1 (false)
                [[ -d "sub2" ]]; echo $?  #// 0 (true)
                [[ -L "sub2" ]]; echo $?  #// 0 (true)
                [[ -f "sub2/a.txt" ]]; echo $?  #// 0 (true)
                [[ -d "sub2/a.txt" ]]; echo $?  #// 1 (false)
                [[ -L "sub2/a.txt" ]]; echo $?  #// 1 (false)

                _path="$(pwd)/sub2/a.txt";  echo "$_path";  readlink -f "$_path";  unset _path
                    #//  /home/user1/_tmp/sub2/a.txt
                    #//  /home/user1/_tmp/sub/a.txt
                readlink    "sub";        echo $?  #// 1 (error)
                readlink    "sub2";       echo $?  #// ./sub  0 (no error)
                readlink -f "sub2";       echo $?  #// /home/user1/_tmp/sub  0 (no error)
                readlink    "sub2/a.txt"; echo $?  #// 1 (error)
                readlink -f "sub2/a.txt"; echo $?  #// /home/user1/_tmp/sub/a.txt  0 (no error)
                #// cd ~;  rm -rf ~/_tmp
            参考:
                シンボリックリンクで共有されています…を正しく調べる方法: #ref: https://qiita.com/Takakiri/items/eb757eb11cdd6f8303d0
            関連: #search: symbolic link
