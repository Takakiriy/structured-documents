                            -   mkdir -p  "folderB"
                                cp -ap  "folderA"  "folderB"  #// WSL2 Ubuntu 20.04
                            #// -r オプションを指定しなくても サブ フォルダー もコピーします。直下の隠しファイルもコピーします
