                __User__@__Host__ 形式の場合:
                    - ssh-agent で指定したもの  #search: ssh-agent
                    - ~/.ssh/config の HostName にマッチする設定の IdentityFile の値  #search: ~/.ssh/config
                    - ~/.ssh/id_rsa  または  ~/.ssh/id_ecdsa  または  ~/.ssh/id_ed25519
