                            ./pack/sub/

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude '*.txt'
                            ./pack/
                            ./pack/sub/

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude "sub/example.txt"
                            ./pack/
                            ./pack/example.txt
                            ./pack/example_a.txt
                            ./pack/sub/
                            ./pack/sub/example_a.txt

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude "pack/sub"
                            ./pack/
                            ./pack/example.txt
                            ./pack/example_a.txt

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude "example.txt"  --exclude "sub"
                            ./pack/
                            ./pack/example_a.txt
                転送用に暗号化: #search: delayed scp
            .zip:  #search: Linux zip
