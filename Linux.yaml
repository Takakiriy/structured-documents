                Failed at step NAMESPACE spawning /bin/kill:; No such file or directory: #keyword: systemd NAMESPACE /bin/kill /tmp
                    手順: systemctl restart __Service__   #// /tmp を削除した後に再起動
                    ログ: |
                        Sep 20 10:00:00 server1.net systemd[1]: Reloading service1.
                        Sep 20 10:00:00 server1.net systemd[3948174]: service1.service: Failed to set up mount namespacing: No such file or directory
                        Sep 20 10:00:00 server1.net systemd[3948174]: service1.service: Failed at step NAMESPACE spawning /bin/kill: No such file or directory
                        Sep 20 10:00:00 server1.net systemd[1]: service1.service: Control process exited, code=exited status=226
                    対処:
                        最近 /tmp を削除して、unit ファイルの内容の一部が以下の編集前の場合、編集します:
                            編集前:  #focus: PrivateTmp, ExecReload, ReloadSignal, ExecStop, KillSignal
                                ExecReload=/bin/kill -s HUP $MAINPID
                                ExecStop=/bin/kill -s TERM $MAINPID
                                PrivateTmp=true
                            編集後: |  #// kill コマンドを使わず、systemd からシグナルを発信します
                                ReloadSignal=HUP       #// systemd 253 or later  #ref: https://www.freedesktop.org/software/systemd/man/latest/systemd.service.html
                                KillSignal=TERM
                                PrivateTmp=true
                    補足:
                        ExecStart に gunicorn が書かれている場合、gunicorn は HUP/TERM シグナルを適切に処理できるため、この方法で正常に動作します。
                        PrivateTmp=true によりマウント名前空間を作成する際、ExecReload で指定された /bin/kill の実行時に問題が発生していました。
                        /bin/kill 自体は存在していましたが、名前空間のセットアップ処理の中で正常に実行できない状態でした。
