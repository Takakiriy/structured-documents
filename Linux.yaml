                            #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/sub_tasks/add_path_in_unit_file.yml
            操作コマンド:
                CentOS7:
                    #search: systemctl
                Ubuntu-20.04, CentOS6: #keyword: Ubuntu systemd
                    #search: service コマンド
            参考:
                systemd.unit: #// https://www.freedesktop.org/software/systemd/man/systemd.unit.html
                systemdの*.serviceファイルの書き方: #// https://qiita.com/masami256/items/ef0f23125cf8255e4857
            トラブルシューティング:
                ExecStart を置き換えます: #keyword: debug systemd ExecStart,  _ExecStart
                    (__User__@): |  #focus: _ExecStart,  __ServiceName__,  __User__
                        cd  $HOME
                        touch  _ExecStart
                        chmod +x  _ExecStart
                        chown __User__:__User__  _ExecStart
                    (root@): |
                        vi  /usr/lib/systemd/system/__ServiceName__.service
                            # ExecStart=/opt/__ServiceName__  __Parameters__
                            ExecStart=/bin/bash /home/__User__/_ExecStart
                    (__User__@)2: |
                        vi  _ExecStart
                            /opt/__ServiceName__  __Parameters__
