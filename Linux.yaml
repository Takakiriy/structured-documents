    dig コマンド: #keyword: dig  #// DNS に問い合わせます。サーバー名 ⇒ IPアドレス。ドメイン情報の手探りツール
        インストール:
            CentOS7: sudo yum install -y  bind-utils
            Alpine Linux: apk add  bind-tools
        #↓ 手順
        基本:
            名前 → IP アドレス:  dig  __ServerName__
            名前 → IP アドレス 簡易表示:  dig +short __ServerName__
            DNS サーバー指定: #keyword: dig connect at DNS
                dig @__DNS_IP_Address__  __ServerName__
        レコード別:
            A レコードを問い合わせます:
                書式: dig +short  @__DNS_ServerNameOrIPAddress__  -p __DNS_ServerPortNum__  __ServerNameToLookUp__
                出力例 >> +short オプションあり: |
                    127.0.0.1
                出力例 >> +short オプションなし: |  #// __ServerNameToLookUp__ = ecb7bb10b937.node.consul の場合
                    ;; QUESTION SECTION:
                    ;ecb7bb10b937.node.consul.      IN      A

                    ;; ANSWER SECTION: 🌟
                    ecb7bb10b937.node.consul. 0     IN      A       127.0.0.1

                    ;; ADDITIONAL SECTION:
                    ecb7bb10b937.node.consul. 0     IN      TXT     "consul-network-segment="
                サンプル実行:  #search: install Consul
                参考:
                    - #ref: ${programming}/ネットワーク・セキュリティ/TCP／IP/TCP_IP.svg#dig
                    - https://atmarkit.itmedia.co.jp/fnetwork/dnstips/012.html
            SRV レコードを問い合わせます:  #keyword: dig SRV
                書式: dig +short  @__DNS_ServerNameOrIPAddress__  -p __DNS_ServerPortNum__  __ServerNameToLookUp__  SRV
                出力例 >> +short オプションあり: |
                    1 1 80 ce3cbf7a181c.node.dc1.consul.
                出力例 >> +short オプションなし: |  #// __ServerNameToLookUp__ = web.service.consul の場合
                    ;; QUESTION SECTION:
                    ;web.service.consul.            IN      SRV

                    ;; ANSWER SECTION: 🌟
                    web.service.consul.     0       IN      SRV     1 1 80 ce3cbf7a181c.node.dc1.consul.

                    ;; ADDITIONAL SECTION:
                    ce3cbf7a181c.node.dc1.consul. 0 IN      A       127.0.0.1
                    ce3cbf7a181c.node.dc1.consul. 0 IN      TXT     "consul-network-segment="
                サンプル実行:  #search: install Consul
        接続先別:
            インターネット:  #// インターネットの先の接続先
                インターネットにアクセスできれば、dig コマンドは使えます
            LAN 内 DNS:
                DNS サーバー指定  #search: dig connect at DNS
            VirtualBox:  #// VirtualBox の ホスト オンリー ネットワーク の中にある接続先
                #search: VirtualBox dig 
        関連:  #search: BIND
    ip コマンド:  #keyword: ip, Linux ip addr, Linux ip address, Linux ifconfig
        参考: #ref: https://www.atmarkit.co.jp/ait/articles/1709/22/news019.html
        関連 >> シェルがあるホストの IP アドレス:  #search: hostname -I
        ip addr:  #// ip address show の省略形です
        ip address show:  #// ネットワーク アダプター の名前や IP アドレスを一覧表示します
        ip address show dev __NetworkDevice__ :  #// 指定した ネットワーク アダプター の IP アドレスを表示します
            IP アドレスだけ表示します:  #// 下記は eth1 の場合
                ip address show dev eth1 | grep eth1 | grep -o -E 'inet [0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' | sed 's/inet //'
        ip address add __CIDR__ dev __NetworkDevice__ : #keyword: ip address add  #// 指定した ネットワーク アダプター に IP アドレスを追加します
            追加します:
                ip address add 192.168.34.229 dev eth1
                ip addr add でもよい
            追加したときの状態表示: | #keyword: global secondary IP address  #focus: scope global secondary eth1
                $ ip addr
                ...
                3: eth1: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc pfifo_fast state UP group default qlen 1000
                    link/ether 08:00:27:7b:73:10 brd ff:ff:ff:ff:ff:ff
                    inet 192.168.34.52/24 brd 192.168.34.255 scope global noprefixroute eth1
                    valid_lft forever preferred_lft forever
                    inet 192.168.34.152/24 scope global secondary eth1
                    valid_lft forever preferred_lft forever
            IP アドレス を持つホストを変える場合: #keyword: move Linux IP address
                del → add の順番に実行するほうが良いです。
                ただし、その IP アドレス をリモートシェルの接続に使っていないこと。
        ip address del __CIDR__ dev __NetworkDevice__ : #keyword: ip address del  #// 指定した ネットワーク アダプター の IP アドレスを削除します
            基本:
                ip address add 192.168.34.229 dev eth1
                ip addr del でもよい
            IP アドレス を持つホストを変える場合:  #search: move Linux IP address
        ip route :  #// IP アドレスとルーティングを表示します  #keyword: Linux ip route
            短いコマンド名: ip r  #// パラメーター不要
            サンプル実行結果:  #// サブネットワークと自分の IP アドレスを表示します
                $ ip route show
                    default via 172.29.160.1 dev eth0
                    172.29.160.0/20 dev eth0 proto kernel scope link src 172.29.173.111
            上記結果の 1行目の補足:
                dev __Adapter__: イーサネット アダプター名
            上記結果の 2行目の補足:
                172.29.160.0/20: 応答する範囲？
                172.29.173.111: マシーンの IP アドレス
                dev __Adapter__: イーサネット アダプター名
                proto kernel: カーネルが自動生成した経路
                scope:
                    scope link: LAN へ unicast/broadcast
                    scope host: 自分自身へ
                    scope global: ゲートウェイ経由へ
                    (scope なし): scope global と同じ
                src ___.___.___.___: 送信先？
            テーブルを指定:
                コマンド: ip route show table __TableName__  #// デフォルトの __TableName__ は main
                local: カーネルによって管理されているテーブル（の詳細）
        ip route show:  #search: Linux ip route
    dhclient コマンド:  #// DHCP から渡される IP アドレスを取り直します
        #// 解放して確保します
        sudo dhclient -r __NIC__
        sudo dhclient __NIC__
    nmcli:  #keyword:
        nmcli device: #keyword:  #// イーサネット アダプター を一覧します
            実行例:
