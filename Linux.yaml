        エラー: |
            __CallerScriptFile__: line __Num__: __CalleeScriptFile__: Permission denied
        対処:
            呼び出す シェル スクリプト を Windows と共有していないフォルダーに移動します
    - #// substring expression < 0  #keyword:
        手順: ${__Variable__:0:-1}
        エラー: |
            substring expression < 0
        補足:
            mac でのみ発生するようです
        対処:
            ${__Variable__:0:${#__Variable__}-1}
    - #// rm: cannot remove ‘__FilePath__’: Operation not permitted
        手順: rm -rf __FolderPath__
        エラー: | #keyword: operation not permitted
            rm: cannot remove ‘__FilePath__’: Operation not permitted
        対処:
            #ref: ${GitHub}/locommit/test/test-locommit#function  DeleteFolder
        原因:
            - Vagrant + CentOS7 環境で Windows との共有フォルダーで read only のファイルがあると rm で失敗します。 #search: Linux read only behavior
            - フォルダーに chmod 777（read only 外し）しても一部のファイルは read only のままです。  #search: Linux read only
            - もう一度 chmod 777 しても read only のままです。
            - rm して read only ではない多くのファイルは削除されます。また、もう一度 chmod 777 すると read only が外れます。
            - 最後にもう一度 rm したらフォルダーを削除できます
    - #// zsh: operation not permitted
        手順: ./__Script__
        エラー: |
            zsh: operation not permitted: ./__Script__
        状況:
            Apple 検疫拡張属性がある:
                ls -l で　-rtxr-xr-x の右に @ が付いている: |
                    % ls -l
                    -rtxr-xr-x@ 1 user1 group1  111 Jan 1 00:00 __Script__
                Apple 検疫拡張属性の内容を表示します: |
                    % xattr -l "patch-o"
                    com.apple.quarantine: 0086;640ab724;Microsoft Remote Desktop;
        対処A:
            Apple 検疫拡張属性の com.apple.quarantine を削除します: |
                % xattr -d com.apple.quarantine  "patch-o"
            #ref: https://www.alansiu.net/2021/08/19/troubleshooting-zsh-operation-not-permitted/
        対処B:  #// 非推奨
            mac >> 設定 >> プライバシーとセキュリティ >> フルディスクアクセス
    - #// useradd: cannot create directory
        手順: sudo yum install -y go-agent
        エラー: |  #// ユーザー作成ステップのみがSELinuxによってブロックされます
            useradd: cannot create directory /var/go
            error: %pre(go-agent-22.3.0-15301.noarch) scriptlet failed, exit status 12
            Error in PREIN scriptlet in rpm package go-agent-22.3.0-15301.noarch
        対処:
            sudo setenforce 0
            sudo yum install -y go-agent
            sudo setenforce 1
        #ref: https://github.com/gocd/gocd/issues/4011
    - #// E: Failed to fetch http://security.ubuntu.com/ubuntu/pool/main/o/____.deb  404  Not Found [IP: ____]
        #keyword: apt-get failed to fetch
        手順: sudo apt-get install
        エラー: |
            E: Failed to fetch http://security.ubuntu.com/ubuntu/pool/main/o/____.deb  404  Not Found [IP: ____]
        対処:
            sudo apt update
        参考:
            openjdk-11-jre-headless amd64 11.0.16+8-0ubuntu1~20.04 404 Not Found:
                #ref: https://askubuntu.com/questions/1385440/ubuntu-sudo-apt-get-update-404-not-found-problem
    - #// line 1: version: command not found
        手順: CentOS7 で実行ファイルを起動したとき
        エラー: |
            line 1: version: command not found
        対処:
            実行ファイルのファイルサイズが小さい場合:
                Git LFS の大きいファイルをダウンロードできるようにします
    - #// /bin/bash^M: bad interpreter: No such file or directory
        手順: スクリプトを起動したとき
        エラー: |
            /bin/bash^M: bad interpreter: No such file or directory
        対処:
            起動するスクリプトの改行コードを CR+LF から LF に変更してください
            #search: CRLF
    - #// WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!  #keyword: WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!
        手順: 新しい VM に対して SSH 接続
        エラー: |
            WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!
        対処:
            SSH クライアントの ~/.ssh/known_hosts の中にある古いサーバー（ポート）の行を削除します。
        原因:
            前回接続したサーバーとは異なるサーバーです。
            SSH サーバー をインストールしなおしたときにも発生します。この場合、警告は無視できます。
            そうでなければ、中間者攻撃によって別のサーバーに接続された可能性があります。
    - #// WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!
        手順: ssh-copy-id  -i ~/.ssh/id_rsa.pub  __User__@__TargetHost__
        エラー: |
            ERROR: @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
            ERROR: @    WARNING: REMOTE HOST IDENTIFICATION HAS CHANGED!     @
            ERROR: @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
            ERROR: IT IS POSSIBLE THAT SOMEONE IS DOING SOMETHING NASTY!
            ERROR: Someone could be eavesdropping on you right now (man-in-the-middle attack)!
            ERROR: It is also possible that a host key has just been changed.
            ERROR: The fingerprint for the RSA key sent by the remote host is
            ERROR: SHA256:i+KUvA4nxL5mexAMafwfY7TvDgG7cCiiUUm4B9by7II.
            ERROR: Please contact your system administrator.
            ERROR: Add correct host key in /c/Users/user1/.ssh/known_hosts to get rid of this message.
            ERROR: Offending RSA key in /c/Users/user1/.ssh/known_hosts:57
            ERROR: Host key for [localhost]:5022 has changed and you have requested strict checking.
            ERROR: Host key verification failed.
        対処:
            known_hosts から SSH サーバー の部分を削除します:
                (クライアント側 Git bash):  #focus: 57  #// 57 は削除すべき行番号です。エラーメッセージに書いてあります
                    sed -i '57d' ~/.ssh/known_hosts
    - #// systemctl Unit is masked.
        手順: systemctl restart など
        エラー: |
            Failed to restart __ServiceName__: Unit is masked.
        対処:
            root 権限が必要です
    - #// systemctl Unit not found
        手順: systemctl
        エラー: |
            Failed to start __ServiceName__: Unit not found.
        対処:
            systemctl list-unit-files コマンドで正式名を探します
    - #// This account is currently not available.
        手順: su --login __User__
        エラー: This account is currently not available.
        対処:
            ユーザーのシェルを設定します:  #search: Linux user shell
    - #// コマンドが見つかりませんでした
        エラー: コマンドが見つかりませんでした...
        対処法A: 入力したコマンドにスペルミスがあれば直す
        対処法B: コマンド名 + インストール でググる
