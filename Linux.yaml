                        systemctl daemon-reload
                        systemctl start  __ServiceName__
                        systemctl status __ServiceName__
                    以降は、_ExecStart を編集します:
        SysVinit: #keyword:  #// systemd の前に主流だった、サービスのサービス
            手順:
                インストール:
                    サービス スクリプト を作ります:  #keyword: SysVinit service script
                        vi /etc/init.d/example_service : | #keyword:  #focus: example_service,  chkconfig,  description
                            #!/bin/sh

                            ServiceName="example_service"

                            # chkconfig: 2345 50 50
                            # description: __Description__

                            function  Start() {
                                echo "Starting ${ServiceName}"
                                sleep infinity &
                                    #// 通常、フルパスを指定し、リダイレクトさせます。 /usr/local/bin/__Servive__ >> /var/log/${ServiceName}.log 2>&1 &
                                echo $! > /var/run/${ServiceName}.pid
                            }

                            function  Stop() {
                                echo "Stopping ${ServiceName}"
                                if [ -f /var/run/${ServiceName}.pid ]; then
                                    kill `cat /var/run/${ServiceName}.pid`
                                    rm -f /var/run/${ServiceName}.pid
                                else
                                    echo "/var/run/${ServiceName}.pid file not found, service may not be running."
                                fi
                            }

                            function  Status() {  #search: tasks.sh methods
                                if [ -f /var/run/${ServiceName}.pid ]; then
                                    local  PID=`cat /var/run/${ServiceName}.pid`
                                    if ps -p $PID > /dev/null; then
                                        echo "Active"
                                    else
                                        echo "Undefined"
                                    fi
                                else
                                    echo "Inactive"
                                fi
                            }

                            case "$1" in
                                start)   Start;;
                                stop)    Stop;;
                                restart) Stop; Start;;
                                status)  Status;;
                                *)  echo $"Usage: $0 {start|stop|restart|status}";  exit 1;;
                            esac
                    実行権限を付けます:
                        chmod +x /etc/init.d/example_service
                    サービスを登録し、OS起動時の設定をします:  #// OS 起動時にサービスを起動するように設定します
                        chkconfig --add  example_service
                        chkconfig  example_service  on
                    サービスを起動します:
                        service  example_service  start
                    サービスを終了します:  #// 終了しても、OS 起動時にサービスが起動する設定がしてあれば、OS 起動時に起動されます（未確認）
                        service  example_service  stop
                出力を表示します:
                    リダイレクトする場合:
                        - 起動時のパラメーターによります
                        - 上記の サービス スクリプト の場合、
                            less  /var/log/__ServiceName__.log
                            #search:  #focus: example_service
                    ログデーモンを使う場合:
                        SysVinit システムでは、rsyslog や syslog-ng といったログデーモンを使用してシステム全体のログを管理することが一般的です
                        logrotate の /etc/logrotate.d/
            コマンド:
                service: #keyword: service command  #// サービスの起動と終了
                    # ↓ サービス スクリプト の第1引数です。スクリプトが対応している必要があります
                    start:
                        書式: service __Service__ start  #// __Service__ は、 /etc/init.d/__Service__ にあるスクリプトのファイル名
                        echo 出力:
                            start コマンドを入力したシェルに表示されます
                    restart:
                        書式: service __Service__ restart
                    stop:
                        書式: service __Service__ stop  #// 終了しても、OS 起動時にサービスが起動する設定がしてあれば、OS 起動時に起動されます（未確認）
                    status:
                        書式: service __Service__ status
                chkconfig: #keyword: chkconfig command  #// OS 起動時のサービス
                    登録: chkconfig --add  __Service__  #// __Service__ は、 /etc/init.d/__Service__ にあるスクリプトのファイル名
                    表示:
                        1つのサービス:  chkconfig --list  __Service__
                        全てのサービス: chkconfig --list
                    OS 起動時に起動:
                        する:   chkconfig  __Service__  on
                        しない: chkconfig  __Service__  off
            ファイル:
                /etc/init.d/__Service__:  #// サービス スクリプト
                    サンプル: #search: /etc/init.d/example_service
                    第1引数: start, stop, restart, status
                    コメント: #keyword: chkconfig directive comment
                        chkconfig:
                            書式: # chkconfig: __RunLevels__ __StartPriority__ __StopPriority__
                            __RunLevels__: #keyword: chkconfig __RunLevels__
                                マルチユーザー モード: 2345  #// 通常
                            __StartPriority__: #keyword: chkconfig __StartPriority__
                                #↓ 小さい数字が先に起動します
                                0～19: 基本的なサービス。例：ネットワーク設定、ロギングサービスなど
                                20～69: 標準的なユーザーレベルのアプリケーションやサービス。例：データベースサービス、ウェブサーバーなど
                                70～99: システムの起動がほぼ完了し、他の多くのサービスに依存しないアプリケーション、起動順序があまり重要でないサービス
                            __StopPriority__: #keyword: chkconfig __StopPriority__
                                #↓ 小さい数字が先に終了します
                                100 - __StartPriority__ で良さそう
                        description:
                            書式: # description: __Description__
        Upstart:  #// Ubuntu 14.04
            起動, 終了:
                start:    sudo start __Service__
                restart:  sudo stop __Service__
                stop:     sudo restart __Service__
                #ref: https://docs.docker.jp/engine/articles/configuring.html#id3
            ログ:
                特定のサービスのログ:
                    docker:
                        /var/log/upstart/docker.log
                    #ref: https://docs.docker.jp/engine/articles/configuring.html#id3
        tasks.sh: #keyword:  #// systemd や Docker などの仕組みを使ってサービスのプロセスを管理します。npm の package.json の scripts と違って事前準備が不要です
            サンプル:
                サンプル プロジェクト:  #glossary: tasks.sh  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD
                    (root)/tasks.sh: プロジェクトのメインとなる 1つのファイル。 systemctl や docker などを扱うライブラリも含みます
                    (sub)/tasks.sh: それぞれの構成要素のフォルダーにあるファイル。構成要素の直下に無くても構いません
                サンプル コード:
                    root:            #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/tasks.sh
                    基本, systemd:   #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/service1/tasks.sh
                    config:          #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/service2/tasks.sh#function  ConfigOnly()
                    single:          #ref: ${GitHub}/MyPrivateCode/docker/docker_centos7/tasks.sh
                    docker:          #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/nginx_docker/tasks.sh
                    docker-compose:  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/nginx_docker_compose/tasks.sh
                    mail:  #keyword: mail tasks.sh  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/mail/tasks.sh
            手順:  #// 新しい開発環境なら、tasks.sh を含むプロジェクトを git clone した後の手順です
                起動する:  #// サービスやアプリケーションを起動します
                    ./tasks.sh --initialize --start  __ServiceName__
                エディターで開く:  #// tasks.sh ファイルの内容を表示や編集します
                    コマンド: ./tasks.sh  __ServiceName__
                    説明:
                        オプションなしでサービス名を指定した `tasks.sh` を実行すると、
                        指定したサービスの tasks.sh ファイルをエディターで開きます。
                    フルパス表示機能:
                        表示されたフルパスの全部または一部を必要に応じてコピーして活用できます。
                            $ code -g "/home/vagrant/services/tasks.sh"
                    入力補助機能: | #keyword: tasks.sh input assistant
                        サービス名の一部を1つ以上だけ入力しても開くこともできます。
                        複数のサービス名にマッチする場合、マッチしたサービス名が一覧されます。
                            ./tasks.sh ngin docker
                            Which service name?: nginx_docker  nginx_docker_compose
                    エディター変更: #keyword: tasks.sh EDITOR
                        EDITOR 環境変数を設定すると テキスト エディター を変更できます。デフォルトは code コマンドです。
                内容を検索する:
                    サブフォルダーも含めて tasks.sh ファイルを対象に絞って検索すると、検索ノイズが減ります。
                    プロジェクトのちょっとした自動手順を tasks.sh に書いておけば、tasks.sh を検索することで手順が見つかります。 
                    たとえば、migrate で検索すると、プロジェクト固有のマイグレーションの手順がすぐに見つかり、すぐに実行できます。
            コマンド: #keyword: tasks.sh command
                サブコマンド: #keyword: tasks.sh sub commands  #glossary: tasks.sh sub commands,  tasks.sh methods  #// --start, --stop, --initialize など
                    #// 以下のサブコマンドは複数同時に指定できるためオプション形式（ハイフンから始まる指定）になっています。短いオプションは連続して指定できます（例：-is）
                    --state, -?:  #// サービスの状態を表示します
                        状態: ["Inactive", "Active", "Starting", "Stopping", "Done", "Undefined", "NoService"]  #search: tasks.sh state
                        Undefined: 不明またはエラー。--stop で Inactive にできること
                        Done: 成功終了。Done 状態から再起動する場合は --stop してから --start すること。Docker の Exited (0) 状態に相当
                        NoService: 常駐するサービスが無い tasks.sh
                        さらに詳細を表示: --status オプションまたは --config オプションを使って詳細な状態を表示します
                        開発:
                            実行関数 >> StateOnly:  #keyword: tasks.sh  StateOnly  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/service1/tasks.sh#function  StateOnly
                    --initialize, -i:  #// サービスを初期化します。よく --start と同時に指定します
                        前状態: Uninitialized, Initialized, Inactive, Active, Done
                        後状態: Initialized
                        概要:
                            - 初期化します。ビルドできるようにします
                            - ストレージは一度データが無い状態にリセットされます。ストレージのサービス以外ならサービス稼働開始時の内容になります
                            - Active 状態からでも実行できます
                                #// そのケースでエラーで悩むことがあまりに多いため。stop サブコマンドを呼び出せば対応も意外と難しくありません
                    --start, -s:  #// サービスを開始します。冪等性を持たせること。 DB などの初期化は行いません
                        前状態: Initialized, Inactive, Active, Done
                        後状態: Active
                        概要:
                            - サービスを起動します。ビルドします
                            - 既に Active 状態なら何もしない可能性が高いです
                            - プロセスの再起動は行いません
                            - ストレージのサービスに Done 状態から実行したときは、データの書き込みは行いますが、上書きされないデータによって不具合が発生する可能性はあります
                        開発:  #keyword: tasks.sh development
                            Main 関数: #keyword: tasks.sh Main  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/service1/tasks.sh#function  Main
                            StartOnly 関数: #keyword:  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/service1/tasks.sh#function  StartOnly
                            コールバックの登録:  #keyword: tasks.sh callback  #// コマンドの呼び出し順序の設定
                                サービスの --start が呼ばれるように root の tasks.sh の
                                CallStartOperationsInCorrectOrder などに登録する必要があります #search: tasks.sh call tree 
                                #// この仕組みにより、コマンドの実行順序を正しくしやすくなります
                                #// 多くのビルドツールはこのような登録が不要ですが実行順序が暗黙的になり、意図しない順序で実行されたときの修正が非常に難しくなります
                            依存関係: #keyword: tasks.sh ShowDependOn  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/GoCD/service_example/service2/tasks.sh#ShowDependOn()
                                設定: ShowDependOn 関数で echo 出力させます
                                各種サブコマンドの依存関係:  #// 初期化、ビルド、起動などが依存しているサブサービスの初期化、ビルド、起動などを設定します
                                    出力形式:
                                        -   __Service__:__SubCommand__| from __Operation__
                                        -   __Service__:__SubCommand__?__Key__=__Value__| from __Operation__
                                        #// など
                                    __Operation__:
                                        -   __Service__:__SubCommand__
                                        -   __Service__:__SubCommand__?__Key__=__Value__
                                        #// など
                                    __Service__:
                                        -   (root)/tasks.sh の ServiceScripts 変数のキー
                                        -   (sub)/tasks.sh の ServiceName 変数の値
                                    __SubCommand__:  #// オプションの -- を除いたもの
                                        [ initialize, start, stop, state, status, （固有サブコマンド）]
                                    固有サブコマンド:
                                        サンプル:
                                            コマンド
                                                __Sub__/tasks.sh  --show-select
                                            に対応する __SubCommand__ は
                                                show-select
                                --config オプションの最適化:  #// 各種サービスで --config オプションの実装を必要最小限にするために、依存関係を細かく設定します
                                    全ての tasks.sh について:  #// メインの tasks.sh が使う全ての tasks.sh のうち、--config オプションをサポートする tasks.sh のみ
                                        --config All オプションをサポートします:
                                            ShowDependOn 関数を編集します:
                                                #// Add this service all configs
                                        自分自身がサポートするオプションを表示します:
                                            ShowDependOn 関数を編集します:
                                                #// Supported configs in this service
                                            補足:
                                                サービスの tasks.sh に --config オプションを指定したとき:
                                                    ShowDependOn 関数に書かなくても実行できます
                                                親のサービスの tasks.sh に --config オプションを指定したとき:
                                                    ShowDependOn 関数に書かなければ実行できません。
                                                    これは、--config オプションを構成する全サービスに委譲したときに、
                                                    全 config が対象の config をサポートすることを回避するためです。
                                    新規の メイン tasks.sh について:  #// すべての設定を委譲しないようにします
                                        一時的にすべての --config オプションを、使う直下の tasks.sh に渡します: |
                                            function  ShowDependOn() {
                                                ____
                                                if [ "${subCommand}" == "config" ]; then
                                                    echo  "sub1:${subCommandAndParameter}| from ${operation}"  #// Delegate
                                                    echo  "sub2:${subCommandAndParameter}| from ${operation}"  #// Delegate
                                        --config All を実行します:
                                            ./tasks.sh --config All __NewMainServiceName__
                                        使う直下のサービスについて、最小限の設定をします: |
                                            function  ShowDependOn() {
                                                ____
