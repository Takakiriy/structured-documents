                    systemd.socket: #keyword: systemd.socket, ソケット ユニット  #ref: https://www.freedesktop.org/software/systemd/man/systemd.socket.html
                        概要:
                            -   ソケット ユニット の設定ファイル。
                                ソケット ユニット とは、IPアドレスとポート、または UNIX ドメインソケット をリッスンして、
                                関連するサービスを起動する小さなサービスです。
                                #ref: https://unix.stackexchange.com/questions/159462/what-is-systemds-target-service-and-socket
                                #ref: https://qiita.com/ma2shita/items/f366320cc504c04b6b6a
                            -   nginx が作るソケットは、関連する systemd.service 以外が横取りできないらしい?。Can't connect to /run/____/socket
                                systemd.service の Require を削除すれば、socket だけを Active にはできる。
                                #ref: https://qiita.com/mono11/items/a0a0996f80d86bd7a68c
                                #ref: https://stackoverflow.com/questions/35400393/nginxuwsgidjango-permission-denied-while-connecting-to-upstream-socket
                                #ref: https://www.tenable.com/audits/items/CIS_NGINX_Level_1_Loadbalancer_v1.0.0.audit:89f5231bc2219a9cdfddc718f9e5eabd
                                #ref: https://unix.stackexchange.com/questions/12815/what-are-pid-and-lock-files-for
                        サンプル: |
                            [Unit]
                            Description=__Service__ socket

                            [Socket]
                            ListenStream=4444   #// リッスンするポート番号。 または /run/__Service__/socket
                                                #ref: https://www.linux.com/training-tutorials/end-road-systemds-socket-units/
                            [Install]
                            WantedBy=sockets.target
                        起動するサービス:
                            デフォルトでは、.socket ファイルの名前が __Service__.socket の場合、__Service__@.service が起動します
                        UNIX ドメインソケット: #keyword:  #// ネットワーク経由ではないローカルマシン上のプロセスが利用するソケット
                        関連: #search: Python socket
                    systemd.target: #keyword: systemd.target, ターゲット ユニット
                        概要: ユニットのグループ化と順序付け
                        #ref: https://unix.stackexchange.com/questions/159462/what-is-systemds-target-service-and-socket
                    systemd.timer: #keyword: systemd.timer, タイマー ユニット  #// 定期的にタスクを実行します
                        __ServiceName__.service ファイル: |  #focus: daily-execute.sh  #// Type=oneshot つまり、実行したら常駐せずに修了させます
                            [Unit]
                            Description=__ServiceName__

                            [Service]
                            Type=oneshot
                            ExecStart=/path/to/daily-execute.sh
                        __ServiceName__.timer ファイル: |  #focus: daily
                            [Unit]
                            Description=daily __ServiceName__

                            [Timer]
                            OnCalendar=daily
                            Persistent=true

                            [Install]
                            WantedBy=timers.target
                        手順:
                            定期実行開始:
                                sudo systemctl daemon-reload
                                sudo systemctl start __ServiceName__.timer
                                sudo systemctl enable __ServiceName__.timer
                                systemctl list-timers
                            .timer ファイル変更時:
                                sudo systemctl daemon-reload
                                systemctl list-timers
                            即時実行開始:
                                systemd v240 以降:  #// バージョンを表示するには systemctl --version
