        手順:
            .rpm ファイルに対する操作:  #// RPM パッケージ, ローカルにある .rpm ファイルに対する操作
                作成: #keyword: build RPM  #// RPM ファイルを作ります
                    （デフォルトのバージョンを調べる）:
                        RPM をカスタマイズするときは、ベースとなる RPM のバージョンを、OS がインストールするバージョンに変えます
                    rpmbuild を使って RPM ファイルを作ります:  #search: rpmbuild example
                    Gradle を使って RPM ファイルを作ります:  #search: gradle-ospackage-plugin
                    Omnibus を使って RPM ファイルを作ります:  #search: Omnibus
