    visudo コマンド: #keyword:  #// root権限で /etc/sudoers ファイルを安全に編集します。エラーチェックも行われます。visudo を使わないと sudo が使えなくなる可能性があります
        コマンド:
            一般ユーザーの場合:
                sudo visudo
                #// Ubuntu の場合、nano が起動します
            root ユーザーの場合:
                visudo
        env_keep:
            ユーザーから継承する環境変数を指定します
            #search: sudoers env_keep
        関連 >> 特定のユーザーに sudo が使えるようにします:
            usermod
        /etc/sudoers ファイル: #keyword:  #// 特権ユーザーの権限や proxy に関する設定
            サンプル: |
                Defaults        env_reset
                Defaults        env_keep = "http_proxy https_proxy ftp_proxy DISPLAY XAUTHORITY"
                Defaults        mail_badpass
                Defaults        secure_path="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin"

                # Host alias specification

                # User alias specification

                # Cmnd alias specification

                # User privilege specification
                root    ALL=(ALL:ALL) ALL              #// grep -E "root${tab}ALL=\(ALL\) ${tab}ALL" にマッチします

                # Members of the admin group may gain root privileges
                %admin ALL=(ALL) ALL

                # Allow members of group sudo to execute any command
                %sudo   ALL=(ALL:ALL) ALL

                # See sudoers(5) for more information on "#include" directives:

                #includedir /etc/sudoers.d
            説明:
                Defaults  env_reset:
                    ユーザー変数を除去します  #search: sudoers ref1
                Defaults  env_keep:  #keyword: sudoers env_keep
                    ユーザーから継承する環境変数を指定します
                Defaults  mail_badpass:
                    不正なパスワード試行の通知を構成済みユーザーにメールで送信するようにシステムに指示します #search: sudoers ref1
                Defaults  secure_path:
                    PATH を設定します。有害である可能性のあるユーザーパスの使用が防止されます #search: sudoers ref1
                root ALL=(ALL:ALL) ALL:
                    書式: |
                        - __User__    __Host__=(__ProxyUser__:__ProxyGroup__) __Command__
                        - %__Group__  __Host__=(__ProxyUser__:__ProxyGroup__) __Command__
                    意味: root グループは、すべてのホストにおいて、すべてのユーザーやグループとして、すべてのコマンドを実行できます
            sudo 実行時にパスワードの入力を不要にします:  #keyword: sudo no password,  /etc/sudoers NOPASSWD
                スクリプトの場合:  #search: bashlib  AllowNoPasswordSudo
                手動の場合:
                    visudo, /etc/sudoers : |
                        root    ALL=(ALL)       ALL      #// ここは追加済み（この下に追加）

                        ## jenkins user runs Ansible sometimes with sudo command
                        jenkins ALL=(ALL)       NOPASSWD: ALL

                        ## Same thing without a password
                        %wheel	ALL=(ALL)	NOPASSWD: ALL   #// これは要らないかも
            参考: #keyword: sudoers ref1  #ref: https://www.digitalocean.com/community/tutorials/how-to-edit-the-sudoers-file
        #ref: https://qiita.com/buntafujikawa/items/0083b8aa1bd0e97748aa
