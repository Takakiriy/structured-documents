            Kafka:  #keyword:  #// 分散メッセージキュー。カフカ  #ref: https://kafka.apache.org/documentation/
                概要:  #ref: ${my_images}/2023/kafka.webp  #search: Kafka partition list
                    特徴:
                        処理性能を重視したメッセージキュー
                        レコード（メッセージ）はキーバリュー形式
                        Pub/Subメッセージングモデル
                        書き込み/読み出しは独自プロトコル（Kafka プロトコル？)
                    構成図: #ref: ${my_images}/2023/kafka.webp  #ref: https://qiita.com/sigmalist/items/5a26ab519cbdf1e07af3
                    制限: #// Kafka を使うには Zookeeper が必要です
                手順, インストール:  #keyword: install Kafka
                    公式: #ref: https://kafka.apache.org/documentation/#quickstart
                    基本: #// Kafka の手順
                        設定: #settings:
                            __KafkaVersion__: 2.13-2.8.1
                        ansible_vagrant の kafka ブランチをチェックアウトします:
                            #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/multi_vm_ansible/branch_all/.git.zip
                            #search: .git.zip
                            #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/multi_vm_ansible/branch_kafka
                        VirtualBox の VM を作り Kafka をインストールします:
                            参照: __Project__/README.md
                            #// ./run_playbook.sh まで実行すると Kafka のインストールが完了します
                        (@node1) にログインします:  #keyword: Kafka login vagrant
                            参照: __Project__/README.md >> vagrant ssh-config
                        Zookeeper を起動します:
                            (@node1) 新しい bash:
                                - cd /opt/kafka_2.13-2.8.1/  #template: __KafkaVersion__
                                - sudo bin/zookeeper-server-start.sh config/zookeeper.properties
                                - 下記が表示されるまで待ち、表示されたらそのままにします: |
                                    INFO Using checkIntervalMs=60000 maxPerMinute=10000 (org.apache.zookeeper.server.ContainerManager)
                        Kafka を起動します:
                            (@node1) 新しい bash:
                                - cd /opt/kafka_2.13-2.8.1/  #template: __KafkaVersion__
                                - sudo bin/kafka-server-start.sh config/server.properties
                                - 下記が表示されるまで待ち、表示されたらそのままにします: |
                                    [2021-00-00 00:00:00,000] INFO [KafkaServer id=0] started (kafka.server.KafkaServer)
                                    [2021-00-00 00:00:00,000] INFO [broker-0-to-controller-send-thread]: Recorded new controller, from now on
                                    will use broker localhost:9092 (id: 0 rack: null) (kafka.server.BrokerToControllerRequestThread)
                                - もし下記のようにプロセスが停止したら、VM のメモリーサイズを増やしてください: |
                                    [2021-00-00 00:00:00,000] INFO Loaded 0 logs in 307ms. (kafka.log.LogManager)
                                    [2021-00-00 00:00:00,000] INFO Starting log cleanup with a period of 300000 ms. (kafka.log.LogManager)
                                    [2021-00-00 00:00:00,000] INFO Starting log flusher with a default period of 9223372036854775807 ms. (kafka.log.LogManager)
                                    Killed
                        トピックを作ります:  #// トピックはメッセージ（ログ）を入れる場所です  #keyword: Kafka create topic
                            (@node1) bash:
                                - cd /opt/kafka_2.13-2.8.1/  #template: __KafkaVersion__
                                - bin/kafka-topics.sh --create --topic quickstart-events --bootstrap-server localhost:9092
                                    #// quickstart-events はトピック名です
                        トピックの情報を表示します:
                            (@node1) bash:
                                - cd /opt/kafka_2.13-2.8.1/  #template: __KafkaVersion__
                                - bin/kafka-topics.sh --describe --topic quickstart-events --bootstrap-server localhost:9092
                                    #// quickstart-events はトピック名です
