                            docker logs fluentd-fluentd-1
                                2024-11-07 02:31:01 +0000 [warn]: #0 no patterns matched tag="system.syslog.user.notice"
                            ____/fluentd/log/fluent.log/buffer.b6264969d2b5de4dac11082786918483b.log
                                2024-11-07T02:31:01+00:00	fluent.warn	{"tag":"system.syslog.user.notice","message":"no patterns matched tag=\"system.syslog.user.notice\""}
                        原因:
                            どの <match ____> のパターンにもマッチしなかった
