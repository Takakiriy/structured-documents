        ~/bin にパスを通す:  #keyword: ~/bin
            echo 'export  PATH="$HOME/bin:$PATH"' >> ~/.bashrc
            export PATH="$HOME/bin:$PATH"
        環境変数とシェル変数: #keyword:
            環境変数は export あり、子プロセスにも引き継がれます
            シェル変数は export なし
        設定 >> 環境変数を設定するファイル:
            Linux:
                bash: #keyword: ~/.bashrc, ~/.bash_profile, ~/.bash_login, ~/.profile, /etc/profile
                    #↓ 場所と種類
                    ユーザー別, シェル起動時: ~/.bashrc   #// PATH の追加はここが推奨。有効にするにはシェルの再起動が必要です
                    ユーザー別, OS起動時: ~/.bash_profile   #// 有効にするには Linux の再起動が必要です
                    マシン別:  #// 有効にするには OS の再起動が必要です。ログアウトでは有効になりません
                        CentOS7: /etc/profile
                        Ubuntu 20.04: /etc/environment
                            PATH="/home/user1/.local/bin:____"
                    Dockerfile:  #// コンテナーの .bashrc  #search: Docker .bashrc
                    #↓ その他
                    --norc オプション:
                        ~/.bashrc をロードしません
                    --noprofile オプション:
                        ~/.bash_profile 等をロードしない？
                    全体の順序: #keyword: ~/.bashrc order
                        一覧表: |
                            | ファイル名              | 対話的ログイン(ssh) | 対話的非ログイン(bash) | 非対話的   |  Ansible shell |
                            | ----------------------- | ------------------- | ---------------------- | ---------- | -------------- |
                            | `/etc/environment`      | ① PAM経由          | - (継承済)             | - (継承済) | - (継承済)     |
                            | `/etc/profile`          | ②                  | ×                     | ×         | ×             |
                            | `~/.bash_profile`       | ③ (※1)            | ×                     | ×         | ×             |
                            | `~/.bash_login`         | ③ (※1)            | ×                     | ×         | ×             |
                            | `~/.profile`            | ③ (※1)            | ×                     | ×         | ×             |
                            | `/etc/bash.bashrc`      | △ (※2)            | ①                     | ×         | ×             |
                            | `~/.bashrc`             | ④ (※3)            | ②                     | ×         | ×             |
                            | `$BASH_ENV`             | ×                  | ×                     | ① (※4)   | (※4 ① (※4)  |
                        注釈: |
                            (※1) この3つのうち、最初に見つかったファイルのみを読み込む（優先順: .bash_profile → .bash_login → .profile）
                            (※2) Debian/Ubuntu系のみ。Red Hat系では存在しない
                            (※3) 通常は ~/.bash_profile 内で明示的に source ~/.bashrc されている場合のみ
                            (※4) BASH_ENV 環境変数が設定されている場合のみ、そのファイルを読み込む（通常は未設定）
                            継承済: 親プロセスから環境変数として既に引き継がれているため、再読み込みはされない
                        重要ポイント:
                            Ansibleの場合、基本的に /etc/environment のみ有効
                            非対話的シェルでは通常、どのrcファイルも読み込まれない
                            そのため、Ansibleで環境変数が必要な場合は、playbook内で明示的に environment で指定するのが確実
                    vagrant, VirtualBox:
                        VM 起動時:
                            Vagrantfile に書かれている環境変数を設定します
