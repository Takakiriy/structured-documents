        トラブルシューティング(sed):
            - #// sed: -e expression #1, char __Num__: invalid reference \1 on `s' command's RHS
                sed "s/pattern/x/g" の場合:
                    手順: sed "s/pattern/x/g"
                    エラー: |
                        sed: -e expression #1, char __Num__: invalid reference \1 on `s' command's RHS
                    対処:
                        パターンの中の \1 に対応する部分を ( ) で囲みます
                sed "s/(.*)/x/g" の場合:
