        指定した名前のファイルをすべてコピーします: #keyword: cp files in sub folders  #// サブ フォルダーも含めて
            コマンド:
                mkdir -p  "__DestinationFolderPath__"
                find __SourceFolderFullPath__  -name "__FileNameOrWildcard__" -exec cp --parents {} __DestinationFolderPath__/ \;
            __SourceFolderFullPath__: フルパスである必要があるかも
            __FileNameOrWildcard__: ワイルドカードを含めることができます
        ファイル名が同じファイルをコピーします: #keyword: cp-same-name-file-helper
            未完成  #ref: ${GitHub}/MyPrivateCode/bash/cp-same-name-file-helper/bin/cp-same-name-file-helper
        配列指定:  #keyword: Linux cp files  #// 配列に列挙したファイルをコピーするスクリプト
            プロジェクト:  #ref: ${GitHub}/back-up-local-settings/bin/back-up-files#function  CopyFiles()
            ~/_tmp_cp.sh : |  #// 下記は source に存在しないファイルを destination で削除することには対応していません
                export  src_="$HOME/src"  #// source
                export  dst_="$HOME/dst"  #// destination
                export  files=( \
                    "a.txt" \
                    "sub/b.txt" \
                )
                if [ "$1" == "-r"  -o  "$1" == "--reverse" ]; then
                    swap_="${src_}"  &&  src_="${dst_}"  &&  dst_="${swap_}"
                fi
                for  file_  in  "${files[@]}" ;do
                    mkdir -p `dirname ${dst_}/${file_}` && cp -f  "${src_}/${file_}"  "${dst_}/${file_}"
                done
                echo "Done."
