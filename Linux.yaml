                                    AI が出力したサンプル: |
                                        # Input設定
                                        <source>
                                            @type forward
                                            port 24224
                                            bind 0.0.0.0
                                        </source>

                                        # ファイル出力の基本設定
                                        <match pattern.**>
                                            @type file

                                            # 出力先ディレクトリとファイル名のパターン
                                            path /var/log/fluent/myapp
                                            append true

                                            # ファイル名のフォーマット
                                            <buffer time>
                                                timekey 3600           # 1時間ごとにローテーション
                                                timekey_wait 10m       # ファイルを確実に書き出すための待機時間
                                                timekey_use_utc false  # ローカルタイム使用
                                            </buffer>

                                            # 出力フォーマットの設定
                                            <format>
                                                @type json
                                            </format>

                                            # ファイル書き込みの最適化
                                            flush_interval 60s       # バッファをフラッシュする間隔
                                            flush_at_shutdown true   # シャットダウン時に確実にフラッシュ

                                            # パーミッション設定
                                            path_suffix .log
                                            compress gzip           # ローテーション後に圧縮

                                            # エラー処理
                                            retry_max_times 17      # リトライ最大回数
                                            retry_wait 1s           # リトライ間隔
                                        </match>
