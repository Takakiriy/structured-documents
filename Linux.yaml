                    パスフレーズ入力不要の秘密鍵にする場合:  #search: ssh-keygen  #// -N オプション
                高速化, 制御接続: #keyword: SSH control master connection
                    ~/.ssh/config :  #// 以下を追加
                        Host *
                            ControlMaster auto
                            ControlPath ~/.ssh/mux-%r@%h:%p
                            ControlPersist 4h
                オプション:   #ref: https://linuxcommand.org/lc3_man_pages/ssh1.html
                    -i:  #//秘密鍵のファイルのパスを指定します
                    -F:  #// ~/.ssh/config の代わりに使うファイルのパス
                    #search: ssh command
