    tar.gz:  #keyword: tar
        展開, 解凍: #keyword: tar uncompress  #glossary:
            .tar.gz, tar gzip 形式: #keyword: .tar.gz  #// 以下のいずれか
                コマンド:
                    - tar xvf ./____.tar.gz
                    - tar xvf ./____.tar.gz  -C __OutputFolder__  #// __OutputFolder__ にフォルダーが無いと失敗します
                -C オプション: #keyword: tar -C option  #// 展開先のフォルダー
                    概要: __OutputFolder__ に指定したパスに、「.tar.gz ファイルの中に記録された相対パス」を
                        つなげた場所にファイルができます。
                    サンプル: |  #focus: sub, folder
                        $ tar ztf  "./a.tar.gz"  #search: list in .tar.gz
                        folder/
                        folder/file1
                        folder/file2
                        $ mkdir -p  "sub"   #// フォルダーが無いと展開に失敗します
                        $ tar xvf  "./a.tar.gz"  -C "sub"  #// uncompress
                        $ ls  "sub/folder/file1"
                        sub/folder/file1   #// 存在
                --strip-components=1 オプション:
                    .tar.gz に含まれる最も親のフォルダーを作らないで、その中を展開します
            .tar.xz: #keyword:  #// 高圧縮
                7zip でも展開できます
            .zip:  #keyword: Linux unzip
                インストール:
                    Ubuntu 24: sudo apt install -y  unzip
                    Git bash, Ubuntu: インストール不要
                    CentOS7: sudo yum install -y  unzip
                基本: unzip -o ./____.zip
                unzip コマンド:  #ref: https://linux.die.net/man/1/unzip
                    基本: unzip  __Compressed__.zip  #// zip の中の全てのファイルを展開します
                    一部展開:  #// zip の中の一部のファイルを展開します
                        unzip  __Compressed__.zip  __PathInZip__  #search: __PathInZip__
                    __PathInZip__:  #keyword: unzip __PathInZip__
                        #// unzip  __Compressed__.zip  __PathInZip__ の __PathInZip__
                        推奨: ./ から始めないこと
                        CentOS7: __RelativePath__ 形式だけでなく ./__RelativePath__ 形式にも対応
                        macOS13: __RelativePath__ 形式のみ対応。./__RelativePath__ 形式には非対応
                    -l オプション:  #// ファイル名一覧
                        unzip -l __Compressed__.zip
                    -P オプション:  #// --password オプションはありません
                        暗号化 zip を展開します:
                            unzip -P __Password__ __Encrypted__.zip
                        作る場合:  #search: zip encrypt
                    -o オプション:  #// 確認しないで上書きします
            .gz, gzip 形式:
                -   less  ____.gz        #// .gz ファイルのパスを指定すると、それを展開してできるファイルの内容を表示します
                -   gunzip -k ____.gz    #// -k オプション（展開しても .gz を消さない）は、Linux の種類によっては使えません
                -   gunzip -c ____.gz > _gunzip-____
                -   gunzip ./____.gz   #// ❗展開前のファイルは削除されます。 ./____ ファイルができます。 
            .7z: 7za x -so ____.7z | tar xf -
        圧縮: #keyword: tar compress
            .tar.gz, tar gzip 形式: #keyword: .tar.gz compress
                基本:
                    - tar cvzf  "__Folder__.tar.gz"  "__Folder__"
                    #// 事前に "__Folder__.tar.gz" を削除しておく必要はありません
                exclude, 一部除外:
                    書式:
                        - tar cvzf  "__Folder__.tar.gz"  "__Folder__"  --exclude "__ExcludePath__"
                    説明:
                        # __ExcludePath__ は、除外するファイルやフォルダーのパスです。
                        # 比較対象は、パス全体、ファイル名、フォルダー名、フォルダー名/ファイル名, フォルダー名/フォルダー名 です。
                        # ファイル名の一部やフォルダー名の一部にマッチさせるには、ワイルドカード * ? [____] が必要です
                        # ワイルドカードを " " や ' ' で囲んでも囲まなくても構いません
                        # 複数のパターンを指定するときは、--exclude オプションを複数指定します
