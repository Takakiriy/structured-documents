            一部表示:
                正規表現で: #keyword: sed multi line
                    書式:
                        基本:
                            sed -n "/__BeginRegularExpression__/,/__EndRegularExpression__/p"  "__FilePath__"
                        パイプ指定:
                            コマンド:
                                cat "__FilePath__"  |  sed -n "/__BeginRegularExpression__/,/__EndRegularExpression__/p"
                            bashlib:
                                #search: GetLineRange
                        オフセット:
                            sed -n "/__BeginRegularExpression__/__BeginOffset__,/__EndRegularExpression__/__EndOffset__p"  "__FilePath__"
                            #// __BeginOffset__ や __EndOffset__ は -1 や +2 を指定して、前後の行も含めて取り出します （未確認）
                        末尾まで:
                            sed -n '/__BeginRegularExpression__/,$p'  "__FilePath__"
                        n行目からマッチするまで:
                            sed -n "__LineNum__,/__EndRegularExpression__/p"  "__FilePath__"
                    関連:
                        正規表現でマッチする範囲の行番号を表示します:  #search: 
                        grep で前後の行を表示します:  #search: grep before after lines
                    サンプル:
                        mkdir -p ~/_tmp
                        cd  ~/_tmp
                        echo  "aaa" >  "a.txt"
                        echo  "bbb" >> "a.txt"
                        echo  "ccc" >> "a.txt"
                        echo  "ddd" >> "a.txt"
                        echo  "eee" >> "a.txt"
                        sed -n -e "/bbb/,/ddd/p"  "a.txt"
                            # bbb
                            # ccc
                            # ddd
                行番号で: #keyword: sed -n
                    1行 >> 指定した行番号の行だけ表示します:  #keyowrd: sed P
                        書式: sed -n __LineNum__P
                        サンプル:
                            $ echo "an1dan2te" | grep -o an[0-9] | sed -n 2P
                            an2
                    複数行 >> 行番号で指定した範囲だけ表示します:  #keyowrd: sed p
                        - sed -n __StartLineNum__,__LastLineNum__p  __FilePath__
                        - sed -n __StartLineNum__',$p'  __FilePath__  #// 最後まで
                        - head --lines -2  #// 最後の 2行を除く
                        #ref: https://unix.stackexchange.com/questions/288521/with-the-linux-cat-command-how-do-i-show-only-certain-lines-by-number
                    正規表現と行番号のミックス:  #search: sed multi line
            追加:
                行の追加:
                    指定した行の 1行上下に行を追加します:
                        正規表現で: #keyword: sed add line regular expression,  sed a  #// "/____/a line"
                            最初にマッチした行の下:
                                書式:
                                    1行の場合:
                                        -   sed -E  "/__RegularExpression__/a __InsertLineAfterMatchedLine__"  "__FilePath__"
                                        #// Rocky8 なら -e でもよい
                                        #// または
                                        -   local  oldPattern='baseurl=http:\/\/ftp.*\/os\/\$basearch\/'
                                            local  newSetting='baseurl=http://_____/os/$basearch/'
                                            newSettings="$( echo  "${newSettings}"  |  sed -E '/^'"${oldPattern}"$'/a '"${newSetting}" )"
                                        #// 関連 >> コメントアウト:  #search: comment out Linux command
                                    複数行を追加する場合: （下記）
                                サンプル:
                                    mkdir -p ~/_tmp
                                    cd  ~/_tmp
                                    echo  "aaa" >  "a.txt"
                                    echo  "bbb" >> "a.txt"
                                    echo  "ccc" >> "a.txt"
                                    sed  "/b/a BBBBB"  "a.txt"
                                        # aaa
                                        # bbb
                                        # BBBBB
                                        # ccc
                                __InsertLineAfterMatchedLine__:
                                    複数行を追加するときは、行末に \ を付けます。
                                        sed '/__RegularExpression__/a \
                                        First line\
                                        Second line' "__FilePath__"
                            最後にマッチした行の下:
                                スクリプトの場合:
                                    #search: InsertAfterLastMatchedLine
                                CLI の場合:
                                    書式: sed -E "$(grep -n '__RegExp__' "__FilePath__"  |  tail -1  |  cut -f1 -d':' )a __NewLine__"  "__FilePath__"
                                        #// ❗パターンにマッチしないとファイルの内容が壊れます
                                    サンプル:
                                        コマンド:
                                            echo  "bbb"  >   "a.txt"
                                            echo  "bbb"  >>  "a.txt"
                                            echo  "ccc"  >>  "a.txt"
                                            grep  'bbb'  "a.txt"  > /dev/null  ||  Error
                                            sed -E "$(grep -n 'bbb' "a.txt"  |  tail -1  |  cut -f1 -d':' )a BBBBB"  a.txt
                                        出力:
                                            bbb
                                            bbb
                                            BBBBB
                                            ccc
                                    #ref: https://stackoverflow.com/questions/37909388/append-line-after-last-match-with-sed
                        行番号で: #keyword: sed add line number
                            i:  #// 指定した行の上に追加します
                                書式:
                                    sed  -E "__LineNumberBefore__i __InsertLineAfterLineNumber__"  -i "__FilePath__"
                                複数行の追加:
                                    1行ずつ実行します
                                空行の追加: #keyword: sed insert empty line
                                    sed -E "__LineNumberBefore__s/^/\n/""  -i "__FilePath__"
                            a:  #// 指定した行の下に追加します
                                書式:
                                    sed  -e "__LineNumberBefore__a __InsertLineAfterLineNumber__"  -i "__FilePath__"
                                    #// 0 行目は指定できません
                                サンプル:
                                    mkdir -p ~/_tmp
                                    cd  ~/_tmp
                                    echo  "aaa" >  "a.txt"
                                    echo  "bbb" >> "a.txt"
                                    echo  "ccc" >> "a.txt"
                                    sed  -e "2a AAAAA"  "a.txt"
                                        # aaa
                                        # bbb
                                        # AAAAA
                                        # ccc
                        インデントした行を追加します:  #// "/____/a \  line"
                            書式:
                                sed  "/__RegularExpression__/a \    __InsertLineAfterMatchedLine__"  "__FilePath__"
                            サンプル:
                                mkdir -p ~/_tmp
                                cd  ~/_tmp
                                echo  "aaa" >  "a.txt"
                                sed  "/aaa/a \    BBBBB"  "a.txt"
                                    # aaa
                                    #     BBBBB
                    最終行へ: |  #keyword: sed appending at the last line  #// 最終行に行を追加します
                        sed -i -E '$a__AppendingText__' __FilePath__  #// $a is "appending at the last line" command
