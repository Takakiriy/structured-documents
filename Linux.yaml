        journalctl:  #keyword: journalctl  #snippet-depth: 3
            書式:  #// ログを表示します
                基本:
                    サービス名を調べます: systemctl list-unit-files --type=service | grep __PartOfServiceName__  #// __ServiceName__ を調べます
                    サービス指定:
                        sudo journalctl -u __ServiceName__ --no-pager | less    #// --no-pager | less は右端を折り返して表示します
                ログを表示します:  #// journalctl
                    - sudo journalctl   #// 全てのログを less コマンドのようなモードで表示します。root 権限がないと表示されないか一部しか表示されません
                    - sudo journalctl --no-pager | less   #// 右端は折り返して表示します
                tail: sudo journalctl  -u __ServiceName__  |  tail -100   #search: service name
                less (末尾表示): sudo journalctl -xe  -u __ServiceName__  |  less -G  #search: service name
                follow（継続表示）: sudo journalctl -xe --follow  -u __ServiceName__   #search: service name
            -e オプション: 最近のログを表示します
            -x オプション: 詳細を表示します
            -u __ServiceName__ オプション, --unit: 特定サービスのメッセージだけを表示します
            --grep 検索, 起動終了日時: | #keyword: journalctl active date,  systemctl journalctl active inactive date time
                    journalctl  --identifier systemd  --grep '__ServiceName__' --no-pager
                        __DateTime__ __Host__ systemd[1]: Stopped __ServiceName__.
                        __DateTime__ __Host__ systemd[1]: Started __ServiceName__.
                #// --identifier の短い名前は -t
            --since, --until, 時間指定:  #// 指定した期間のログだけ表示します
                日時指定:
                    journalctl --since "2024-01-09 10:00:00" --until "2024-01-09 11:00:00" ____
                相対指定:
                    journalctl --since "1 hour ago"
                    journalctl --since "yesterday"
                    journalctl --since "today"
                最古のログの日時:  #// 全サービスの最古
                    journalctl --lines 1
                    #// --lines の短い名前は -n
                プロセスが起動してから後:  #// 再起動前や最後に止めたときより前は表示しません
                    journalctl  -u "__ServiceName__"  --since "$(systemctl show "__ServiceName__" --property=ActiveEnterTimestamp --value)"
                指定した日時以降: #keyword: journalctl --since start
                    サンプル: |
                        start="$( date "+%Y-%m-%d %H:%M:%S" )"
                        journalctl  -u "__ServiceName__"  --since "${start}"  |  cat   #// cat が無いと less コマンドのように表示されますが、ウィンドウの右端で折り返しされません
                        journalctl  -u "__ServiceName__"  --since "${start}"  |  grep "__ExpectedContents__"
                    テストへの応用:  #search: journalctl log test
            --follow: ログを表示し続けます。出力があったらすぐに表示します
            クリア: #keyword: clear journalctl  #// ログをクリアします
                古いログを自動的に削除するように設定します:  #// 未確認
                    journalctl --vacuum-time=2d  #// 2日以上過去を自動的に削除します  #ref: https://unix.stackexchange.com/questions/139513/how-to-clear-journalctl
                ログのサイズを制限します:  #// 未確認
                    journalctl --vacuum-size=500M  #ref: https://unix.stackexchange.com/questions/139513/how-to-clear-journalctl
                関連 >> 指定した日時から表示します:
                    journalctl -xe  --follow  -u  __ServiceName__  --since "$( date "+%Y-%m-%d %T" )"  --quiet
                    #// --quiet オプションを指定すると、ログを始めた日時を表示しなくなります
            テスト: | #keyword: journalctl log test  #// ログの内容をチェックするテスト
                function  Test() {
                    local  start="$( date "+%Y-%m-%d %H:%M:%S" )"
                    if [ "${Options_DebugDate}" != "" ]; then
                        start="${Options_DebugDate}"
                    fi
                    echo  "If you debug, use --debug-date \"${start}\" option."

                    __Command__
                    local  expect=""  #// This expect indicates to test the exit code     #search: bash expect
                    echo       "\$ journalctl  -u "__Service__"  --since \"${start}\""
                    local  log="$( journalctl  -u "__Service__"  --since "${start}" )"    #search: journalctl --since start
                    $expect echo "${log}" | grep  "__ExpectedMessage__"  > /dev/null  ||  Error  "__ErrorMessage__"    #search: bash Error
                    $expect echo "${log}"  | \
                        GetLineRange  "__BeginLineRegularExpression__"  "__EndLineRegularExpression__"  | \
                        grep  "__ExpectedMessage__"  > /dev/null  \
                        ||  Error  "__ErrorMessage__"    #search: bash Error

                    echo  ""
                    echo  "Pass."
                    read  -p "Press Enter key to continue ..."  dummyVariable  #// Prevent next test set up
            トラブルシューティング(journalctl):
                - #// No journal files were opened due to insufficient permissions.
                    手順: journalctl ____
                    エラー: |
                        Hint: You are currently not seeing messages from other users and the system.
                            Users in the 'systemd-journal' group can see all messages. Pass -q to
                            turn off this notice.
                        No journal files were opened due to insufficient permissions.
                    対処:
                        root ユーザーで実行します
                        sudo journalctl ____
            関連:
                #search: systemctl log
                #search: /var/log/messages
