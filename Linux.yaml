                            定義:
                                .service ファイル: #keyword: unit file environment variable,  EnvironmentFile
                                    サンプル: |
                                        Environment="ONE=one" 'TWO=two two'
                                        EnvironmentFile=/var/service/__Service__/etc/sysconfig  #// 形式は #search: unit file sysconfig
                                        ExecStart=echo $ONE $TWO ${TWO}      #// 'one' 'two' 'two' 'two two'
                                    /etc/profile:  #search: systemd /etc/profile
                                    #ref: https://qiita.com/JhonnyBravo/items/a28074c20fa9adf02be3#コマンド行
                                    #ref: https://www.freedesktop.org/software/systemd/man/systemd.service.html#Command%20lines
                                .gradle ファイル:  #search: Gradle
                                    サンプル: |
