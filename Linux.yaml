            注意: google diff-match-patch 用ではありません
            基本:  #// 適用先が決まっている場合
                diff -u1rN  __OldPath__  __NewPath__  > a.diff  #// path はフォルダーまたはファイル
            YAML に格納する形式にする場合:  #search: patch in YAML
