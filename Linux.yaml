            if ss -ln | grep -q ":${port} "; then
        関連:
            #search: Linux http strace
            Monitor outgoing web requests as they’re happening: #ref: https://unix.stackexchange.com/questions/141600/monitor-outgoing-web-requests-as-they-re-happening
            lsofコマンドの使い方: #ref: https://hana-shin.hatenablog.com/entry/2021/12/26/192307
            Windows の場合: netstat -aon | findstr :__PortNum__  #search: netstat
    firewall-cmd, firewalld:  #keyword: firewall-cmd, firewalld
        参考: #ref: https://eng-entrance.com/linux-centos-firewall
        手順:
            インストール:
                sudo yum install -y firewalld
                sudo systemctl start firewalld
                sudo systemctl enable firewalld
            現在のゾーン:
                表示: |  #// 現在のゾーンとその内容を表示します
                    $ sudo firewall-cmd --get-active-zones    #// アクティブ ゾーン。NIC に明示的に適用されているゾーン。ここに表示されない NIC は デフォルト ゾーン
                        public
                            interfaces: eth0
                        internal
                            interfaces: eth1
                    $ sudo firewall-cmd --get-default-zone    #// デフォルト ゾーン。--get-active-zones に表示されない NIC に適用されるゾーン
                        public
                    $ sudo firewall-cmd --info-zone=public    #// public ゾーン の内容
                        public (active)
                            target: default
                            icmp-block-inversion: no
                            interfaces: eth0
                            sources: 
                            services: cockpit dhcpv6-client ssh
                            ports: 
                            protocols: 
                            forward: no
                            masquerade: no
                            forward-ports: 
                            source-ports: 
                            icmp-blocks: 
                            rich rules: 
                    $ sudo firewall-cmd --info-zone=internal   #// internal ゾーン の内容
                        internal (active)
                            target: default
                            icmp-block-inversion: no
                            interfaces: eth1
                            sources: 
                            services: cockpit dhcpv6-client mdns samba-client ssh
                            ports: 
                            protocols: 
                            forward: no
                            masquerade: no
                            forward-ports: 
                            source-ports: 
                            icmp-blocks: 
                            rich rules: 
                変更:
                    trusted に変更: #// 全てのポートを開くゾーン（trusted）に切り替えます
                        - sudo firewall-cmd --set-default-zone=trusted  #// デフォルトゾーンを変更します。trusted は全てオープン。firewalld 再起動不要
                            #// trusted: 全てのポートを開く
                            #// drop: 全てのポートを閉じる
                            #// internal: 内部で使うサーバー用。初期設定は home ゾーンと同じなので、internal ゾーンをカスタマイズするとよい
                        - sudo firewall-cmd --get-default-zone  #// デフォルトゾーンを表示します
                すべてのゾーン, 指定のゾーン:  #search: firewall-cmd  zones
            internal ゾーンに対して http サービスのポート番号（80）を開きます:
                - sudo firewall-cmd --zone=internal --add-service=http --permanent  #// ポートを開きます。要 firewalld 再起動
                - sudo firewall-cmd --reload  #// 設定を適用するために再起動します
            http サービスのポート番号:
                - cat /usr/lib/firewalld/services/http.xml
            514 ポートを開く・閉じる: #// アクティブ ゾーンに対してポート 514 の UDP ポートと TCP ポートを開きます
                - sudo firewall-cmd --add-port=514/udp --permanent
                - sudo firewall-cmd --add-port=514/tcp --permanent
                - sudo firewall-cmd --reload
                #// 閉じるときは --add-port を --remove-port に変えます
            DNS(53)ポートを開く:
                インストール:
                    sudo yum install -y firewalld
                    sudo systemctl start firewalld
                    sudo systemctl enable firewalld
                一覧:
                    sudo firewall-cmd --list-services
                        許可されたポートのサービス
                DNS(53)ポートを開く:
                    sudo firewall-cmd --add-service=dns --permanent
                    sudo firewall-cmd --reload
            その他コマンド:
                - systemctl status firewalld  #// ファイアーウォールが動作していることを確認します
                - sudo firewall-cmd --get-services  #// 設定できるサービスを一覧します
                - sudo firewall-cmd --zone=internal --remove-service=http --permanent  #// ポートを閉じます。要 firewalld 再起動
        コマンド:
            firewall-cmd:
                オプション:
                    --permanent: #keyword: firewall-cmd --permanent
                        ユースケース別:
                            表示:
                                アクティブの設定: --permanent なし
                                ファイルの設定:   --permanent あり  #// 次回 firewall-cmd --reload 実行時、または次回 firewalld 再起動時にアクティブになる設定
                            設定:
                                即時かつ恒久:
                                    - 設定変更する firewall-cmd コマンドに --permanent を指定します
                                    - （他の設定変更も同様に行います）
                                    - sudo firewall-cmd --reload
                                一時的な即時:
                                    - 設定変更する firewall-cmd コマンドに --permanent を指定しません
                                一時的な即時のキャンセル:
                                    - sudo firewall-cmd --reload
                        設定場所別:
                            表示:
                                --permanent なしの場合: アクティブの設定。現在、ネットワークに適用されている設定
                                --permanent ありの場合: ファイルの設定。次回 firewall-cmd --reload 実行時、または次回 firewalld 再起動時にアクティブになる設定です
                            設定:
                                --permanent なしの場合: アクティブの設定。即時アクティブになりますが、firewall-cmd --reload 実行時、または次回 firewalld 再起動時に元に戻ります
                                --permanent ありの場合: ファイルの設定。firewall-cmd --reload 実行時、または次回 firewalld 再起動時にアクティブになります
        概念:
            （構造）:
                ゾーン:
                    NIC:  #// ゾーン:NIC = 1:多。NIC に関連付けられるゾーンは 1つだけです
                    サービス:
                ipset:
                ポート:
                ログ:
            ゾーン: #keyword: firewall-cmd  zones
                名前:
                    全てのゾーン:  #// 定義済みのすべてのゾーン
                        表示: sudo firewall-cmd --get-zones
                        デフォルト値:  #// 以下はリセット状態の内容。ユーザー定義のゾーンを追加できます
                            trusted:  #// 全て許可
                            drop:  #// 全て拒否
                            public:
                            block:
                            dmz:
                            external:
                            home:
                            internal:
                            libvirt:
                            work:
                    アクティブ ゾーン:  #search: firewall-cmd NIC zone 
                    デフォルト ゾーン: #keyword: firewall-cmd  default zone  #// ゾーンに関連付けられていない NIC に適用されるゾーン
                        表示: sudo firewall-cmd --get-default-zone
                        設定: sudo firewall-cmd --set-default-zone=__ZoneName__  #// --permanent オプションは指定できません
                名前, 関連する NIC:
                    アクティブ ゾーン: #keyword: firewall-cmd NIC zone  #// 現在のネットワークの設定
                        一覧表示:  #// アクティブ ゾーン とそれに関連付けられた NIC
                            _: sudo firewall-cmd --get-active-zones
                            何も表示されないとき: すべての NIC が デフォルト ゾーン
                            表示されない NIC: デフォルト ゾーン
                            サンプル: |
                                $ sudo firewall-cmd --get-active-zones
                                internal
                                    interfaces: eth1
                                public
                                    interfaces: eth0
                        設定変更:  #// NIC が所属するゾーンを変更します  #search: firewall-cmd --permanent
                            sudo firewall-cmd --change-interface=__NIC__ --zone=__ZoneName__  #// __NIC__ は eth0 など
                内容:  #// 名前, 関連する NIC, その他
                    全てのゾーン:  #// すべてのゾーンとその内容
                        表示: sudo firewall-cmd --list-all-zones
                    指定のゾーン:
                        表示:
                            コマンド:
                                - sudo firewall-cmd --info-zone=__ZoneName__
                                #// または
                                - sudo firewall-cmd --zone=__ZoneName__ --list-all  #// --info-zone オプションを指定したときと同じ内容です
                            (active) 表示: #keyword: firewall-cmd (active)  #// 指定したゾーンが現在 1つ以上の NIC に現在適用されていることを表します
                                表示サンプル: |  #focus: active
                                        $ sudo firewall-cmd --zone=public --list-all
                                        public (active)
                                            ,,,
                                            interfaces: eth0
                                            ...
                                    #saerch: firewall-cmd  --info-zone
                                意味:
                                    - 指定したゾーンが現在 1つ以上の NIC に現在適用されています
                                    - 他のゾーンを表示したときも (active) が表示される場合もあります
                            ファイル:  #ref: /etc/firewalld/zones/public.xml
                    デフォルト ゾーン:  #search: firewall-cmd  default zone
                        表示: sudo firewall-cmd --list-all
                    サンプル: |  #keyword: firewall-cmd  --info-zone
                        $ sudo firewall-cmd --info-zone=public
                            public (active)
                                target: default
                                icmp-block-inversion: no
                                interfaces: eth0
                                sources: 
                                services: cockpit dhcpv6-client ssh
                                ports: 
                                protocols: 
                                forward: no
                                masquerade: no
                                forward-ports: 
                                source-ports: 
                                icmp-blocks: 
                                rich rules: 
                関連:
                    NIC: #search: firewall-cmd NIC zone  #// ゾーンと NIC の関連。ゾーン:NIC = 1:多。NIC に関連付けられるゾーンは 1つだけです
                    サービス:  #// ゾーンとサービスの関連
                        表示:  #// 以下のいずれか
                            指定のゾーン:
                                sudo firewall-cmd --zone=__ZoneName__ --list-services
                            デフォルト ゾーン:  #search: firewall-cmd  default zone
                                sudo firewall-cmd --list-services
                        追加:
                            sudo firewall-cmd --permanent --add-service=__ServiceName__
            NIC:
                名前: eth0, eth1 など ip addr コマンドで表示される NIC の名前
                関連:
                    ゾーン: #// NIC に関連付けられているゾーン  #search: firewall-cmd NIC zone
                        一覧表示: sudo firewall-cmd --get-active-zones
                            #search: firewall-cmd NIC zone
            サービス:
                名前:
                    すべて:  #// 定義済みのすべてのサービス
                        表示: sudo firewall-cmd --get-services
                内容:
                    表示: sudo firewall-cmd --info-service=__ServiceName__
                ファイル:  #// 内容が書かれたファイル
                    表示: sudo firewall-cmd --permanent --path-service=__ServiceName__
                        #ref: /usr/lib/firewalld/services/__ServiceName__.xml
                説明:
                    表示: sudo firewall-cmd --permanent --get-short --service=__ServiceName__
            ipset:  #// IP アドレス のグループ
                    表示: firewall-cmd --permanent --get-ipsets
            ログ:
                記録のオン・オフ:
                    値: all, unicast, broadcast, multicast, off
                    表示: sudo firewall-cmd --get-log-denied
                    設定: firewall-cmd --set-log-denied=__Value__
    SELinux:  #// セキュリティに関するカーネルの制御機能。ディストリビューションではありません  #keyword: SELinux
        概要: ファイアーウォール機能（ポートのブロック）など
        手順:
            無効化:  #keyword: GRUB selinux=0  #// VM 起動時に GRUB メニュー で SELinux を一度だけ無効化します
                - VMを起動するときに、GRUBの画面が表示されるタイミングで カーソル キー ↓と↑ を押し、（最初の選択項目で）e キーを押して編集モードに入ります
                    #ref: ${my_images}/2023/GRUB/GRUB-1.png
                - カーソルキーの下を押してスクロールし、linuxまたはlinux16で始まる行の末尾に selinux=0 を追加します
                    #ref: ${my_images}/2023/GRUB/GRUB-2.png  #// スクロール前
                    #ref: ${my_images}/2023/GRUB/GRUB-3.png  #// スクロール後、selinux=0 追加前
                - Ctrl + X を押し再起動します
                - もう一度再起動すると selinux=0 の設定は無くなり、元に戻ります
                #ref: ${typrm_files}/ref/Linux-AI.yaml#label: GRUB selinux=0
                #ref: https://endy-tech.hatenablog.jp/entry/selinux_practical_knowledge
        SELinux booleans: #keyword:  #// sebool, Boolean 許可ルールグループ
            設定値を一覧します: #keyword: list SELinux booleans
                - getsebool -a
                - getsebool -a | grep __PartOfPolicyName__
            設定値を参照します: #keyword: get SELinux booleans,  read SELinux booleans
                getsebool __PolicyName__
            設定を変更します: #keyword: set SELinux booleans,  update SELinux booleans
                書式: sudo setsebool -P __PolicyName__ __OnOrOff__
                __OnOrOff__: on または off
            コマンド:
                getsebool:
                    #search: list SELinux booleans
                    #search: get SELinux booleans
                setsebool:
                    #search: set SELinux booleans
            Ansible: #search: Ansible seboolean module
        enforce:
            確認:
                getenforce:  #// 有効無効を表示します  #keyword: getenforce
                    bash: getenforce
                    結果:
                        enforcing:  有効
                        permissive: 警告のみ有効
                        disabled:   無効
                sestatus:  #// いくつかの状態を表示します
                ログを確認します:
                    tail -n0 -f /var/log/audit/audit.log
            設定 >> 有効無効を変更します:
                一時的 >> 再起動すると初期化される場合:  #keyword: setenforce
                    bash: sudo setenforce __Number__
                    base の補足:
                        __Number__: 0=permissive, 1=enforcing
                再起動したときの設定:
                    /etc/selinux/config: |
                        :
                        SELINUX=__Enforce__
                        :
                    /etc/selinux/config の補足:
                        __Enforce__:  #keyword: SELinux enforce, SELinux enabled
                            enforcing:  有効
                            permissive: 警告のみ有効
                            disabled:   無効
        コマンド:
            audit2allow: #keyword:  #// ログから許可設定を作ります
                参考: #ref: https://milestone-of-se.nesuke.com/sv-advanced/selinux/add-av-rules-module/
                サンプル:
                    - sudo grep zabbix_server /var/log/audit/audit.log | sudo audit2allow -M zabbix-policy
                    - sudo semodule -i zabbix-policy.pp  #// 直前のコマンドで表示されたコマンド + sudo
                    - sudo systemctl restart zabbix-server  #// 許可したので、再実行
                    - systemctl status zabbix-server  #// 失敗したら再び上記 audit2allow から繰り返します
            semodule:
                参考:
                    Red Hat: #ref: https://access.redhat.com/documentation/ja-jp/red_hat_enterprise_linux/7/html/selinux_users_and_administrators_guide/security-enhanced_linux-prioritizing_selinux_modules
                    man: #ref: https://man7.org/linux/man-pages/man8/semodule.8.html
                インストール:
                    sudo semodule --install __ModuleName__.pp
                アンインストール: 
                    sudo semodule --remove __ModuleName__
        Ansible の audit2allow:
            #search: Ansible audit2allow
    NFS: #keyword: NFS,  Linux 共有フォルダー
        CentOS7 2022-01-13:
            設定: #settings:
                __SharePath__: /var/log/elasticsearch/shared_repository
                __ShareUser__: elasticsearch
            共有フォルダーを設定します:
                (@全ノード): |
                    sudo yum install -y nfs-utils
                (@node1): |
                    -   share_="/var/log/elasticsearch/shared_repository"  #template: __SharePath__
                        sudo mkdir -p "${share_}"
                        sudo chown -R elasticsearch:elasticsearch "${share_}"
                    -   echo "${share_}  *(rw,no_root_squash)" | sudo tee -a "/etc/exports.d/export-nfs.exports"
                        sudo exportfs -ar  #// export-nfs.exports の設定を有効にします
                        sudo exportfs -v   #// 設定を確認します
                    -   sudo systemctl start  nfs-server
                        sudo systemctl status nfs-server
                    -   sudo systemctl enable nfs-server
                    -   echo "dummy_" | sudo tee -a "${share_}/dummy"
                        sudo cat  "${share_}/dummy"
                    -   sudo chown -R elasticsearch:elasticsearch ${share_}  #// elasticsearch ユーザーだけが共有する場合
                            #template: sudo chown -R __ShareUser__:__ShareUser__ ${share_}  #// __ShareUser__ ユーザー
                        sudo ls -la  ${share_}  #// 所有者をチェック
                (@node1以外, autofs を使う場合): |
                    -   sudo yum -y install autofs
                    -   share_="/var/log/elasticsearch/shared_repository"  #template: __SharePath__
                        sudo mkdir -p ${share_}
                        sudo chown -R elasticsearch:elasticsearch ${share_}  #// elasticsearch ユーザーだけが共有する場合
                            #template: sudo chown -R __ShareUser__:__ShareUser__ ${share_}  #// __ShareUser__ ユーザー
                    -   echo "/-    /etc/auto.mount" | sudo tee -a "/etc/auto.master"
                    -   echo "${share_} -fstype=nfs,rw  node1:${share_}" | sudo tee -a "/etc/auto.mount"
                    -   sudo systemctl start  autofs
                        sudo systemctl status autofs
                    -   sudo systemctl enable autofs
                    -   sudo ls -la  ${share_}  #// 所有者をチェック
                        sudo cat  "${share_}/dummy"
                (@node1以外, 再起動するたびに mount を使う場合): |
                    -   share_="/var/log/elasticsearch/shared_repository"  #template: __SharePath__
                        sudo mkdir -p ${share_}
                        sudo chown -R elasticsearch:elasticsearch ${share_}  #// elasticsearch ユーザーだけが共有する場合
                            #template: sudo chown -R __ShareUser__:__ShareUser__ ${share_}  #// __ShareUser__ ユーザー
                    -   sudo mount -t nfs "node1:${share_}" "${share_}"
                    -   sudo ls -la  ${share_}  #// 所有者をチェック
                        sudo cat  "${share_}/dummy"
            共有フォルダーを無効にします:  #keyword: disbale NFS
                (@node1): |
                    -   sudo systemctl disable nfs-server
                    -   sudo systemctl stop    nfs-server
                        sudo systemctl status  nfs-server  #// Active: inactive であること
                    -   sudo cat "/etc/exports.d/export-nfs.exports"  #// ${share_} 以外の設定が無いこと
                    -   sudo rm  "/etc/exports.d/export-nfs.exports"
                    -   sudo exportfs -ar  #// export-nfs.exports の設定を有効にします
                        sudo exportfs -v   #// 設定を確認します
                (@node1以外, autofs を使っていた場合): |
                    -   sudo systemctl disable autofs
                    -   sudo systemctl stop    autofs
                    -   sudo systemctl status  autofs  #// Active: inactive であること
                    -   sudo ls -la  ${share_}
                (@node1以外, umount を使った場合): |
                    -   share_="/var/log/elasticsearch/shared_repository"  #template: __SharePath__
                    -   sudo umount  "${share_}"
                    -   sudo ls -la  ${share_}
            参考:
                #ref: https://qiita.com/zaki-lknr/items/5c17b53b51eae7b21e2e
                #ref: https://access.redhat.com/documentation/ja-jp/red_hat_enterprise_linux/7/html/storage_administration_guide/nfs-clientconfig
