                        証明書の CN や OU を DB と照合します。
                        失効に関しては、アプリ層まで到達しないため安全です。
                    有効期限内の失効:
                        証明書失効リストを使って、有効期限内のクライアント証明書が失効されたことを判定します。
                        大規模環境では OCSP がよく使われます。
                証明書失効リスト, CRL (.crl): #keyword:  #// Certificate Revocation List。有効期限よりも前に失効させたデジタル証明書の一覧。ブラックリスト方式
                    概要:
                        失効要因の例:
                            秘密鍵が漏洩した
                            従業員が退職した
                            不正利用が判明した
                        ブラックリスト方式:
                            登録されている証明書を拒否します
                            新しい証明書は拒否しません（ホワイトリスト方式ではないため）
                    手順:
                        失効までの全体の手順:
                            証明書発行者(CA)に失効を申請
                            CAが証明書失効リスト(CRL)に追加
                            ブラウザやシステムがCRLを確認
                        証明書を失効させます:
                            openssl ca  -revoke certificate.pem  -config openssl.cnf
                        CRL を生成します:  #keyword: create CRL
                            PEM 形式:
                                openssl ca  -gencrl  -out crl.pem  -config openssl.cnf
                            DER 形式:
                                PEM から DER に変換します:
                                    openssl crl  -in crl.pem  -outform DER  -out crl.der
                        失効されたことをチェックします:  #// 主にブラウザー内
                            1. ブラウザが証明書を受け取る
                            2. 証明書内の CRL URL を読み取る
                            3. そのURLからCRLをダウンロード
                            4. CRLに証明書番号がないか確認
                            5. あれば失効と判断、なければ有効
                        形式をチェックします:  #keyword: check CRL type
                            openssl コマンド:
                                コマンド:
                                    openssl crl -in crl.pem -CAfile ca-cert.pem -noout
                                チェックする内容:
                                    証明書ファイルを指定するとエラーになります
                                    PEM 形式 または DER 形式 として正しくなければエラーになります
                                    DER 形式 の場合は -inform DER を指定
                                    -CAfile オプション追加で、証明書の検証も可能
                            Python:
                                load_pem_x509_crl: #keyword:  #// PEM 形式
                                    チェックする内容:
                                        証明書ファイルを指定するとエラーになります
                                        PEM 形式として正しくなければエラーになります
                                        DER 形式 の CRL（PEM形式ではない）では、エラーになります。load_der_x509_crl を使います
                                    チェックしない内容:
                                        ロードしただけでは、
                                        誰が作ったCRLか分からない
                                        改ざんされていないか分からない
                                        有効期限が切れていないか分からない
                                load_der_x509_crl: #keyword:  #// DER 形式
                                    チェックする内容:
                                        （DER 形式 であること以外 load_pem_x509_crl と同じ）
                                    チェックしない内容:
                                        （load_pem_x509_crl と同じ）
                    ファイル:
                        証明書, certificate.pem:
                            含まれる情報:
                                CRL配布ポイント（CRL Distribution Point）:
