        インデント付き:  #keyword: EchoWithIndent
            コード: |
                EchoWithIndent  "first line"$'\n'"second line"  "> "

                function  EchoWithIndent() {
                    local  message="$1"
                    local  indent="$2"
                    local  oldIFS="$IFS"

                    IFS=$'\n'
                    for  line  in ${message}; do
                        echo "${indent}${line}"
                    done
                    IFS="$oldIFS"
                }
            出力: |
                > first line
                > second line
        バックスラッシュの出力: #keyword: echo back slash
            サンプル1:
                bash:  #// bash 5.1.16(1)-release
                    - bak1='[\t]'  &&  echo "(${bak1})"         #// ([\t]) と表示できます
                    - bak2="[\t]"  bash -c  'echo "(${bak2})"'  #// ([\t]) と表示できます
                    - bak3="[\t]"  echo "(${bak3})"             #// () と表示されてしまいます。なぜなら変数 bak3 を評価するタイミングが変数に値を代入する前だからです
                zsh:   #// zsh 5.8.1 (x86_64-apple-darwin21.0)
                    - bak1='[\t]'  &&  echo "(${bak1})"         #// ([   ]) と表示されてしまいます。タブ文字に変換されてしまします
                    - bak2="[\t]"  bash -c  'echo "(${bak2})"'  #// ([\t]) と表示できます
                    - bak3="[\t]"  echo "(${bak3})"             #// () と表示されてしまいます。なぜなら変数 bak3 を評価するタイミングが変数に値を代入する前だからです
            サンプル2:   #// zsh 5.8.1 (x86_64-apple-darwin21.0)
                -   setopt interactivecomments
                - |
                    bak='(\t)'
                    echo ${bak:0:1}        # (
                    echo ${bak:1:1}        # \   ... not a tab character
                    echo ${bak:2:1}        # t
                    echo ${bak:3:1}        # )
                    echo "${bak}"          # (    )
                    echo '${bak}'          # ${bak}
                    echo "${bak/\\/@}"     # (@t)   #search: bash str replace
                    echo "${bak/\\/\\\\}"  # (\t)
