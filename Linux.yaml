                        サンプルと説明: |  #// 各項目の説明は、サンプルの右半分と、下のフィールドにあります
                            # /usr/lib/systemd/system/__Service__.service
                            [Unit]
                            Description=__Service__
                            Requires=__Service__.socket    #// .socket 型のサービス  systemd.socket
                            After=network.target

                            [Service]
                            User=__User__                #// 実行するユーザー  #ref: https://qiita.com/todanano/items/f66f1a3ad76f76de0772
                            Group=__UserGroup__
                            PIDFile=/run/__Service__/pid            #// プロセスID が書かれたファイル。 $MAINPID で使う？ たとえば sudo cat /run/sshd.pid で sshd のプロセスID が表示されます（. と / の違いは不明）
                            Environment="ONE=one" "TWO=two two"     #// ここで定義された変数は ExecStart からでも参照できます。ExecStart の行にここで定義された変数の参照を書くことができます
                            Environment="PATH=/my/bin:${PATH}"
                            EnvironmentFile=/var/service/__Service__/etc/sysconfig  #// 形式は #search: unit file sysconfig  #// ここで定義された変数は ExecStart からでも参照できます
                            WorkingDirectory=/var/service/__Service__/services      #// 実行するときの カレント フォルダー
                            ExecStart=/var/service/__Service__/services/python_env/bin/gunicorn --pid /run/__Service__/pid --bind unix:/run/__Service__/socket -c /var/service/__Service__/services/conf.py website.wsgi
                                                                    #// systemctl start で実行するコマンド
                                                                    #// 環境変数を参照するときは $____ ではなく ${____} を推奨します #ref: https://qiita.com/JhonnyBravo/items/a28074c20fa9adf02be3#コマンド行
                                                                    #// 値の定義は Environment や EnvironmentFile が指すファイルに書きます
                            ExecReload=/bin/kill -s HUP $MAINPID    #// systemctl reload で実行するコマンド
                            ExecStop=/bin/kill -s TERM $MAINPID     #// systemctl stop で実行するコマンド
