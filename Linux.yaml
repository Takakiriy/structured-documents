            mock: #keyword: RPM mock command  #// chroot 環境内で RPM パッケージをビルドするためのツール
                mockbuild ユーザーを作ります:  #// chroot 環境で使うユーザー
                    sudo useradd  mockbuild
                    sudo groupadd  mock
                    sudo useradd -g mock  mockbuild
            yumdownloader: #keyword: yumdownloader  #search: yum install --downloadonly
                概要: RPM をダウンロードします。ダウンロードした RPM を使ったインストールは行いません。
                関連 >> yum install --downloadonly:
                基本（非推奨）:  #// コマンドの基本的な使い方を説明していますが、不足する可能性があり不完全です
                    yumdownloader をインストールします:
                        sudo yum install  yum-utils
                    RPM をダウンロードします:
                        ❗注意: 以下のコマンドはインストール済みの RPM はダウンロードしません。また、キャッシュの影響を受けます  #search: complete yumdownloader
                        コマンド: yumdownloader --resolve  __PackageName__
                        説明:
                            --resolve: 依存するパッケージもダウンロードします
                完全版）必要な RPM をすべて取得します: #keyword: complete yumdownloader  #ref: ${typrm_files}/ref/Linux-AI.yaml#label: complete yumdownloader
                    (vagrant@): |  #// クリーン状態の OS であること
                        rpm -qa | grep -E 'python-devel|python-crypto|libffi-devel|openssl-devel'   #// すでにインストール済みの RPM を調べます
                        rpm -qa | grep -E 'python-devel|python-crypto|libffi-devel'    #// インストールされていない RPM の一覧。以下ではこの一覧の RPM のみ指定すること
                        sudo yum install -y  yum-utils  createrepo
                        rm -rf   ~/_rpms
                        mkdir -p ~/_rpms
                        sudo yum clean all  #// Clear the cache
                        yumdownloader --resolve  --destdir=$HOME/_rpms  python-devel python-crypto libffi-devel
                        ls  ~/_rpms
                        createrepo ~/_rpms
                        sudo vi /etc/yum.repos.d/local.repo : |
                                [local]
                                name=Local Repository
                                baseurl=file:///var/home/vagrant/_rpms
                                enabled=1
                                gpgcheck=0
                            #template-at__(-3): file://$HOME/_rpms    #// この行は local.repo に含めません
                        sudo yum install -y  --disablerepo="*"  --enablerepo="local"  python-devel python-crypto libffi-devel
                        sudo yum autoremove -y  --disablerepo="*"  --enablerepo="local"  python-devel python-crypto libffi-devel
                        sudo rm /etc/yum.repos.d/local.repo
                        rm -rf  ~/_rpms/repodata
                        ls  ~/_rpms   #// ここで RPM を取得します
                        rm -rf  ~/_rpms
                参考: #ref: https://access.redhat.com/ja/solutions/395763
            rpm-open:  #// RPM ファイルを展開します。独自コマンド。入っているファイルだけでなく、メタ情報、依存関係、スクリプトを ~/rpm の中に出力します
                ヘルプ: |
                    usage: rpm-open __RPM_FilePath_Or_URL__
                        output: /home/user1/rpm
                        cache: /home/user1/rpm/cache
                コード: |
                    #!/bin/bash

                    RpmPathOrURL="$1"
                    OptionName="$2"   #// "" or "--out"
                    OptionValue="$3"  #// Output folder path. The folder is deleted before open .rpm file.
                    ExtractedRpmPath="${HOME}/rpm"
                    RpmDownloadPath="${HOME}/rpm/cache"
                    RpmFileName="${RpmPathOrURL##*/}"  #// right of last "/"
                    RpmName="${RpmFileName%.*}"  #// left of last "."
                    RpmName="${RpmName%.*}"  #// left of last "."
                    if [ "${OptionName}" == "--out" ]; then
                        mkdir -p  "${OptionValue}"
                        OutputPath="$( readlink -f "${OptionValue}" )"
                    else
                        OutputPath="${ExtractedRpmPath}/${RpmName}"
                    fi
                    if [ "$1" == "" ]; then

                        echo  "usage: rpm-open __RPM_FilePath_Or_URL__"
                        echo  "    output: ${ExtractedRpmPath}"
                        echo  "    download to: ${RpmDownloadPath}"
                        exit 0
                    fi

                    if [ "${RpmPathOrURL:0:4}" == "http" ]; then
                        mkdir -p  "${RpmDownloadPath}"
                        RpmFilePath="${RpmDownloadPath}/${RpmFileName}"
                        echo  "Download to: ${RpmFilePath}"

                        curl --silent  -o "${RpmFilePath}"  "${RpmPathOrURL}"
                    else
                        RpmFilePath="${RpmPathOrURL}"
                    fi

                    echo  "Extract to: ${OutputPath}"
                    rm -rf  "${OutputPath}"
                    mkdir -p  "${OutputPath}/files"

                    rpm2cpio "${RpmFilePath}"  |  (cd "${OutputPath}/files" && cpio -idm)
                    rpm -qip "${RpmFilePath}" > "${OutputPath}/meta.txt"
                    rpm -qp --scripts "${RpmFilePath}" > "${OutputPath}/scripts.sh"

                    rm -f  "${OutputPath}/dependency.txt"
                    Options=( "--provides"  "--requires"  "--obsoletes"  "--conflicts" )
                    for  Option  in  "${Options[@]}" ;do
                        echo  "${Option}"  >> "${OutputPath}/dependency.txt"
                        rpm -qp ${Option} "${RpmFilePath}"  >> "${OutputPath}/dependency.txt"
                    done
            rpm-extract:  #// RPM ファイルに入っているファイルを展開します。メタ情報などは含みません
                使い方: rpm-extract  path/to.rpm
                コード: |
                    #!/bin/bash
                    RpmFileRelativePath="$1"
                    RpmFilePath="$( readlink -f  "${RpmFileRelativePath}" )"
                    OutputPath="${RpmFilePath}.cpio"

                    mkdir -p  "${OutputPath}"
                    rpm2cpio  "${RpmFilePath}"  |  (cd "${OutputPath}" && cpio -idm)
                    echo  "Output: ${OutputPath}"
