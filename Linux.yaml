            #↓ 鍵の管理
            #search: SSH key
        概念, 構成:
            SSH キー, 鍵ファイル: #keyword: SSH key
                設計:  #// 誰が鍵を持つか
                    担当者の場合:  #// 担当者が秘密鍵のオーナーの場合
                        - 秘密鍵は担当者だけがアクセスできる場所に置きます。
                        - ~/.ssh に置けばそのようになります。
                        - 既存の秘密鍵を流用することができます。
                        - サーバーや目的別が異なれば、別の秘密鍵を作ります。
                        - バックアップしておくべきです。テキスト ファイル の内容をコピーするだけで有効な鍵になります。（コピーするとき漏洩に注意）
                    サーバーの場合:  #// サーバーとサーバーの間の SSH 接続 の場合、SSH 接続できるユーザーが秘密鍵のオーナーです
                        - 秘密鍵は SSH 接続できる安全なユーザーで専用の SSH キーを新しく作ります。
                        - SSH 接続できるユーザーでログインできる担当者は、間接的に秘密鍵のオーナーです。
                        - ~/.ssh に置けばそのようになります。
                        - 定期的に作り直すのもよいでしょう。
                SSH キーを生成します:  #keyword: create SSH key,  ssh-keygen,  ssh-keygen command
                    #// 既存のキーと共通の鍵にするときは生成不要です。コピーで使えます
                    Linux の場合:  #// WSL 以外の場合
                        サーバーに配置する SSH キー（公開鍵）を作りなおします:
                            作るべき暗号方式とビット数を調べます:
                                既存のキーの暗号方式を確認します: #keyword: 秘密鍵 ヘッダー
                                    /home/__User__/.ssh/id_rsa:  #keyword: SSH 秘密鍵 ヘッダー
                                        先頭行が -----BEGIN OPENSSH PRIVATE KEY-----: OpenSSH 形式  #// OpenSSH 7.8 以降。2014年から
                                        先頭行が -----BEGIN RSA PRIVATE KEY-----: RSA 形式  #// OpenSSH 7.8 より前
                                        サンプル >> RSA 形式:
                                            -----BEGIN RSA PRIVATE KEY-----
                                            MIIEowIBAAKCAQEA07Rse29DKaOpqdNzBok82tHnWmjUfcFxG3dSSPoMmyA6tGCd
                                            （中略）
                                            5eBhPx+OsXvA1uY45Qfa6pIr/3B2n1zi4P1Q9dxmyRYJ2bD9nRPQ
                                            -----END RSA PRIVATE KEY-----
                                        #// バージョンの確認方法は ssh -V
                                    関連:  #glossary:
                                        .pem:  #// Privacy Enhanced Mail 形式,  PEM 形式
                                            先頭行が -----BEGIN CERTIFICATE-----:
                                                Unix/Linux環境で一般的
                                        .crt, .cer:  #// X.509証明書
                                            バイナリ(DER)形式またはテキスト(PEM)形式で保存可能
                                既存のキーのビット数を確認します:  #// 下記 2048 がビット数です
                                    #// Git bash
                                    $ ssh-keygen -lf /home/__User__/.ssh/id_rsa
                                    2048 d1:cb:15:df:5d:44:...
                            キーを生成します:
                                ~/.ssh/id_rsa とは別のキーを追加します: #keyword: ssh-keygen example
                                    Git bash:
                                        ED25519 形式 で作る場合:
                                            ssh-keygen  -f ~/.ssh/debug_id_rsa  -t ed25519
                                            #// -b オプションを指定しても無視されます。それでも RSA 3072ビットと同等の安全性があります
                                        OpenSSH 形式 で作る場合:  #// OpenSSH 7.8 以降のデフォルト  #search: SSH 秘密鍵 ヘッダー
                                            ssh-keygen  -f ~/.ssh/debug_id_rsa  -t rsa  -b 2048
                                            #// 古い Go 言語 などは、OpenSSH 形式 に対応していません  #search: OpenSSH 形式対応ライブラリ
                                        RSA 形式 で作る場合:  #// 古い形式  #search: SSH 秘密鍵 ヘッダー
                                            OpenSSH 7.8 以降:
                                                ssh-keygen  -f ~/.ssh/debug_id_rsa  -t rsa  -b 2048  -m PEM
                                            OpenSSH 7.8 より前:
                                                ssh-keygen  -f ~/.ssh/debug_id_rsa  -t rsa  -b 2048
                                        #// ssh-keygen コマンドで鍵を作ると自動的に chmod 600（した結果）になります
                                    -f オプション: 新規作成する秘密鍵ファイルのパス。 その末尾に .pub を追加した公開鍵ファイルも作られます
                                        すでにファイルがあるときは、上書き確認されます
                                    -t オプション:  #// 暗号方式
                                        ed25519: #search:
                                        rsa: RSA
