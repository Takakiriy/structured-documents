                            #template__: sed "s/ *|//"  |  patch  __BaseFilePath__  -o __OutputFilePath__
                    パッチ: |  #// インデントや | をそのままコピーしてコマンドの標準入力へ貼り付けます
                            |@@ -1,3 +1,3 @@
                            | a
                            |-b
                            |+X
                            | c
                        #// (Ctrl + D)
                        #// インデントや | が無いパッチを貼り付けても正しく動作します
                    出力:  #// cat _applied.out.txt
                        a
                        X
