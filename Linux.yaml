                コード: #keyword: Kafka code
                    Go >> segmentio:
                        binary-producer: #keyword: Kafka binary-producer Go  #// バイナリ データ を送ります
                            使い方:
                                ./binary-producer localhost:9092 my-topic log.bin 
                            ソース: |
                                package main

                                import (
                                    "context"
                                    "fmt"
                                    "log"
                                    "os"
                                    "time"

                                    "github.com/segmentio/kafka-go"
                                )

                                func main() {
                                    if len(os.Args) != 4 {
                                        fmt.Println("Usage: go run script.go <broker> <topic> <file_path>")
                                        os.Exit(1)
                                    }

                                    broker := os.Args[1]
                                    topic := os.Args[2]
                                    filePath := os.Args[3]

                                    data, err := os.ReadFile(filePath)
                                    if err != nil {
                                        log.Fatalf("Failed to read file: %v", err)
                                    }

                                    w := &kafka.Writer{
                                        Addr:         kafka.TCP(broker),
                                        Topic:        topic,
                                        Balancer:     &kafka.LeastBytes{},
                                        BatchTimeout: 10 * time.Millisecond,
                                        RequiredAcks: kafka.RequireAll,
                                    }

                                    ctx, cancel := context.WithTimeout(context.Background(), 10*time.Second)
                                    defer cancel()

                                    err = w.WriteMessages(ctx,
                                        kafka.Message{
                                            Value: data,
                                        },
                                    )
                                    if err != nil {
                                        log.Fatalf("Failed to write message: %v", err)
                                    }

                                    fmt.Printf("Successfully sent file %s to Kafka topic %s\n", filePath, topic)

                                    if err := w.Close(); err != nil {
                                        log.Fatalf("Failed to close writer: %v", err)
                                    }
                                }
                            関連:  #search: kafka-console-producer.sh
                    Go >> Sarama:
                        Kafka プロデューサー: | #keyword: Kafka go
                            package main

                            import (
                                "fmt"
                                "log"

                                "github.com/Shopify/sarama"
                            )

                            func main() {
                                // Kafkaブローカーアドレスを設定します
                                brokerList := []string{"localhost:9092"}

                                // プロデューサーの設定を作成します
                                config := sarama.NewConfig()
                                config.Producer.RequiredAcks = sarama.WaitForAll
                                config.Producer.Retry.Max = 5
                                config.Producer.Return.Successes = true

                                // プロデューサーを作成します
                                producer, err := sarama.NewSyncProducer(brokerList, config)
                                if err != nil {
                                    log.Fatalln("Failed to create Kafka producer:", err)
                                }
                                defer producer.Close()

                                // トピックとメッセージを指定します
                                topic := "my_topic"
                                message := "Hello, Kafka!"

                                // メッセージを作成します
                                msg := &sarama.ProducerMessage{
                                    Topic: topic,
                                    Value: sarama.StringEncoder(message),
                                }

                                // メッセージを送信します
                                partition, offset, err := producer.SendMessage(msg)
                                if err != nil {
                                    log.Println("Failed to send message:", err)
                                } else {
                                    fmt.Printf("Message sent successfully! Partition: %d, Offset: %d\n", partition, offset)
                                }
                            }
