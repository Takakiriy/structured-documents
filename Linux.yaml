    patch:  #keyword: Linux patch,  patch  #// apply patch  or  attach patch.  Git は apply
        ファイルの場合:  #// 1つのファイルにパッチを当てます
            基本:  #// __TargetFilePath__ のファイルを置き換えます
                コマンド:
                    patch __TargetFilePath__ __PatchFilePath__
                サンプル:
                    cat > _target.txt :  #// インデントは削除してください
                            a
                            b
                            c
                        #// (Ctrl + D)
                    cat > _patch.txt : |  #// インデントは削除してください。 ただし a と c の前に空白が必要です
                            @@ -1,3 +1,3 @@
                             a
                            -b
                            +X
                             c
                        #// (Ctrl + D)
                    コマンド:
                        - patch _target.txt _patch.txt  #// パッチを当てます
                            #template__: patch __TargetFilePath__ __PatchFilePath__
                        - cat _target.txt  #// 当てた結果を表示します
                    出力:
                        a
                        X
                        c
            すでに当たっているときでもエラーにしない:
                すでに当たっているか検索して確認する場合:
                    書式:
                        if ! grep -Fq '__AttachedContents__' "__FilePath__"; then
                            patch __TargetFilePath__ __PatchFilePath__
                        fi
                    #// -F オプションは、正規表現を使わない一部マッチです  #search: grep -F
                    #// 一部だけチェックすれば十分です
                （ボツ）すでに当たっていたらエラーにする場合:
                    ❗注意: patch コマンドのオプションだけでは、他のエラーと区別が付かないのでできません
                    コマンド詳細: |  #// サンプルは基本（上記）を参照
                        patch -N --dry-run  _target.txt _patch.txt   #// 実際に当てないで結果を表示します
                        echo $?   #// 0
                        patch _target.txt _patch.txt
                        echo $?   #// 0
                        patch -N --dry-run  _target.txt _patch.txt
                        echo $?   #// 1
                    コマンド: |  #// ワンライナー
                        patch -N --dry-run  _target.txt _patch.txt  &&  patch _target.txt _patch.txt
                        echo $?   #// 0
                        patch -N --dry-run  _target.txt _patch.txt  &&  patch _target.txt _patch.txt
                        echo $?   #// 1
            google-diff-match-patch の場合:  #search: google-diff-match-patch
            YAML にあるパッチを当てる場合: #keyword: apply patch in YAML  #// インデントや | をそのままコピーしてコマンドの標準入力へ貼り付けることができます
                関連 >> google-diff-match-patch の場合:  #search: google-diff-match-patch
                コマンド:
                    sed "s/ *|//"  |  patch  __BaseFilePath__  -o __OutputFilePath__
                サンプル:
