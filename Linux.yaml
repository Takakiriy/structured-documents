                                extras/7/x86_64   CentOS-7 - Extras        518
                                updates/7/x86_64  CentOS-7 - Updates   5,285+2
                対処C:
                    #search: createrepo
            - #// curl#5 - "Could not resolve proxy: proxy.____.jp; Unknown error"  #keyword: proxy DNS trouble
                手順: Dockerfile の RUN yum -y update 
                エラー: |
                    curl#5 - "Could not resolve proxy: proxy.____.jp; Unknown error"
                対処:
                    http_proxy などを IP アドレスに変えてみます。
                    他のホストで nslookup すると IP アドレスを調べることができるかもしれません。
                原因:
                    nslookup で解決できない。一部はキャッシュで動いている or 動かない可能性があります。
                    DNS の設定変更が浸透していない？
                参考:  #search: docker DNS trouble
            - #// Multilib version problems found.
                手順: yum install （古いバージョンのパッケージ）
                エラーメッセージを整形する場合:  #search: VSCode replace \n 改行
                エラー: |
                    Error:  Multilib version problems found. This often means that the root
                        cause is something else and multilib version checking is just
                        pointing out that there is a problem. Eg.:
                    Error:  Multilibバージョンの問題が見つかりました。 これは多くの場合、
                        根本的な原因が別のものであり、multilibバージョンチェックが問題があることを
                        指摘していることを意味します。

                    1. You have an upgrade for mysql-community-client-plugins which is missing some
                        dependency that another package requires. Yum is trying to
                        solve this by installing an older version of mysql-community-client-plugins of the
                        different architecture. If you exclude the bad architecture
                        yum will tell you what the root cause is (which package
                        requires what). You can try redoing the upgrade with
                        --exclude mysql-community-client-plugins.otherarch ... this should give you an error
                        message showing the root cause of the problem.
                    1. mysql-community-client-pluginsのアップグレードがありますが、別のパッケージに必要な依存関係がありません。
                        Yumは、異なるアーキテクチャのmysql-community-client-pluginsの古いバージョンをインストールすることで
                        これを解決しようとしています。 悪いアーキテクチャを除外すると、yumは根本的な原因が何であるかを教えてくれます
                        （どのパッケージが何を必要とするか）。 
                        --exclude mysql-community-client-plugins.otherarch ... を使用してアップグレードをやり直すことができます。
                        これにより、問題の根本原因を示すエラーメッセージが表示されます。

                    2. You have multiple architectures of mysql-community-client-plugins installed, but
                        yum can only see an upgrade for one of those architectures.
                        If you don't want/need both architectures anymore then you
                        can remove the one with the missing update and everything
                        will work.
                
                    3. You have duplicate versions of mysql-community-client-plugins installed already.
                        You can use \"yum check\" to get yum show these errors.
                対処:
                    新しいバージョンをインストールしようとしているパッケージをエラーメッセージから探します:
                        エラーメッセージの続きのサンプル: |
                            ...
                            Resolving Dependencies
                            --> Running transaction check
                            ---> Package mysql-community-client.x86_64 0:8.0.28-1.el7 will be installed
                            --> Processing Dependency: mysql-community-libs(x86-64) >= 8.0.11 for package: mysql-community-client-8.0.28-1.el7.x86_64
                            --> Running transaction check
                            ---> Package mariadb-libs.x86_64 1:5.5.65-1.el7 will be obsoleted
                            --> Processing Dependency: libmysqlclient.so.18()(64bit) for package: 2:postfix-2.10.1-9.el7.x86_64
                            --> Processing Dependency: libmysqlclient.so.18(libmysqlclient_18)(64bit) for package: 2:postfix-2.10.1-9.el7.x86_64
                            ---> Package mysql-community-libs.x86_64 0:8.0.29-1.el7 will be obsoleting
                            ...
                        サンプルの解説:  #keyword: yum install old version,  yum install old version package
                            リクエスト元: mysql-community-client-8.0.28
                            インストールしようとした依存するパッケージ: mysql-community-libs.x86_64 0:8.0.29
                            エラーの原因: mysql-community-libs のマイナー バージョン が 29 に上がってしまうこと
                    依存するパッケージもバージョンを指定してインストールします:
                        Ansible の場合のサンプル:
                            -   name: install MySQL RPM package - mysql-community-client
                                become: yes
                                yum:
                                    pkg: [
                                        mysql-community-client-8.0.28,
                                        mysql-community-libs-8.0.28,
                                        mysql-community-common-8.0.28,
                                        mysql-community-client-plugins-8.0.28,
                                        mysql-community-libs-compat-8.0.28]
                                    state: present
                                    allow_downgrade: yes
                        #// パッケージを書く順番がどちらが先でも同じ動きになります
            - #// cannot open Packages index using db5
                手順: yum install
                エラー: |
                    fatal: [control]: FAILED! => {"attempts": 3, "changed": false, "module_stderr":
                    "error: rpmdb: BDB0113 Thread/process 4694/140085099566912 failed: BDB1507 Thread died in Berkeley DB library
                    error: db5 error(-30973) from dbenv->failchk: BDB0087 DB_RUNRECOVERY: Fatal error, run database recovery
                    error: cannot open Packages index using db5 -  (-30973)
                    error: cannot open Packages database in /var/lib/rpm\nTraceback (most recent call last):
                    File \"/home/vagrant/.ansible/tmp/ansible-tmp-1648452165.07-5029-221476171446735/AnsiballZ_yum.py\", line 102, in <module>
                        _ansiballz_main()
                対処:  #// 以下のいずれか
                    yum install を入力したシェルから:
                        sudo rm -rf /var/lib/rpm/__db.00*  &&  sudo rpm --rebuilddb
                    Ansible を使っている場合:
                        ssh  vagrant@localhost  -p __PortNum__  -i .vagrant/machines/__Machine__/virtualbox/private_key \
                            'sudo rm -rf /var/lib/rpm/__db.00*  &&  sudo rpm --rebuilddb'
