        トラブルシューティング (SSH): #keyword: SSH trouble
            ssh でログインしようとしたら Permission denied (publickey,gssapi-keyex,gssapi-with-mic).:
                手順: ssh __IP_Address__  または  ssh __User__@__Host__
                エラー:  #// 以下のいずれか  #keyword: SSH Permission denied
                    Permission denied (publickey).
                    Permission denied (publickey,gssapi-keyex,gssapi-with-mic).
                対処A:  #// 使っている鍵を確認します
                    ssh __ServerAccount__@__ServerNameOrIPAddress__ 形式のコマンドの場合:
                        明示的に -i オプションを指定します:
                            ssh __ServerAccount__@__ServerNameOrIPAddress__  -i __SecretKeyPath__
                    ssh __SshConfigName__ 形式のコマンドの場合:
                        ~/.ssh/config ファイルの中を確認します: |  #search: ~/.ssh/config
                            Host __SshConfigName__
                                ...
                                IdentityFile __SecretKeyPath__
                                ...
                    公開鍵が合っているか確認します:
                        秘密鍵のファイルから公開鍵を調べます:  #search: ssh show public key
                        サーバーに公開鍵が入っていることを確認します:  #search: SSH authorized_keys
                対処B:  #// 別の方法でサーバーにログインできる場合:
                    ssh コマンドの詳細を表示します:
                        Git bash:
                            (@client) ssh -v __ServerAccount__@__ServerNameOrIPAddress__
                                #// -vv, -vvv オプションに変えるともっと詳細になりますが最初は -v がよいでしょう
                        使っている秘密鍵ファイルの場所: |
                            debug1: Trying private key: /home/vagrant/.ssh/id_rsa
                    サーバーのログを見ます:
                        サーバーにログインします:
                            VirtualBox の VM の画面を表示してログインします
                        サーバーのログを見ます:
                            コマンド:
                                sudo tail  /var/log/secure
                        エラー bad ownership の場合:
                            ログ /var/log/secure: |
                                Authentication refused: bad ownership or modes for directory /home/user1/.ssh
                            状況: |
                                $ ls -la ~__User__    #// ~ は必要です
                                drwxr-xr-x   6 __User__ __User__ 4096 Jan 1 15:00 .
                                drwxrwxr-x   2 __User__ __User__ 4096 Jan 1 15:01 .ssh
                対処C:  #// GitHub などのサーバーにログインする場合:
                    #search: git clone SSH
                対処D:  #// PowerShell を使っている場合:
                    Git bash で試してみます
                対処E:
                    /etc/ssh/sshd_config
            ログイン後 10秒で Connection to localhost closed by remote host.:
                手順: ssh user1@localhost -p 2802
                実行の様子: |
                    $ ssh user1@localhost -p 2802
                    user1@localhost's password: 
                    Last login: Fri Jan 1 12:00:00 2024
                    [user1@__HostName__ ~]$ Connection to localhost closed by remote host.
                    Connection to localhost closed.
                対処:
                    wsl -d "__Distro__" コマンドでログインした状態であれば closed されません。
                    なお、VSCode を使う場合 ssh 接続を使う必要はありません。REMOTE EXPLORER で WSL Targets を選んでください。
            ssh でログインするのに 50秒かかる:
                手順: ssh -v __SshConfigName__
                状況: ssh でログインするのに 50秒かかる
                対処:
                    VirtualBox のネットワーク内に DNS を立てている場合:
                        DNS の VM の電源を入れます。date コマンドで表示される現在日時を正しくします
            ssh でログインしようとしたらタイムアウト:
                手順: ssh __FQDN__ は失敗し ssh __WithoutDomain__ は成功する
                エラー: （タイムアウト）
                対処:
                    nslookup __FQDN__ が失敗する場合:
                        DNS の設定を確認します  #search: install DNS
            ssh:;; connect to host __HostName__ port 22:;; Connection refused:  #keyword: port 22 Connection refused
                手順とエラー: |
                    $ ssh __Options__ __HostName__
                    ssh: connect to host __HostName__ port 22: Connection refused

                    $ telnet __HostName__ 22
                    Trying __IPAddress__...
                    telnet: connect to address __IPAddress__: Connection refused
                対処A:
                    VM の電源を入れる
                対処B:
                    ~/.ssh/known_hosts から古い接続を削除します
                対処C:
                    ポートをリッスンしていることを確認します:
                        サーバーで実行するコマンド:
                            - sudo ss -tulnp | grep 22   #// root ユーザーでなければ PID は表示されません
                            #// または
                            - netstat -tulnp | grep 22
                        出力例:
                            ss -tulnp:
                                - tcp    LISTEN   0   128    *:22   *:*  #// SSH サーバーの全ての NIC に対してポート22 をリッスンします
                                - tcp    LISTEN   0   128    __IPAddress__:22   *:*   #// __IPAddress__ を持つ NIC に対してポート22 をリッスンします
                対処D:
                    サーバー側の IP アドレスまたは VIP（sshd_config 内）の設定を確認します:  #// クライアント側の IP アドレスではありません
                        #// SSH サーバーの sshd_config ファイルの ListenAddress に、SSH サーバーを登録します
                        #// sshd（SSH サービス）がリッスンする NIC（サーバー側の IP アドレス, VIP に注意）を制限します
                        /etc/ssh/sshd_config : |
                            ListenAddress __IPAddress__
                        #search: sshd ListenAddress
                        注意:
                            #// VIP でのみ Connection refused される場合は、VIP でリッスンしていることを確認します
                対処E:
                    Windows の ネットワーク アダプター の IPv6 を無効にして、
                    ネットワーク アダプター を 無効 にして 有効 にします。
                    #search: Windows IPv6
                その他の対策:
                    #search: /etc/hosts,  /etc/hosts.allow
                    #search: Connection refused
