                ファイルを展開します:  #keyword: RPM extract files,  rpm2cpio
                    ファイル以外もすべて展開する場合:  #search: rpm-open
                    cpio のインストール: #keyword: cpio  #// cpio はアーカイブ形式の 1つです。cpio が選ばれているのは古い設計の名残です。
                        sudo dnf install -y  cpio
                    Rocky8, CentOS7:
                        #↓展開先
                        カレント フォルダー:
                            rpm2cpio __RPM_FilePath__ | cpio -idm
                        指定のフォルダー:
                            rm -rf __OutputPath__;  mkdir -p __OutputPath__
                            rpm2cpio __RPM_FilePath__ | (cd __OutputPath__ && cpio -idm)
                メタ情報: #keyword: RPM meta
                    表示:
                        rpm コマンドを使う場合: |
                            $ rpm -qip __RpmFilePath__
                                Name        : example
                                Epoch       : 0
                                Version     : 1.0.0~rc.5
                                Release     : 1
                                Architecture: noarch
                                Install Date: (not installed)
                                Group       : (none)
                                Size        : 1234567
                                License     : 
                                Signature   : (none)
                                Source RPM  : example-1.0.0~rc.5-1-src.rpm
                                Build Date  : Tue Oct 10 10:10:10 2024
                                Build Host  : host-01
                                Relocations : (not relocatable)
                                Packager    : user1
                                Vendor      :
                                URL         :
                                Summary     :
                                Description :
                        rpm-open コマンドを使う場合:  #search: rpm-open
                    変更: #keyword: edit RPM meta  #// RPM ファイルのメタ情報を変更します
                        注意: STG 環境にインストールする RPM も、一度 rpmrebuild を通したものを使ってください。rpmbuild による悪影響が無いことを確認するため
                        （必要なら）rpmrebuild をインストールします:
                            sudo dnf install -y rpmrebuild
                        メタ情報を変更します:
                            手動の場合:
                                コマンド サンプル: |
                                    rpmrebuild  --change-spec-preamble='sed  -e "s/^Version:.*/Version: 1.0.0/"  -e "s|^URL:.*|URL: https://example.com/|"  -e "s/^License:.*/License: Proprietary/"'  --directory "${PWD}"  --notest-install  --package "__Package__-1.0.0~rc.1-1.noarch.rpm"
                            自動の場合:
                                rpm-version-to スクリプト: #keyword: rpm-version-to  #// 1つの RPM ファイルの場合
                                    ヘルプ:  #focus: Help
                                    コード: |  #// URL と License を修正してから使ってください
                                        #!/bin/bash

                                        URL="https://example.com/"
                                        License="Proprietary"

                                        function  Help() {
                                            echo  "rpm-version-to"
                                            echo  "    Changes RPM file release qualifier."
                                            echo  "Example: rpm-version-to  prd  example-1.0.0~rc.2-1.x86_64.rpm"
                                            echo  "    Output: x86_64/example-1.0.0-1.x86_64.rpm"
                                            echo  "    sub command: prd or same"
                                        }

                                        ReleaseQualifier="$1"  #// "prd" or "same"
                                        RpmFilePath="$2"

                                        function  Main() {
                                            which rpmrebuild > /dev/null 2>&1  ||  Error  "Not found rpmrebuild command. Enter the command: sudo dnf install -y rpmrebuild"
                                            if [ "$1" == "--help" ] || [ "$1" == "" ] || [ "$2" == "" ]; then
                                                Help
                                                exit 0
                                            fi
                                            local  version="$( GetVersionFromRpmName "${RpmFilePath}" )"
                                            local  arch="$( GetArchFromRpmName "${RpmFilePath}" )"
                                            local  prdRpmFilePath="${PWD}/${arch}/$( GetPrdRpmName "${RpmFilePath}" )"
                                            local  sameRpmFilePath="${PWD}/${arch}/${RpmFilePath##*/}"  #// right of last "/"
                                            if [ "${ReleaseQualifier}" == "prd" ]; then
                                                local  secondRpmFilePath="${prdRpmFilePath}"
                                            elif [ "${ReleaseQualifier}" == "same" ]; then
                                                local  secondRpmFilePath="${sameRpmFilePath}"
                                            fi

                                            local  sedOptionArray=(
                                                "-e 's|^URL:.*|URL: ${URL}|'"
                                                "-e 's/^License:.*/License: ${License}/'"
                                            )
                                            if [ "${ReleaseQualifier}" == "prd" ]; then
                                                sedOptionArray+=( "-e 's/^Version:.*/Version: ${version}/'" )
                                            fi
                                            local  sedOptions="${sedOptionArray[@]}"

                                            rpmrebuild  \
                                                --define "_binaries_in_noarch_packages_terminate_build 0" \
                                                --change-spec-preamble "sed  ${sedOptions}"  \
                                                --change-spec-files "sed  -e '1i %exclude /usr/lib/.build-id'  -e '1i %exclude /usr/lib/.build-id/*'"  \
                                                --directory "${PWD}"  \
                                                --notest-install  \
                                                --package "${RpmFilePath}"
                                                #// 1st --change-spec-files option warns "File not found".

                                            #// 2nd --change-spec-files option
                                            rpmrebuild  \
                                                --change-spec-files "sed  -e '1i %exclude /usr/lib/.build-id'  -e '1i %exclude /usr/lib/.build-id/*'"  \
                                                --directory "${PWD}"  \
                                                --package "${secondRpmFilePath}"

                                            echo  ""
                                            echo  "Hint: warning of File not found .build-id and Explicit %attr can be ignored."
                                        }

                                        function  GetArchFromRpmName() {
                                            local  rpmFilePath="$1"
                                            local  arch="${rpmFilePath%.*}"  #// left of last "."
                                            arch="${arch##*.}"  #// right of last "."

                                            echo  "${arch}"
                                        }

                                        function  GetPrdRpmName() {
                                            local  rpmFilePath="$1"
                                            local  rpmFileName="${rpmFilePath##*/}"  #// right of last "/"
                                            local  prdRpmName1="${rpmFileName%%~*}"  #// left of "~"
                                            local  prdRpmName2="${rpmFileName##*-}"  #// right of last "-"
                                            local  prdRpmName="${prdRpmName1}-${prdRpmName2}"

                                            echo  "${prdRpmName}"
                                        }

                                        function  GetVersionFromRpmName() {
                                            local  rpmFilePath="$1"
                                            local  version="${rpmFilePath%-*}"  #// left of last "-"
                                            version="${version##*-}"  #// right of last "-"
                                            version="${version%%~*}"  #// left of "~".  e.g. "1.0.0"

                                            echo  "${version}"
                                        }

                                        function  Error() {
                                            echo  "$1"  >&2
                                            exit 2
                                        }

                                        Main  "$@"
                                rpms-version-to.sh スクリプト: #keyword: rpms-version-to.sh  #// 複数の RPM ファイルの場合。また、比較用フォルダーを作ります
                                    #// 内部で rpmrebuild を使っています
                                    ヘルプ:  #focus: Help
                                    コード: |  #// RpmFiles と TargetReleaseQualifier を修正してから使ってください
                                        #!/bin/bash

                                        TargetReleaseQualifier="prd"  #// "prd" or "same"
                                        RpmFiles=(
                                            "example-a-1.0.0~rc.1-1.x86_64.rpm"
                                            "example-b-1.0.0~rc.1-1.x86_64.rpm"
                                        )
                                        OutputFolder="_out"
                                        SourceExpandedFolderName="source_RPM_expanded"
                                        OutExpandedFolderName="out_RPM_expanded"
                                        RpmVersionToCommand="rpm-version-to"
                                        RpmOpenCommand="rpm-open"

                                        function  Help() {
                                            echo  "rpms-version-to.sh"
                                            echo  "    Changes RPM files release qualifier."
                                            echo  "Example:"
                                            echo  "    Edit RpmFiles variable in this script."
                                            echo  "    Run this script with --go option."
                                            echo  "        rpms-version-to.sh --go"
                                            echo  "    Output:"
                                            echo  "        ${OutputFolder}/*.rpm"
                                            echo  "        ${OutputFolder}/new_expanded/*"
                                            echo  "        ${OutputFolder}/old_expanded/*"
                                            echo  "TargetReleaseQualifier: ${TargetReleaseQualifier}"
                                        }

                                        function  Main() {
                                            if [ "$1" == "--help" ] || [ "$1" != "--go" ]; then
                                                Help
                                                exit 0
                                            fi

                                            #// Make version changed RPM file.
                                            for rpmFilePath in "${RpmFiles[@]}" ;do
                                                echo  "$ ${RpmVersionToCommand}  ${TargetReleaseQualifier}  \"${rpmFilePath}\""
                                                "${RpmVersionToCommand}"  "${TargetReleaseQualifier}"  "${rpmFilePath}"
                                            done

                                            #// Move .rpm files.
                                            echo  "Move .rpm files to \"${OutputFolder}\""
                                            mkdir -p  "${OutputFolder}"
                                            for rpmFilePath in "${RpmFiles[@]}" ;do
                                                local  arch="$( GetArchFromRpmName "${rpmFilePath}" )"
                                                local  rpmFileName="$( GetOutputRpmName "${rpmFilePath}" )"
                                                if [ -e "${arch}/${rpmFileName}" ]; then

                                                    mv  "${arch}/${rpmFileName}"  "${OutputFolder}"
                                                fi
                                            done

                                            #// Extract (open) .rpm files.
                                            mkdir -p  "${OutputFolder}"
                                            for rpmFilePath in "${RpmFiles[@]}" ;do
                                                local  rpmFileName="$( GetOutputRpmName "${rpmFilePath}" )"

                                                echo  "$ ${RpmOpenCommand}  \"${rpmFilePath}\"  --out \"${OutputFolder}/${SourceExpandedFolderName}/${rpmFileName}\""
                                                "${RpmOpenCommand}"  "${rpmFilePath}"  --out "${OutputFolder}/${SourceExpandedFolderName}/${rpmFileName}"

                                                echo  "$ ${RpmOpenCommand}  \"${OutputFolder}/${rpmFileName}\"  --out \"${OutputFolder}/${OutExpandedFolderName}/${rpmFileName}\""
                                                "${RpmOpenCommand}"  "${OutputFolder}/${rpmFileName}"  --out "${OutputFolder}/${OutExpandedFolderName}/${rpmFileName}"
                                            done

                                            #// Guide
                                            echo  ""
                                            echo  ".rpm files were rebuilt."
                                            echo  "You should compare .rpm extracted folders."
                                            echo  "    Enter the command: codediff \"${OutputFolder}/${SourceExpandedFolderName}\" \"${OutputFolder}/${OutExpandedFolderName}\""
                                            echo  "    codediff command shows different files by git diff commits."
                                        }

                                        function  GetArchFromRpmName() {
                                            local  rpmFilePath="$1"
                                            local  arch="${rpmFilePath%.*}"  #// left of last "."
                                            arch="${arch##*.}"  #// right of last "."

                                            echo  "${arch}"
                                        }

                                        function  GetPrdRpmName() {
                                            local  rpmFilePath="$1"
                                            local  rpmFileName="${rpmFilePath##*/}"  #// right of last "/"
                                            local  prdRpmName1="${rpmFileName%%~*}"  #// left of "~"
                                            local  prdRpmName2="${rpmFileName##*-}"  #// right of last "-"
                                            local  prdRpmName="${prdRpmName1}-${prdRpmName2}"

                                            echo  "${prdRpmName}"
                                        }

                                        function  GetOutputRpmName() {
                                            local  rpmFilePath="$1"
                                            if [ "${TargetReleaseQualifier}" == "prd" ]; then
                                                rpmFileName="$( GetPrdRpmName "${rpmFilePath}" )"
                                            else
                                                rpmFileName="${rpmFilePath##*/}"  #// right of last "/"
                                            fi

                                            echo  "${rpmFileName}"
                                        }

                                        Main  "$@"
                        できたファイルのメタ情報を表示します:
                            rpm -qip  "noarch/__Package__-1.0.0-1.noarch.rpm"
                        追加されるファイルについて: #keyword: append by edit RPM meta
