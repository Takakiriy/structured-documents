            repoquery:
                依存先, 必要な RPM:  #keyword: RPM dependency
                    直下:
                        -   repoquery --requires --resolve  __Package__
                        -   repoquery --requires --resolve  __PackageA__  __PackageB__  __PackageC__
                    再起的:
