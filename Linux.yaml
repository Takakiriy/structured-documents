                        Fluentd + Kafka: #keyword: Fluentd + Kafka example
                            ____/fluentd/compose.yaml : |
                                services:
                                    fluentd:
                                        build:
                                            context: .
                                            dockerfile: ./Dockerfile
                                            args:
                                                -   http_proxy=${http_proxy}
                                                -   https_proxy=${https_proxy}
                                                -   no_proxy=${no_proxy}
                                        environment:
                                            -   http_proxy=${http_proxy}
                                            -   https_proxy=${https_proxy}
                                            -   no_proxy=${no_proxy}
                                        volumes:
                                            -   ./fluent.conf:/fluentd/etc/fluent.conf
                                            -   ./log:/fluentd/log
                                        ports:
                                            -   "514:514/udp"
                                        networks:
                                            -   logging_network

                                    zookeeper:
                                        image: wurstmeister/zookeeper:latest
                                        ports:
                                            -   "2181:2181"
                                        networks:
                                            -   logging_network

                                    kafka:
                                        image: wurstmeister/kafka:latest
                                        ports:
                                            -   "9092:9092"
                                        environment:
                                            KAFKA_ADVERTISED_HOST_NAME: kafka
                                            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
                                            KAFKA_CREATE_TOPICS: "syslog:1:1"  # トピック名:パーティション数:レプリケーション数
                                        volumes:
                                            -   /var/run/docker.sock:/var/run/docker.sock
                                        depends_on:
                                            -   zookeeper
                                        networks:
                                            -   logging_network

                                networks:
                                    logging_network:
                                        driver: bridge
                            ____/fluentd/Dockerfile : |
                                FROM fluent/fluentd:v1.16

                                # fluent-plugin-kafka
                                USER root
                                RUN apk add --no-cache --update \
                                    build-base \
                                    ruby-dev \
                                    && gem install fluent-plugin-kafka \
                                    && gem sources --clear-all \
                                    && apk del build-base ruby-dev \
                                    && rm -rf /tmp/* /var/tmp/* /usr/lib/ruby/gems/*/cache/*.gem

                                USER fluent
                            ____/fluentd/fluent.conf : |
                                <source>
                                    @type syslog
                                    port 514
                                    bind 0.0.0.0
                                    tag system.syslog
                                    <parse>
                                        @type syslog
                                        message_format rfc5424
                                    </parse>
                                </source>

                                <match **>
                                    @type kafka2

                                    brokers kafka:9092
                                    topic_key topic
                                    default_topic syslog

                                    <format>
                                        @type json
                                    </format>

                                    <buffer>
                                        @type memory
                                        flush_interval 1s
                                    </buffer>
                                </match>

                                <label @FLUENT_LOG>
                                    <match fluent.*>
                                        @type file
                                        path /fluentd/log/fluent.log
                                    </match>
                                </label>
                            コマンド: |
                                cd  ____/fluentd
                                # docker-compose down
                                sudo rm -rf log
                                    mkdir -p  log
                                    chmod 777 log
                                docker-compose up -d
                                    docker logs fluentd-fluentd-1
                                    docker logs fluentd-kafka-1
                                logger  --server localhost  --port 5140  "Test message"
                                docker exec -it  fluentd-kafka-1  bash
                                    kafka-topics.sh --list --zookeeper zookeeper:2181
                                        syslog
                                    kafka-console-consumer.sh  --bootstrap-server localhost:9092  --topic syslog  --from-beginning
                                        {"host":"__Host__","ident":"user1","pid":"-","msgid":"-","extradata":"[timeQuality tzKnown=\"1\" isSynced=\"1\" syncAccuracy=\"3539\"]","message":"Test message"}
                                        Ctrl + C
                                    exit
                                docker-compose down
