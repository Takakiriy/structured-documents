    traceroute: #keyword: Linux traceroute  #// tracert の Linux 版。ネットワークの経路を表示します。どこまで届いているかが分かります
        サンプル: traceroute www.example.net
            #search: Windows tracert
        解説:  #ref: https://gigazine.net/news/20240901-traceroute-packet-exploring/
    netstat:  #// ポートの状態を表示します
        インストール: sudo yum install -y  net-tools
        基本:
            Linux:
                - sudo netstat -lnp  #// sudo を付けないとプロセス名や Path などが表示されません
                - sudo netstat -tulnp  #search: port 22 Connection refused
            Windows:
                - netstat -aon | findstr :__PortNum__
        プログラムも表示します: sudo netstat -tulpn
        出力例: |
            Active Internet connections (only servers)
            Proto Recv-Q Send-Q Local Address           Foreign Address         State     PID/Program name
            tcp        0      0 :::8500                 :::*                    LISTEN    -
            tcp        0      0 :::8600                 :::*                    LISTEN    -
            udp        0      0 :::8301                 :::*                              -
            udp        0      0 :::8600                 :::*                              -
            Active UNIX domain sockets (only servers)
            Proto RefCnt Flags       Type       State         I-Node Path
        Local Address の意味:  #search: local address port setting
    ss:  #// ポートの状態を表示します (CentOS7, Ubuntu-20.04)
        基本:
            - ss -atn  #// https://www.linuxmaster.jp/linux_skill/2009/02/linux-4.html
            - ss -tulnp  #// ChatGPT  #search: port 22 Connection refused
        出力例: |  #// ss -tulnp
            Netid  State      Recv-Q Send-Q   Local Address:Port    Peer Address:Port              
            udp    UNCONN     0      0        192.168.33.44:22          *:*           users:(("sshd",pid=1111,fd=7))
            udp    UNCONN     0      0                    *:12345       *:*           users:(("rsyslogd",pid=1122,fd=8))
        出力からプロセスを調べます:
            (root@) ps aux | grep __PID__  #search: ps
        ポートが使われているかどうかを判定します:
            if ss -ln | grep -q ":${port} " > /dev/null; then
        Local Address:Port の意味:  #keyword: local address port setting
            概要: local address を * ではなく IP アドレスを明示的に指定することで、対象 NIC を制限できます
            サンプル:  #// ss -tulnp
                - tcp    LISTEN   0   128    *:22   *:*  #// SSH サーバーの全ての NIC に対してポート22 をリッスンします
                - tcp    LISTEN   0   128    __IPAddress__:22   *:*   #// __IPAddress__ を持つ NIC に対してポート22 をリッスンします
        設定の変更:
            #search: /etc/ssh/sshd_config
    nslookup: #keyword:  #// ホスト名（サーバー名）から IP アドレスを調べます。逆引きもできます
        書式:
            成功した場合: |  #focus: Name:,  __Target_IP_Address__
                $ nslookup __TargetFQDN__
                Server:         __DNS_IP_Address__
                Address:        __DNS_IP_Address__#53

                Non-authoritative answer:
                Name:   __TargetFQDN__
                Address: __Target_IP_Address__
            DNS がホスト名を解決できない場合: |  #focus: server can't find   #// 関連: #search: docker DNS trouble
                $ nslookup __TargetFQDN__
                Server:         __DNS_IP_Address__
                Address:        __DNS_IP_Address__#53

                ** server can't find __TargetFQDN__: NXDOMAIN
            IP アドレス(000.000.000.000)からホスト名を調べる場合: |  #focus: in-addr.arpa,  __TargetFQDN__
                $ nslookup __Target_IP_Address__
                Server:         __DNS_IP_Address__
                Address:        __DNS_IP_Address__#53

                Non-authoritative answer:
                __Target_Reverse_IP_Address__.in-addr.arpa      name = __TargetFQDN__.
        IP アドレスだけ表示します: #keyword: dig IP address,  nslookup IP address
            基本:
                -   dig +short __ServerName__
                -   nslookup example.com | grep 'Address:' | grep -v '#' | awk '{ print $2 }'  #// 未確認
            FQDN 部分を IP アドレスに変えます:  #search: docker build proxy IP address
            eth1 の IPv4 アドレス:
                ip -4 addr show eth1 | grep inet | awk '{print $2}' | cut -d/ -f1
        DNS エイリアス（CNAME）チェーン: | #keyword: DNS CNAME chain
            $ nslookup proxy.example.com
                Server:         10.146.200.10
                Address:        10.146.200.10#53

                Non-authoritative answer:
                proxy.example.com   canonical name = proxy.site.example.com.
                proxy.site.example.com      canonical name = proxy-e.example.com.
                proxy-e.example.com canonical name = proxy1.example.com.
                Name:   proxy1.example.com
                Address: 10.131.129.12
                Name:   proxy1.example.com
                Address: 2001:240:168:c307::1:12

            $ dig proxy.example.com
                ;; QUESTION SECTION:
                ;proxy.example.com.                 IN      A

                ;; ANSWER SECTION:
                proxy.example.com.          35      IN      CNAME   proxy.site.example.com.
                proxy.site.example.com.     558     IN      CNAME   proxy-e.example.com.
                proxy-e.example.com.        35      IN      CNAME   sri-proxy1.example.com.
                sri-proxy1.example.com.     66      IN      A       10.131.129.12

                ;; SERVER: 10.146.200.10#53(10.146.200.10)

            DNS エイリアス（CNAME）チェーン を示しています：
                proxy.example.com → proxy.site.example.com にリダイレクト
                proxy.site.example.com → proxy-e.example.com にリダイレクト
                proxy-e.example.com → proxy1.example.com にリダイレクト
                proxy1.example.com → 最終的に 10.131.129.12 に解決
        トラブルシューティング:  #search: proxy DNS trouble
    nc: #keyword: Linux nc  #// netcat。busy box でも使えます。CentOS7 docker では使えません
        コマンドの書式:
            nc -zv __HostName__ __PortNum__
                または
            nc -z __HostName__ __PortNum__ ;  echo $?
        診断例:
            疎通できたとき: |
                $ nc -z elastic 9200 ;  echo "exit code: $?"
                0
            ポート番号が開かれていないとき: |
                $ nc -z elastic 9222 ;  echo "exit code: $?"
                1
            ホスト名が DNS に登録されていないとき: |
                $ nc -z ela____ 9200 ;  echo "exit code: $?"
                nc: bad address 'ela____'
                1
            サーバーが起動していないか、サーバーがネットワークにつながっていないとき: |
                    $ nc -z 172.24.0.4 ;  echo "exit code: $?"
                #// 3秒たってタイムアウトしたら、疎通できていません
        開くまで待つ: #search: wait for Linux service
        サービスへリクエスト: #keyword: client nc  #// TCP または UDP でリクエストを送信します
            Zookeeper: #search: ZooKeeper nc stat
                #snip: echo stat | nc localhost 2181  #// localhost の Zookeeper の状態を表示します
        関連 >> 疎通確認:  #search: 疎通確認
