        bash >> Ctrl + C キーを押したときの処理:  #search: bash function exit trap
        その他の言語:  #ref: https://rosettacode.org/wiki/Handle_a_signal
    終了コード: #keyword: exit code,  終了ステータス
        参照: $?
        終了コードを変数に入れます:  #search: exit code variable
        エラーを発生させます:  #// エラーが発生したときに終了コードの値を表示します
            sed コマンドでエラーを発生させる: |
                $ sed 's/error'
                sed: -e expression #1, char 7: unterminated `s' command
                $ echo $?
                1
            (&&) でつなげたとき: |  #// 途中でエラーが発生したら、そのエラーの終了コードが格納されます
                $ sed 's/error'  &&  echo  "Pass"
                sed: -e expression #1, char 7: unterminated `s' command
                $ echo $?
                1
        $( ) の中の exit をキャッチします: #keyword: Linux substitution exit code
            bashlib:  #search: bashlib ExitIfMatched
            基本サンプル:
                local  out="$(x="$( echo "success S9" )" && echo "$x" || echo "(ERROR)" )"
                if [ "${out}" == "(ERROR)" ]; then  echo  "exit  2";  return  ;fi
            検証コード: |
                function  return_1() {
                    echo  "return_1"
                    return  1
                }
                out="$(return_1)"
                echo  "return_1: \$? = $?"  #=> return_1: $? = 1  ... OK
                echo  "return_1: \${out} = ${out}"  #=> return_1: $out = return_1  ... OK

                function  exit_1() {
                    echo  "exit_1"
                    echo  "exit_1 stderr" >&2
                    exit  1
                }

                function  exit_0() {
                    echo  "exit_0"
                    exit  0
                    echo  "----"
                }

                function  r2() {
                    local  out="$(return_1)"
                    echo  "r2: \$? = $?"  #=> r2: $? = 0  ... NG
                    echo  "r2: \${out} = ${out}"  #=> r2: $out = return_1  ... OK
                }
                r2

                function  r3() {
                    Out="$(return_1)"
                    echo  "r3: \$? = $?"  #=> r3: $? = 1  ... OK
                    local  out="${Out}"
                    echo  "r3: \${out} = ${out}"  #=> r3: $out = return_1  ... OK
                }
                r3

                function  r4() {
                    local  out="$(return_1  ||  echo $? )"
                    echo "r4: \${out} = ${out}"  #=> r4: ${out} = return_1\n1  ... OK
                }
                r4

                function  e4() {
                    local  out="$(exit_1  ||  echo $? )"
                    echo "e4: \${out} = ${out}"  #=> e4: ${out} = exit_1 ... NG
                }
                e4

                function  s5() {
                    Out="$(exit_0)"  ||  echo  "s5: || \$? = $?"  ;local  out="${Out}"  #=>  ... OK
                    echo "s5: \${out} = ${out}"  #=> s5: ${out} = exit_0  ... OK
                }
                s5

                function  e5() {
                    Out="$(exit_1)"  ||  echo  "e5: || \$? = $?"  ;local  out="${Out}"  #=> e5: || $? = 1  ... OK
                    echo "e5: \${out} = ${out}"  #=> e5: ${out} = exit_1  ... OK
                }
                e5

                function  r5() {
                    Out="$(return_1)"  ||  echo  "r5: || \$? = $?"  ;local  out="${Out}"  #=> r5: || $? = 1  ... OK
                    echo "r5: \${out} = ${out}"  #=> r5: ${out} = return_1  ... OK
                }
                r5

                function  e6() {
                    local  out="$(exit_1)"  ||  out="$?"
                    echo "e6: \${out} = ${out}"  #=> e6: ${out} = exit_1  ... NG
                }
                e6

                function  e7() {
                    local  out="$(x="$( echo "success SA" )" && echo "$x" || echo "$?" )"
                    echo "s7: \${out} = ${out}"  #=> s7: ${out} = exit_0  ... OK
                }
                s7

                function  e7() {
                    local  out="$(x="$( exit_1 )" && echo "$x" || echo "$?" )"
                    echo "e7: \${out} = ${out}"  #=> e7: ${out} = 1  ... OK
                }
                e7

                function  e7e() {
                    local  out="$(x="$( exit_1 )" && echo "$x" || exit $? )"  #// not exit  ... NG
                    echo "e7e: \${out} = ${out}"
                }
                e7e

                #// improved s5
                function  s6() {
                    out="$( echo "success S6" )"  || exit $? ;local  out="${out}"
                    echo "s6: \${out} = ${out}"  #=> s6: ${out} = success S6  ... OK
                }
                s6

                function  s62() {
                    out="$( s6 )"  || exit $? ;local  out="${out}"
                    echo "s62: \${out} = ${out}"  #=> s62: ${out} = s6: ${out} = success S6  ... OK

                    local  out="not overwritten"
                    s6
                    echo "s62: \${out} = ${out}"  #=> s62: ${out} = success S6  ... NG

                    local  out="not overwritten"
                    s62sub
                    echo "s62: \${out} = ${out}"  #=> s62: ${out} = not overwritten  ... OK
                }
                function  s62sub() {
                    local  out="$( s6 )"
                }
                s62

                #// improved s7
                function  s9() {
                    local  out="$(x="$( echo "success S9" )" && echo "$x" || echo "(ERROR)" )"
                    if [ "${out}" == "(ERROR)" ]; then  echo  "exit  2";  return  ;fi
                    echo "s9: \${out} = ${out}"  #=> s9: ${out} = success S9  ... OK
                }
                s9

                function  s92() {
                    local  out="$(x="$( s9 )" && echo "$x" || echo "(ERROR)" )"
                    echo "s92: \${out} = ${out}"  #=> s92: ${out} = s9: ${out} = success S9  ... OK

                    out="not overwritten"
                    s9
                    echo "s92: \${out} = ${out}"  #=> s92: ${out} = not overwritten  ... OK
                }
                s92

                function  e9() {
                    local  out="$(x="$( exit_1 )" && echo "$x" || echo "(ERROR:$?)" )"  #=> exit_1 stderr  ... OK
                    if [[ "${out}" =~ \(ERROR:[0-9]*\) ]]; then  echo  "exit ${out}";  return  ;fi  #=> exit (ERROR:1)  ... OK
                    echo "e9: \${out} = ${out}"
                }
                e9
        パイプ: #keyword: pipe exit code  #// パイプを含むコマンドの終了コード
            $?: 最も右のコマンドの終了コード
            ${PIPESTATUS[@]}: #keyword: PIPESTATUS  #// zsh は ${pipestatus[@]}  #// 各コマンドの終了コード
                Command1 | Command2 の場合:
                    Command1 の終了コード: ${PIPESTATUS[0]}
                    Command2 の終了コード: ${PIPESTATUS[1]}
                    すべて成功したことをチェックします:
                        サンプル: |
                            local  exitCodes="${PIPESTATUS[@]}"       #// 一度に参照しないと、このコマンドで上書きされてしまいます
                            test "${exitCodes}" == "0 0"  ||  Error   #// パイプの段数に合わせて 0 の数を増やします
                        補足:
                            #// 一度代入しないとエラーになります  test: too many arguments
                            test "${PIPESTATUS[@]}" == "0 0"  ||  Error
                サンプル:  #focus: exitCode
                    基本 (bash): |
                        Command1 | Command2
                        local  exitCode=${PIPESTATUS[0]}
                    bash, zsh 共用: |
                        Command1 | Command2
                        local  exitCode=${PIPESTATUS[0]}${pipestatus[0]}
                            終了コードによって中断します:  #search: set -e
    _polling.sh :  #// バックグラウンド プロセス のテストに適したスクリプト
        エラーにならなくなるまでの場合: |
            while true; do
                command  &&  break
                sleep 2
            done
        while を使う場合: |
            while [ 条件文 ]; do
                date  #// 現在の日時を表示します
                sleep 2
            done
        if を使う場合: |
            while true; do
                date  #// 現在の日時を表示します
                if [ 条件文 ]; then
                    break
                fi
                sleep 2
            done
    $!:  #// 最後に起動した バックグラウンド プロセスの PID (プロセスID)
        サンプル: |
            sleep 10 &
            echo $!
        wait $!:  #search: Linux wait
    ps: #// プロセスを一覧します  #keyword: ps
        サンプル:
            - ps
            - ps -auxww
            - ps -eo pid,pgid,ppid,cmd  #// PID, PGID, PPID, コマンド ライン を一覧します
            - 詳細: #search: linux process example
        f: プロセス ツリー を表示します  #search: linux process example
        -a: 全プロセスを表示します
        -u: ユーザー名も表示します
        -x: tty を持っていないプロセスも表示します。他のユーザーが起動したプロセスも表示します
        -ww: 起動コマンドを完全に表示します。指定しないと1行で表示できる範囲以降の部分は表示されません。
            #ref: https://stackoverflow.com/questions/2159860/viewing-full-output-of-ps-command
        -e: #keyword: ps -e  #// 全プロセスを表示します。プロセス名は __ProcessShortName__
            ps -e:  #// 表示されるプロセス名は ps aux で表示される実行ファイル名の一部の可能性があります。
                サンプル実行: |
                    $ ps -e
                    __PID__ __?__ __RunningTime__ __ProcessShortName__
                    ...
                補足:
                    - __ProcessShortName__ は、他のプロセスと重複する可能性があります。
                    - -f オプションと同時に表示するとプロセス名が変わることがあります  #search: ps -ef
                変更: #keyword: edit ps -e  #// プログラムで変更することができます。すでに起動オプションで対応している可能性もあります
                    Ruby: |
                        Process.setproctitle("新しいプロセス名")
                    Python: |
                        import setproctitle
                        setproctitle.setproctitle("新しいプロセス名")
                    Go: |
                        syscall.SYS_PRCTL
                    ラッパー スクリプト: |
                        #!/bin/bash
                        exec /path/to/bundle "$@"
            ps -ef: #keyword: ps -ef  #// 詳細表示です。ただし、プロセス名が変わることがあります
                注意: |
                    プロセス名に相当する情報の情報源が変わってしまうことがあります。
                        $ cat /proc/__PID__/comm   #// ps -e の情報源
                        bundle
                        $ cat /proc/__PID__/cmdline  #// ps -ef の情報源。プロセスが変更可能
                        supervisor:td-agent
            systemctl status: |  #// サービスのプロセス名は、systemctl status コマンドの Main PID に表示されます。
                    $ systemctl status __ServiceName__
                    Main PID: __PID__ (__ProcessShortName__)
                    ...
        ps が使えない場合:
