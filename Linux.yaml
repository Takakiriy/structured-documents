            基本:
                command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
            bashlib:  #search: TestError
            標準: |
                ErrorCount=0
                command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                echo  "ErrorCount = ${ErrorCount}"
            継続する場合: |  #focus: ErrorCount
                ErrorCount=0
                local  previousErrorCount=${ErrorCount}

                command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                if [ "${ErrorCount}" == "${previousErrorCount}" ]; then
                    command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                fi
                if [ "${ErrorCount}" == "${previousErrorCount}" ]; then
                    command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                fi

                previousErrorCount="${ErrorCount}"   #// 再開
                command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                if [ "${ErrorCount}" == "${previousErrorCount}" ]; then
                    command  ||  ErrorCount=$(( ${ErrorCount} + 1 ))
                fi
