    xargs コマンド:  #keyword: xargs  #// それぞれの行をパラメーターに渡します
        基本:  #// 複数行のデータを 1行（複数列）に並べ変えます。1つのコマンドだけ実行します
            サンプル:
                $ cat list.txt
                a
                b
                $ cat list.txt | xargs echo
                a b
                $ cat list.txt | xargs -p echo
                echo a b ?...^C
                #// パラメーターは空白区切りで 1行の中にまとめられ、1つのコマンドだけ実行します
                #// 1行もないときでもコマンドを実行します
                #// 実行する前に -p オプションを指定して確認してください
            空白区切りが使えるコマンドの場合:  #// echo, rm
                注意: ファイル名に空白が含まれると正しく動きません
                echo:
                    入力するコマンド: ____ | xargs echo
                    実行されるコマンド: echo a b
                    1行もないとき: 空行を表示します
                rm:
                    入力するコマンド: ____ | xargs rm
                    実行されるコマンド: rm a b
                    1行もないとき:
                        rm: エラー「rm:オペランドがありません」
                        rm -rf: 何もしません。エラーにもなりません
            空白区切りが使えないコマンドの場合:  #// cp
                cp: cp a b __DestinationFolder__
                #// 空白区切りが使えないコマンドは、xargs の -i オプション（下記）を指定すれば使えます  #search: xargs -i
        -p オプション:  #// 実行するコマンドを確認します
            $ cat list.txt
            a
            b
            $ cat list.txt | xargs -p echo
            echo a b ?...
            #// 最後の ?... が表示されて止まります。Enter キーを押すと続きを実行します ?... の意味は不明
        -r, -no-run-if-empty オプション:  #// データが渡されなかったときにコマンドを実行しないようにします
            echo "" | xargs -r echo "Hello"
        -I オプション, -i オプション: #keyword: xargs -i  #// 複数行のデータの 1行ずつをコマンドに渡して実行します。区切りは改行です
            zsh:  #// mac の bash もこの仕様。Linux でも使えます #ref: https://blog.ayakumo.net/entry/2018/02/07/070608
                $ cat list.txt
                a
                b
                $ cat list.txt | xargs -I{} echo "({})"
                (a)
                (b)
            bash:  #// 非推奨。-i オプションは deprecated  #ref: https://blog.ayakumo.net/entry/2018/02/07/070608
                $ cat list.txt
                a
                b
                c d
                $ cat list.txt | xargs -i echo "({})"
                (a)
                (b)
                (c d)
                #// パラメーターは 1行ずつ {} の部分に指定され、複数のコマンドを実行します
        -d オプション:  #// 区切り文字を指定します
