            free:  #keyword: free, Linux memory size  #ref: ${programming}/OS/UNIX-Linux/!Linux.svg#free
                サンプル: |
                    $ free
                    /             total        used        free      shared  buff/cache   available
                    Mem:        6976980     2463612     3275712       11728     1237656     4201840
                    Swap:       1679356           0     1679356
