    rsync: #keyword:
        注意: Git bash には入っていません。数時間かかる場合、帯域制限したほうがいいかもしれません
        ポート番号: 22 (SSH)
        手順:
            インストール状態の確認:
                rsync --version
            インストール:
                sudo yum install -y rsync
            コピー, 基本, ローカル同士:  #// 新しいファイルだけコピーします。タイムスタンプとファイルサイズが違ったらコピーします。コピー元に無いファイルがコピー先にあるときでもそのまま残ります
                #// 以下のいずれか
                - rsync -a  "/__SourceFolderPath__/"  "/__DestinationFolderPath__/"          #// フォルダーの内容をコピーします。末尾は / です
                - rsync -a  "/__SourcePath__/__FolderName__"  "/__DestinationFolderPath__"   #// フォルダーをコピーします。。末尾は / 無しです
                - rsync -a  "__SourceFolderPath__/"  "__DestinationFolderPath__/"
            exclude:  #// 特定のフォルダーを除いてコピーします  #keyword: rsync exclude
                - rsync -a  "__SourceFolder__/"  "__DestinationFolder__/"  --exclude "/__ExcludingRelativePath__/"  --exclude "/__2__/"
            サーバーへのアクセス:  #// __Host__ の右のコロンに注意
                - rsync -a  "rsync://__Host__:/__SourceFolderPath__/"  "__DestinationFolderPath__/"
                - rsync -a  "__SourceFolderPath__/"  "rsync://__Host__:/__DestinationFolderPath__/"
                - rsync -a  -e "ssh -i __SshPrivateKeyPath__"  "__SourceFolderPath__/"  "rsync://__Host__:/__DestinationFolderPath__/"
            一覧:  #// ls コマンド相当。__DestinationFolderPath__ を指定しません
                - rsync --dry-run  "rsync://__Host__:/__SourceFolderPath__/"
        オプション:
            -a, --archive: アーカイブ。 時間、シンボリックリンク、権限、グループ、所有者を保持し、ディレクトリを再帰的にトラバースします
                -rlptgoD と同じ
            -c, --checksum: タイムスタンプとファイルサイズではなくチェックサムで差分を確認
            --chmod: 転送先のパーミッション。指定内容は chmod コマンドと同じ。ファイル --chmod F644。ファイルとフォルダー --chmod D755,F644
            -D: --devices --specials と同じ
            --delete: 転送元に存在しないファイルを削除します
            --devices: ブロックデバイスをコピー (root のみ有効)
            --exclude ____: 除外
            -E: to keep extended attributes
            -g, --group: to keep group
            -h, --human-readable: K(KB), M(MB)
            -H, --hard-links: to keep any hard-link
            -l, --link: to keep symbolic link as is
            -n, --dry-run: コピーや転送を実際には行わず転送内容のみ出力
            -o, --owner: to keep owner
            -p, --perms: to keep permission as is
            --progress: to keep an eye on job progress. 進捗状況を表示します
            -r, --recursive: sub folder
            --specials: 名前付きパイプや FIFO などの特殊ファイルをコピー
            -t, --times: to keep time stamp as is
            -v, --verbose: verbose
            -z, --compress: to compress data
        rrsync: #keyword: rrsync  #// rsync のリクエストを受け付けるサーバーに SSH でログインするとき、rsync 専用の制限の多い（安全な）リクエストであるかチェックします
            README: #ref: https://github.com/WayneD/rsync/blob/master/support/rrsync.1.md
            コード: #ref: https://github.com/WayneD/rsync/blob/master/support/rrsync
            手順:
                ~/.ssh/authorized_keys に行を追加します:
                    書式: command="/usr/local/bin/rrsync __PublicFolderPath__",__Options__ __Type__ __PublicKey__
                    サンプル: command="/usr/local/bin/rrsync /path/to/allowed/directory",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-X11-forwarding ssh-rsa AAAAB3Nz...
                #// 以上で rsync を使うときに制限がかかります
                __PublicFolderPath__: クライアントから要求された rsync のリクエストを処理する rsync サーバーがアクセスできる ローカル フォルダー のパス
                __PublicKey__: #keyword: rrsync public key
                    rsync が使う秘密鍵に対応する公開鍵。リモートからその秘密鍵を使って ssh ログインすることはできません。
                    ~/.ssh/authorized_keys の別の行に、ログインに使う秘密鍵に対応する公開鍵を書けば、
                    rsync では制限付き、ログインでは制限なしでアクセスできます。
            トラブルシューティング(rrsync):
                - #// ssh ログインできない  #keyword: rrsync ssh trouble
                    手順: ssh -i __SecretKeyPath__  __User__@__ServerName__
                    ログ: |
                        PTY allocation request failed on channel 0
                        /bin/rrsync: Not invoked via sshd
                        Use 'command="/bin/rrsync [-ro|-wo] SUBDIR"'
                                in front of lines in /home/user1/.ssh/authorized_keys
                        Connection to __ServerName__ closed.
                    対処:
                        __SecretKeyPath__ の鍵は、一部のフォルダーに対する rsync によるアクセスにのみ使えます。
                        rrsync の手順を参照
            参考:
                #erf: https://88171.net/rrsync-is-cool
                #ref: https://askubuntu.com/questions/1291018/using-rrsync-with-sudo-on-destination-machine
                #ref: https://biplane.com.au/blog/?p=591
        rsync サーバー:  #ref: ${GitHub}/MyPrivateCode/docker/rsync-docker
        参考:
            macosx 設定メモ rsync 編:  #ref: https://qiita.com/BlueEventHorizon/items/209af1c9beaff669cd68
            Best rsync options to transfer data between two Mac: #ref: https://apple.stackexchange.com/questions/87916/best-rsync-options-to-transfer-data-between-two-mac
        関連:
            #search: ファイル転送
        トラブルシューティング (rsync):
            - #// rsync: failed to connect to __HostName__ (__IPAddress__): Connection refused (111)
                手順: rsync
                エラー: |
                    rsync: failed to connect to __HostName__ (__IPAddress__): Connection refused (111)
                    rsync error: error in socket IO (code 10) at clientserver.c(125) [Receiver=3.1.2]
                対処:
                    ホスト名を再確認します
            - #// rsync rename Operation not permitted
                手順: CentOS7 で rsync のコピー先が /vagrant（Windows と共有）の中
                エラー: |
                    rsync: rename "/vagrant/.commit/.gitignore.6Xk5EA" -> ".commit/.gitignore": Operation not permitted (1)
                対処:
                    RsyncFromTemporary を参照
    restic: #keyword:  #// tar + gzip + cron の高機能版
        特徴:
            - resticは必ず暗号化（rsyncは平文）
    mkdir:
        -p オプション: 子の子フォルダーを作ることができるようにします。すでに存在していてもエラーにしません
        ファイルのパスを指定 >> 指定したパスのファイルを格納するフォルダーを新しく作ります:
            #// __FilePath__ にファイルがあると削除するので注意
            - mkdir -p __FilePath__
            - rmdir    __FilePath__
        複数指定:  #keyword: Linux paths in bracket
            - mkdir -p {folder1,folder2}  #// { } の中に空白文字を入れることはできません
                #// "{ folder1, folder2 }" にすると、1つの { folder1, folder2 } フォルダーができます。
                #// '{ folder1, folder2 }' でも同じです
                #// {{folder1}} のように { や } が 2つ連続する場合は展開されず、そのままコマンドのパラメーターに渡ります
    rm:
        ❗注意: ディスク使用量削減のために ログ ファイル を削除してはいけません。サイズを変えます  #search: truncate
        ファイルを削除します:  rm __FilePath__
        ファイルを削除します >> すでに削除済みでもエラーにしない:  rm -f __FilePath__
        シークレットの削除:  #search: Linux dd
        -rf >> フォルダーを削除します >> サブフォルダーも含めて削除します:
            基本: rm -rf __FolderPath__
            CentOS7 vagrant 共有フォルダー内:
                chmod 555 のファイルやそれを含むフォルダーは削除できません。rm だけでなく rm -rf でも。
        フォルダーの中をすべて削除します:
            フォルダーを一時的にも削除しない場合:
                推奨:
                    ls -a "${folder}" | grep -v  -e "^\.$"  -e "^\.\.$" | xargs  -I {} \
                        rm -rf  "${folder}/{}"
                下記は、隠しフォルダーを削除できません:
                    - rm -rf *
                    - rm -rf sub/*  
        複数のフォルダーの中をすべて削除します:
            それぞれ指定する場合:
                local  folders=(
                    "__FolderA__"
                    "__FolderB__"
                    )
                for folder in "${folders[@]}"; do
                    rm -rf    "${folder}"
                    mkdir -p  "${folder}"
                done
            すべて同じ名前の場合:  #// 様々な場所にある同じ名前のフォルダーが対象です
                find "." -type d -name "__FolderName__" -exec rm -rf {} +
        特定のフォルダー以外を削除します:
            直下の .git フォルダー以外を削除します:
                ターミナルの場合:
                    cd  __CleaningFolderPath__
                    ls -a | grep -v -E '^\.git|^\.$|^\.\.$' | xargs rm -rf
                    #// .git の前の \ は . を任意の文字にしないためのエスケープです
                    #// |^\.$|^\.\.$ は . と .. に rm コマンドを実行させないためです
                スクリプトの場合:
                    ls -a __CleaningFolderPath__ | grep -v "^\\.git$\\|^\\.$\\|^\\..$" | xargs -I{} \
                        rm -rf  "__CleaningFolderPath__/{}"
                    #// .git の前の \ は . を任意の文字にしないためのエスケープです
        -d >> 空のフォルダーを削除します:  rm -d __FolderPath__
        複数指定:  #search: Linux paths in bracket
    truncate: #keyword: change Linux file size  #// ファイル サイズ を変えます
        基本, -s, --size: truncate  --size __ByteSize__  __FilePath__
        ファイルの編集内容:
            サイズが大きくなるとき: 大きくなった末尾の部分を 0 で埋めます
            サイズか小さくなるとき: 末尾の部分が削除されます
        オプション:
            -o, --io-blocks, ブロック数指定: truncate  --io-blocks __BlockCount__  __FilePath__
            -r, --reference: truncate  --reference __ReferenceFilePath__  __ChangingFilePath__
            -c, --no-create: 指定したファイルがあるときだけ実行します
    dd:  #// ゼロで上書きします
        シークレット ファイル の内容を塗りつぶします:
            コマンド: dd if=/dev/zero of="__FilePath__" bs=1 count=$(stat -c %s "__FilePath__")
                #// 別途、ファイルの削除を実行してください
            使用例 >> 暗号化転送:  #search: transfer secrets
        仮想環境の ディスク ファイル を減らします:
            sudo dd if=/dev/zero of=/tmp/zero.fill bs=1M など  #search: VirtualBox VHDD size
    ln:  #keyword: symbolic link, ln, シンボリック リンク
        作成:
            コマンド:
                基本: ln -sf  "__Target__"  "__LinkFilePath__"   #// ❗注意 POSIX 公式では ln -sf  __Source__ __Target__ という表現をしていて、逆のイメージなので注意。頭おかしい
                    #// __Target__ は フル パス または 相対パス
                    #// ls -l で表示すると、__LinkFileName__ => __Target__ と表示されます
                    #// ファイルへのリンクの場合、相対パスは __LinkFilePath__ があるフォルダーからの相対パス
                    #// フォルダーへのリンクの場合、相対パスは __LinkFilePath__ からの相対パス
                    #// __LinkFilePath__ が既存のフォルダーのパスの場合、__Target__ のファイル名と同じ名前の シンボリック リンク が作られます
                sudo が必要な場所に作るとき: sudo  ln -sf  __Target__  __LinkFilePath__
                Windows Git bash の場合: #keyword: Windows ln
                    #// 管理者として Git Bash を開き、
                    cd __ParentOfMakingLink__
                    MSYS=winsymlinks:nativestrict ln -sf  __Target__  __LinkFilePath__
                Windows コマンド プロンプト の場合:  #search: mklink
            サンプル >> __link__ がフォルダーではないとき: |
                $ sudo  ln -sf  /srv/tftp  /tftpboot   #// sudo は必要なときのみ
                $ ls  /tftpboot
                lrwxrwxrwx  user1 user1   /tftpboot -> /srv/tftp
            サンプル >> __link__ がフォルダーのとき: |
                sudo  ln -s `pwd`/flyway-7.11.1/flyway /usr/local/bin  #// /usr/local/bin/flyway が作られます
        削除:
            ファイル: sudo rm __link__   #// sudo は必要なときのみ
                #// リンク先は削除されません
            フォルダー: sudo rm -r __link__  #// ❗ __link__ の末尾に / を付けるとリンク先が削除されてしまいます
                #// sudo は必要なときのみ
                #// 末尾に / を付けなければ、リンク先は削除されません
        シンボリック リンク かどうかを表示します:  #search: bash exists
        シンボリック リンク ではなくファイルの実体（コピー）に置き換えます:  #keyword: symbolic link copy
            変更前:
                devpackages/.gitignore -> ../packages/.gitignore
            変更後:
                devpackages/.gitignore  #// packages/.gitignore のコピー
            コマンド: |
                ls -l devpackages/.gitignore
                    #// rwxrwxrwx. 1 user1 user1 22  8月  5  2021 devpackages/.gitignore -> ../packages/.gitignore
                rm devpackages/.gitignore
                cp  packages/.gitignore  devpackages/.gitignore
                ls -l devpackages/.gitignore
                    #// -rw-rw-r--. 1 user1 user1 481  8月  5  2021 devpackages/.gitignore
        循環参照を検出します:
            find -L -xtype l
            #// too many levels of symbolic links が表示されなければ循環参照は存在しません
        シンボリックリンクのリンク先を調べます:  #search: readlink
        ファイルが シンボリック リンク のフォルダーの中にあるかどうかを調べます:  #search: in link
        Snap Note などの初期設定:  #search: Snap Note
        Snap Note によるメモ: #ref: ${programming}/OS/UNIX-Linux/!Linux.svg#ln
ファイル: #keyword: Linux file
    ファイルの新規作成: #search: echo redirect
    ファイルのリード: #search: echo redirect
        cat:  #keyword: Linux cat,  cat,  concatenate Linux file read
            表示:  cat  __FilePath__
            変数へ:
                ファイル:
                    local  text="$( cat "__FilePath__" )"
                リダイレクトされる標準入力: #keyword: Linux bash stdin
                    local  stdin="$(</dev/stdin)"
                関数がパイプを受け取ります:  #search: bash function pipe
            パイプと一緒に:  #// less のモードを無効にし、そのまま出力します。journalctl コマンドなどでも有効です
                less __FilePath__  |  cat
            行番号表示: #keyword: Linux cat 行番号,  cat -n
                cat -n  __FilePath__
            ファイルの末尾の改行の有無:  #search: tail file LF
            読み: concatenate A and B (コンキャティネイト)  #rer: https://eow.alc.co.jp/search?q=concatenate
            関連 >> 一部の範囲の行:  #search: sed -n
        ini ファイル, key:value, CSV:  #search: bashlib
    タイムスタンプ: #keyword: Linux time stamp,  file タイム スタンプ
        表示:
            stat:
                $ stat -c "%y" example.txt
                2023-11-30 12:34:56.789123456 +0900
                    #template_-at(-2): stat -c "%y" __FilePath__
            ls:  #search: ls time stamp
        比較:  #search: bash compare date time
        変更:
            Linux, mac:
                基本:
                    - touch __FilePath__  #// 現在の日時に変更します
                    - touch -t yyyymmddHHMM.SS __FilePath__  #// 変更日とアクセス日を指定した日時に変更します
                        #// -t オプションは __FilePath__ より左に指定する必要があります
                変更日のみ: -m
                アクセス日のみ: -a
                Git コミット に合わせる:
                    #search: set-git-commit-date.sh
                    #search: SetGitCommitDate
    バックアップ: #keyword: back up,  backup,  
        .env のバックアップ:  #search: bash .env back up
        .git のバックアップ:  #search: git backup example
        .gitignore のバックアップ: #keyword: back_up_local_settings.sh
        データベースのバックアップ:  #search: database backup
        スマホ:  #search: MyIT back up
        用語:
            「バックアップ」という英語:  #search: English backup
            バックアップするときのコピー元: マスター, オリジナル  #ref: https://www.google.com/search?q=バックアップ%20ファイル%20反対語
    ファイル分割、結合、ハッシュ値:  #keyword: ファイル分割 結合 div
        split:  #// ファイルを分割します  #keyword: split
            - cd  __InputFileFolder__
            - 分割する前に圧縮します
            - split -d --bytes 512M  "__InputFileName__"  "__OutputPrefix__"
                #// 通常 __InputFileName__ == __OutputPrefix__ で構いません。例: a.zip
                #// -d オプションを付けないと、分割番号がアルファベットに変わります
        チェックサム, cksum, CRC: #keyword: checksum  #// 誤り検出
            1つのファイル:  #keyword: file cksum
                コマンド: cksum ./folder/file.txt
                出力の書式: __CRC__ __Size__ __Path__
                出力例: 1234567 123 ./folder/file.txt
            フォルダー内すべてのファイル:  #keyword: Linux file list with CRC,  file hash list diff CRC,  CRC
                コマンド:  #// ターミナルに表示する場合。サブフォルダーも含む
                    - clear
                    - find "."  -name "*"  -type f  |  sort  |  xargs -I{} cksum "{}"
                出力の書式: __CRC__ __Size__ __Path__  #search: file cksum
                出力例:
                    1234567 123 ./folder/fileA.txt
                    1234567 123 ./folder/fileB.txt
                用途: 異なるホストなどでフォルダーの内容に違いが無いかを確認できます
        ハッシュ値, sha256sum:  #keyword: sha256sum, SHA256, Linux hash
            ハッシュ関数:
                ハッシュ関数: SHA256 など
                ハッシュ値: SHA256 などで計算して得られた値。計算前のデータが他と異なることを、ハッシュ値の違いだけで判定できます（確率的に）
            bashlib >> GetHash:
            Linux:
                SHA256 を計算して表示してファイルに保存します:
                    - cd  __InputFileFolder__
                    - sha256sum  "__Prefix__"??  |  tee  "__Prefix__"XX.txt
                直下の複数のファイルについて MD5 を計算します:  #keyword: MD5
                    - find "."  -maxdepth 1  -name "*"  -type f  |  sort  |  xargs -I{}  md5sum "{}" 
                    #// ファイルに一覧を保存するなら、コマンドも含めて保存するとよいでしょう  #keyword: allfiles.txt
                    #// サブフォルダーも含めるなら -maxdepth 1 を外します
                SHA256 を計算してハッシュ値が正しいことをチェックします:
                    - cd  __InputFileFolder__
                    - 上記 "__Prefix__"XX.txt ファイルを __InputFileFolder__ にコピーします
                    - sha256sum --check  "__Prefix__"XX.txt
                SHA256 を計算して表示します:  #// ファイル名の左の * はバイナリであることを示します
                    sha256sum  __FilePath__
                    7230525bef128584a7416c2222a42112728fb1544368219938b817b4f7943fbe *binary.7z
                SHA1, MD5 のときは、上記 sha256sum コマンドを sha1sum, md5sum コマンドに置き換えてください:  #keyword: SHA1
            mac:
                SHA256 を計算して表示します:  #keyword: shasum
                    shasum -a 256 __FilePath__
                SHA1 を計算して表示します:  #keyword: sha1sum
                    sha1sum __FilePath__
        cat:  #// ファイルを結合します
            - cd  __InputFileFolder__
            - cat "__Prefix__"?? > "__Prefix__"
            - できた圧縮ファイルを展開する先は、デスクトップでないと失敗したことがあります
        base64:  #// Base64 形式  #keyword: Linux base64
            Linux:
                ファイルを変換する場合:
                    エンコード。 base64 形式に変換した内容をファイルに出力します:
                        base64  ~/_log.ctxt > ~/_log.base64
                    デコード。元のバイナリ ファイルに戻します:
                        base64 -d  ~/_log.base64 > ~/_log.ctxt
                コマンドにデータを指定する場合:
                    デコード:
                        echo "__Base64Data__" | base64 -d  &&  echo ""
            使う文字:
                A-Za-z0-9+/=
        xxd:  #// Hex 形式  #keyword: Linux hex xxd  #ref: https://linux.die.net/man/1/xxd
            Hex 形式からバイナリに変換します:
                $ echo '0006303030304e43' | xxd -r -p
                0000NC
                $ echo '0x0006303030304e43' | xxd -r -p
                0000NC
    ulimit, 同時にオープンできる数: #keyword: ulimit  #ref: https://access.redhat.com/solutions/61334
        参照: ulimit -n  #search: -n: 同時にオープンできるファイル数
        設定:
            現在のプロセスの ulimit を変更する場合: sudo ulimit -n __NewValue__  #// -n: 同時にオープンできるファイル数
            OS を再起動して ulimit を変更する場合:
                /etc/security/limits.conf : |  #// 末尾付近に追加。hard を soft に置き換えても効果ありません
                    __User__ hard nofile __NewValue__
                nofile: __NewValue__ は同時にオープンできるファイル数
                __User__: ユーザー名または *（全ユーザー）
            ulimit を変更して Visual Studio Code を開く場合:  #// 未確認
                下記を実行したときのエラー:
                    Command is only available in WSL or inside a Visual Studio Code terminal.
                    #// sudo で新しいプロセスを起動する必要があるため必要な環境変数が削除されるようです
                試したスクリプト: |
                    #!/bin/bash

                    MaxFileOpen=14096
                    echo "------------------------"
                    echo $PATH  #// sudo すると /sbin:/bin:/usr/sbin:/usr/bin だけになる
                    echo $USER
                    echo $1
                    ulimit -n
                    CurrentMaxFileOpen="$( ulimit -n )"
                    CodePath="$( which code )"
                    if [ "${CurrentMaxFileOpen}" != "${MaxFileOpen}" ]; then
                        sudo bash -c "ulimit -n ${MaxFileOpen} && su $USER -c '$0 $CodePath'"
                        exit $?
                    fi

                    PATH=/home/vagrant/.vscode-server/bin/695af097c7bd098fbf017ce3ac85e09bbc5dda06/bin/remote-cli:${PATH}
                    code .
        オプション:
            -c:	作成されるコアファイルの最大サイズ（512バイト単位のブロック数）
            -d:	プロセスデータセグメントの最大サイズ（KB＝1024バイト単位）
            -e:	スケジュール優先度の最大値（nice値、※2）
            -f:	シェルとシェルの子プロセスが書き込み可能なファイルサイズの最大値（ブロック数）
            -i:	保留できるシグナルの最大数
            -l:	メモリにロックできるプロセスの最大サイズ（KB）
            -m:	利用できる最大のメモリサイズ（KB）
            -n:	同時にオープンできるファイル数  #keyword: ulimit -n
                    #search: slow yum install
            -p:	パイプのバッファーサイズ（512バイト単位のブロック数）
            -q:	POSIXメッセージキューの最大バイト数
            -r:	リアルタイムスケジュール優先度の最大値
            -s:	スタックサイズの最大値（KB）
            -t:	プロセスごとに利用できるCPU時間の最大値（秒数）
            -u:	実行可能なユーザープロセスの最大数
            -v:	シェルとシェルの子プロセスが利用可能な仮想メモリの最大サイズ（KB）
            -x:	ファイルロックの最大数
        #ref: https://atmarkit.itmedia.co.jp/ait/articles/1908/01/news031.html
    マウント: #search: Linux mount
    file コマンド, 種類:  #search: Linux file command
テキスト編集:  #// vi, sed, awk
    vi コマンド:  #keyword: vi, vim
