                                $ systemctl is-enabled __ServiceName__.timer
                                    enabled  または  disabled
                            表示:  #// 全ての タイマー ユニット を表示します  #keyword: systemctl list-timers
                                有効な タイマー ユニット: |  #// と設定日時、実行した日時
