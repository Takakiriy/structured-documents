                        -   sudo yum clean all  #keyword: sudo yum clean all
                        -   sudo yum makecache  #keyword: sudo yum makecache   #// yum makecache は実行しなくても構いません。ただし、必要になったときに自動的にダウンロードが10秒ほど行われます
