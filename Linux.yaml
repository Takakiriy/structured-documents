            タイム スタンプ 比較:
                #search: bash compare date time
            テスト用に比較します: #keyword: diff test
                ファイルの場合:
                    diff  "__PathA__"  "__PathB__"  ||  Error  "ERROR:_different"
                変数の場合: |
                        local  output="$( __Command__ __Parameters__  2>&1  |  tee /dev/tty )"
                        diff  <( echo "${output}" )  <( echo "${ExpectedOutput}" )  ||  Error  "ERROR:_different"
                    #search: tee /dev/tty
