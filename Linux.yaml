    tee コマンド:  #keyword: tee  #// 標準入力の内容を表示（標準出力へ出力）しながらリダイレクトします
        基本:  #// 標準出力を表示しながらファイルに保存します
            echo "hello!" | tee ./_temporary.txt
        追記, -a オプション:  #// 標準出力を表示しながらファイルに追記します
            echo "hello!" | tee -a ./_temporary.txt
        変数に格納しながら表示します: | #keyword: tee /dev/tty
                local  output="$( __Command__ __Parameters__  2>&1  |  tee /dev/tty )"
            #search: diff test
        root ユーザー: #keyword: sudo tee  #// 管理者権限が編集に必要なファイルに追加します
            置き換え: echo  '__AppendingContents__'  |  sudo tee  __FilePath__
            末尾に追記: echo  '__AppendingContents__'  |  sudo tee -a  __FilePath__
            先頭に追記:  #search: sed insert empty line
            #search: multi line tee
        貼り付け: #keyword: tee paste  #// クリップボードの内容をファイルに上書き保存します
            - tee __FilePath__ > /dev/null     #// 左記コマンド実行後、貼り付け, Ctrl + D で完了。上書きの場合
            - tee -a __FilePath__ > /dev/null  #// 左記コマンド実行後、貼り付け, Ctrl + D で完了。追記の場合
            #// __FilePath__ によっては、sudo が必要です
            #// 最後は改行文字であること
            #// 表示が崩れても正しく保存されていることが多いです。 cat コマンドで確認してください
        複数行: #keyword: multi line tee  #// 複数行の内容を追記します
            コマンドに内容を含める場合:  #// Ctrl + D を押さなくても貼り付けるだけで実行できます
                sudo が不要な場合: |
                    cat >> __FilePath__ << _HERE_DOCUMENT
                    __AppendingContentsLine1__
                    __AppendingContentsLine2__
                    _HERE_DOCUMENT
                sudo が必要な場合: |
                    cat << _HERE_DOCUMENT  |  sudo tee __FilePath__ > /dev/null
                    __AppendingContentsLine1__
                    __AppendingContentsLine2__
                    _HERE_DOCUMENT
                #// インデントを削除して実行してください
            内容を貼り付ける場合:  #keyword: tee edit
                準備:
                    - edit=__FilePath__
                    - less  "${edit}"
                編集:
                    プロセス起動後に入力する場合:
                        - sudo tee ${edit} > /dev/null   または  sudo tee __FilePath__ > /dev/null
                        - （マウスを右クリック） #// 貼り付け
                        - Ctrl + D キー #// tee のプロセスを終了
                    プロセス起動前に入力する場合:
                        未確認  #search: <<- __HERE_DOCUMENT__
            （古い方法）: |  #// インデントを削除して実行してください
                cd  $HOME  #// 例
                echo "first
                second
                third
                " | tee -a  __FilePath__  > /dev/null
                cat  __FilePath__  #// 確認
            #// 状況に応じて sudo を付けたり -a を削除したりしてください
        テスト スクリプト のログを取ります:  #keyword: bash test log,  test log
            Main 関数の出力を記録して期待する出力と一致するかチェックする場合: |  #focus: Main
                #search: bash options
                    --without-log)  Options_WithoutLog="yes"; shift;;

                if [ "${Options_WithoutLog}" != "" ]; then

                    Main
                else
                    Main  2>&1  |  tee  "_output.txt"

                    if diff  "_output.txt"  "log"  >  /dev/null; then
                        rm  "_output.txt"
                        echo  "Pass."
                    else
                        echo  "ERROR. Output is not same as expected log. Please input the command: diff \"_output.txt\"  \"log\""
                    fi
                fi
            子プロセスを呼び出してその出力を記録する場合:  #focus: local-test
                EnableLogSave: | #keyword: --no-log-save  #// awk はログの行頭に時刻を追加します。
                    DollarZero="$0"

                    #search: bash options
                        Options_AllArguments+=("$1")
                            --no-log-save)  Options_NoLogSave="yes"; shift;;

                    function  EnableLogSave() {
                        if [ "${Options_NoLogSave}" == "" ]; then
                            local  logFilePath="working/local-test-$( date +"%Y-%m-%dT%H:%M:%S%z" | sed 's/:/_/g' ).log"

                            "${DollarZero}" --no-log-save  "${Options_AllArguments[@]}" 2>&1  |  tee "${logFilePath}"
                            local  exitCode=${PIPESTATUS[0]}

                            echo  "$ lib/tree-breadcrumb/local-test.sh  \"${logFilePath}\"  >  \"${logFilePath}.yaml\""
                            lib/tree-breadcrumb/local-test.sh  "${logFilePath}"  >  "${logFilePath}.yaml"
                            test  "${exitCode}" == 0  ||  Error  "ERROR: in local-test.sh"
                            exit
                        fi
                    }
