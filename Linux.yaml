                    server.properties ファイル: #keyword: Kafka server.properties  #glossary:  #ref: /opt/kafka/config/server.properties
                        この設定ファイル以外での設定方法:
                            設定ファイルだけでなく、起動時のオプション、環境変数でも設定できます
