    ssh:  #keyword: ssh
        #ref: ${programming}/OS/UNIX-Linux/!Linux.svg#ssh
        手順: #keyword: ssh steps
            #↓ SSH を使った通信
            アップロードやダウンロードをします: #keyword: SSH upload download  #search: scp
            ログイン, 接続テスト: #keyword: SSH login,  ssh command,  SSH client
                基本:
                    - ssh __User__@__Host__
                    - ssh __ConfigName__  #search: SSH IdentityFile in config
                    #// GitHub などのサーバーによっては PTY を提供しておらず、その場合は警告されます
                    #// 警告を抑制したいときは -T オプションを付けてください  #keyword: ssh -T
                    #search: SSH Permission denied
                （なければ）鍵を生成します:
                    #search: create SSH key
                使われる SSH キーを指定する:
                    - ssh __User__@__Host__  -i ~/.ssh/id_rsa
                    #search: using SSH key
                PowerShell の ssh の場合: |
                        __User__@__Server__: Permission denied (publickey).
                    #// とりあえず git bash の ssh を使ってください。 PowerShell の ssh では次のエラーになります
                ポート番号を指定する場合: #keyword: ssh port  #// SSH サーバー のポート番号が標準的な 22 ではない場合
                    クライアント側:  #// クライアントが接続先のポート番号を指定します
                        ~/.ssh/config を使う場合:
                            - ~/.ssh/config の Port に指定します
                            - ssh コマンドには ~/.ssh/config の Host の値を指定します
                            - Host の値にコロン(:)を含めてはいけません。scp が動きません
                        コマンドの場合:  #// コマンドの -p オプションにポート番号を指定します
                            ssh __User__@__Host__  -p __PortNum__
                初めて接続するサーバーの確認する場合:
                    確認しないで known_hosts に追加します:  #keyword: StrictHostKeyChecking
                        コマンド:
                            ssh -o 'StrictHostKeyChecking no' __User__@__ServerName__ 
                        表示されるメッセージ: |  #// 初回のみ
                            Warning: Permanently added '__HostName__' (RSA) to the list of known hosts.
                    VIP (Virtual IP) が移動する環境の場合:  #search: SSH VIP StrictHostKeyChecking
                SSH キーを生成します:  #search: create SSH key
                秘密鍵を指定する場合:
                    ~/.ssh/id_rsa とは異なる秘密鍵を使うようにする場合:  #keyword: SSH IdentityFile in config
                        もし、新しく鍵を生成するなら、__ServerName___id_rsa ファイルを作ります:
                            生成方法:  #search: ssh-keygen
                        ~/.ssh/config ファイルに下記を追加します: |
                                Host __ConfigName__
                                    User __UserName__
                                    HostName __HostNameOrIPAddress__
                                    IdentityFile ~/.ssh/__ServerName___id_rsa
                            #// IdentityFile は SSH クライアント に配置した秘密鍵のパス。Windows Git bash なら C:\____ または C:/____ 形式
                        もし、新しく ~/.ssh/config ファイルを作ったら、必要なパーミッションを設定します:
                            #bash
                            chmod 600 ~/.ssh/config
