                                                Full Name:
                                                URI:http://crl.example.com/example-ca.crl
                        CRL, 証明書失効リスト:
                            含まれる情報:
                                発行者（Issuer）
                                発行日時（This Update）
                                次回更新日時（Next Update）
                                失効した証明書のシリアル番号リスト
                                失効理由(オプション)
                                CAの署名
                            公式の公開場所:
                                http://crl.example.com/ca.crl など一般公開
                                CA が発行した証明書だけを失効リストに載せます。
