                書式:  sed  "__LineNum__ __Operation__"
                注意:
                    変数を含める場合、変数の値に対してエスケープが必要です:
                    以下は、escape_sed が処理します:
                        置き換えるテキストに / や \ が含まれると扱いが難しくなります。
                        ' ' で囲む場合と " " で囲む場合で、追加する \ の数が違います。
                        置き換える前の値と、置き換えた後の値でエスケープすべき文字が異なります（全部エスケープすればいい？）。
                サンプル: |  #focus: sed, target.txt, AAAAa
                    mkdir -p ~/_work
                    cd       ~/_work
                    echo "aaaaa" >  target.txt
                    echo "aaaaa" >> target.txt
                    echo "bbbbb" >> target.txt

                    sed "2 s/aa/AA/g"  target.txt > _work.txt
                    cp  _work.txt  target.txt

                    sed "3 s/aa/AA/g"  target.txt > _work.txt
                    cp  _work.txt  target.txt

                    cat target.txt
                        #// aaaaa
                        #// AAAAa
                        #// bbbbb
                    rm _work.txt
                    cd ..
                    rm -rf ~/_work
            行頭に追加します:
                すべての行: | #keyword: header Linux command,  linux コマンド 行頭 追加
                    $ echo 'Hello World' | sed -e 's/^/file: /'
                    file: Hello World
