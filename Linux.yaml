                        yum clean all
            - #// .rpm ファイルが開けない
                手順: createrepo --update "." や rpm -qlp  __RPM_FilePath__ など
                エラー: |
                    Worker 0: Error: Could not open local rpm file: __RPM_FilePath__: RPM Error opening Package
                対処:
