                    #// 以下はコンマを値に含めることができない簡易版です
                    サンプル: "Value1,Value2,Value3"
                    書式:
                        - コンマの前後、文字列全体の先頭、末尾に空白を含めることができません
                        - 値を " " などで囲むことができません
                        - 文字列全体の先頭、末尾は、コンマではありません。有無判定を行うときに一時的に付けます
                    （関連）: #search: bash 2D array
                    追加:
                        local  csv=""
                        csv="${csv}__Value1__,"
                        csv="${csv}__Value2__,"
                        csv="${csv%,*}"   #// left of last ","
                        #// "__Value1__,__Value2__"
                    有無判定:  #keyword: strict CSV item match
                        if [[ ",${strictCSV}," == *",__Item__,"* ]]; then  #// strict CSV item match
                        #// [ ] では動作しません
                    最初の要素, 最後の要素: |  #search: Linux bash string left of right
                        echo "${csv%%,*}"  #// left of ","
                        echo "${csv##*,}"  #// right of last ","
                    GetStrictCSV: | #keyword:  #// , の前または後に空白がある CSV を strict CSV に変換します
                        function  GetStrictCSV() {
                            #// This version does not support comma-containing values
                            echo "$1" | sed 's/ *, */,/g'
                        }
                    EchoFromStrictCSV: #keyword: EchoFromStrictCSV, GetInitialSpacedCSV  #// strict CSV から , の右に空白がある CSV に変換します
