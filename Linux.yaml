        サンプル:
            $ ps
            PID   USER     TIME  COMMAND
                1 root      0:00 {docker-entrypoi} /usr/bin/dumb-init /bin/sh /usr/local/bin/docker-entrypoint.sh agent -dev -client 0.0.0.0
                7 consul    2:51 consul agent -data-dir=/consul/data -config-dir=/consul/config -dev -client 0.0.0.0
            18 root      0:00 sh
