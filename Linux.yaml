                        #// yum.repos.d を yum.repos.d.original または yum.repos.d.custom へのシンボリックリンクに変えます
                        (root@): |
                            cd  "/etc"
                            mv  "yum.repos.d"  "yum.repos.d.original"
                            ln -sf  "yum.repos.d.original"  "yum.repos.d"
                            mkdir  "yum.repos.d.custom"
                            cp  "yum.repos.d.original/____.repo"  "yum.repos.d.custom"
                                #// .repo ファイルがまだ追加されていない可能性があります
                                #// 後の インストール ステップ で追加するリポジトリのみ使うときは、yum.repos.d.custom の中は空でいいです
                            rm  "yum.repos.d"
                            ln -sf  "yum.repos.d.custom"  "yum.repos.d"
