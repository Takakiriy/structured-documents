            bell: #keyword: bell command,  echo last end command color text  #// ターミナルに目立つ表示をさせます。独自コマンドです。長い処理を実行中に入力することで処理の完了が分かりやすくなります
                コマンド:  bell $?
                インストール スクリプト:
                    mkdir -p ~/bin
                    echo '#!/bin/bash' > ~/bin/bell
                    echo 'if [ "$1" == ""  -o  "$1" == "0" ]; then' >> ~/bin/bell
                    echo '    echo -e "\e[92m\e[1m@@@ OK @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@\e[0m\e[0m"' >> ~/bin/bell
                    echo 'else' >> ~/bin/bell
                    echo '    echo -e "\e[91m\e[1m@@@ NG ($1) @@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@\e[0m\e[0m"' >> ~/bin/bell
                    echo 'fi' >> ~/bin/bell
                    chmod +x ~/bin/bell
        属性: #keyword: escape seqence attributes
            色: #keyword: echo color,  bash shell script color  #// 表示する文字や背景の色
                サンプル:  #// 分かりにくいので非推奨（エスケープ シーケンス 直書きは非推奨）
                    - echo -e "AB\e[31mCDE\e[0mFG"  #// ABCDEFG のうち CDE が赤くなります。 -e オプションは必須です
                    - echo -e "AB\e[33mCDE\e[0mFG"  #// WSL2 Ubuntu 20.04 では黄色を指定しても白になります
                色の変数: |  #keyword: bash Red Yellow Green  #// 推奨。変数名を使うことを推奨します
                    DefaultColor="\e[0m"
                    Red="\e[91m"
                    Green="\e[92m"
                    Yellow="\e[93m"
                    Blue="\e[94m"
                    Magenta="\e[95m"
                    Cyan="\e[96m"
                    Bold="\e[1m"
                    UnderLine="\e[4m"  #search: echo style

                    echo -e  "これは${Green}緑のテキスト${DefaultColor}です"  #// -e オプションは必須です
                複数行の一部に色を付けます:
                    コード: |
                        DefaultColor="\e[0m"
                        Yellow="\e[93m"

                        lines="Line1"$'\n'"Line2"$'\n'"Line3"
                        echo  "${lines}"  |  \
                            sed -E "s|^|$( echo -e  "${Yellow}" )|"  |  sed -E "s|$|$( echo -e  "${DefaultColor}" )|"  |  \
                            sed -E 's|^|WARNING: |'  |  sed -E 's|$| is not found.|'
                    表示: |  #// Line1 ～ Line3 の部分が黄色くなります
                        WARNING: Line1 is not found.
                        WARNING: Line2 is not found.
                        WARNING: Line3 is not found.
                mac zsh の場合:
                    #// echo -e が正しく動きません。代わりに printf を使います
                    ~/bin/step: |  #keyword: colored step,  ec echo color  #// シェルスクリプト
                        #!/bin/bash
                        DefaultColor="\e[0m"
                        Magenta="\e[95m"
                        Bold="\e[1m"
                        Text="$@"

                        function  echo-e() {  #// Escape supported echo for mac zsh
                            if [ "$( uname )" == "Darwin" ]; then  #// mac
                                local  text="$1"
                                text="$( echo  "${text}"  |  sed -E  's/%/%%/' )"
                                printf  "${text}\n"
                            else
                                echo -e  "$@"
                            fi
                        }

                        echo-e  "${Magenta}${Bold}${Text}${DefaultColor}"
