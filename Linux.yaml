                -h オプション, --hash: プログレスバーを表示します
                -i オプション, --install: メタ情報（パッケージの情報）を表示します
                -p オプション, --package: 指定した RPM ファイルを対象にします。指定しないと、インストール済みの RPM について表示します
                -U オプション, --upgrade: 更新インストールします。リポジトリ（パッケージの情報）のパッケージをインストールすることもあります
                -v オプション, -vv: 詳細に表示します (verbose)
