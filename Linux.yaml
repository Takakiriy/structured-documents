                            #ref: https://www.confluent.io/blog/introducing-confluent-platform-7-4/
                        2.8.0: Apache Kafka 2.8.0 から、KRaft（KRaft mode または KRaftモードとも呼ばれる）という新しいモードが導入され、これによりZooKeeperの依存が不要になりました。
                            KRaftモードはApache Kafka 2.8.0で導入されましたが、まだ実験的な段階であるため、本番環境での使用には注意が必要です。
