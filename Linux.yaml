        ファイルの末尾の改行の有無:  #keyword: tail file LF
            tail -c 1 __FilePath__ | hexdump -C  #// LF=0a
                #// 0a と表示されたら改行あり
    awk コマンド:  #// 列に対する処理をします  #keyword: awk,  Linux row column
        基本の書式: cat "__FilePath__"  |  awk  -F'[__Separator__]'  '{__awk_Command__}'
        __awk_Command__:
            print $1    :  #// 1列目だけ抽出します
            print $(1)  :  #// カッコを付けても同じ動作をします
            print $1,$2 :  #// 1列目と 2列目を空白区切りで並べて抽出します
            print $1 $2 :  #// 1列目と 2列目を間を開けずに並べて抽出します
            print $NF   :  #// 最も右の列を抽出します。 NF 変数には列数が入っています
            print $NF-1 :  #// 右から2列目を抽出します。 NF 変数にマイナス 1という意味です。 $ より - のほうが結合度が高いです
            print $1/$2:   #// 1列目 割る 2列目 を計算します
            print $1 "/" $2:  #// 1列目/2列目 と表示します
        オプション:
            -F オプション:  #// 区切り文字
                - CSV なら , 
                - 複数文字指定したときは、それぞれの文字が区切り文字になります
                - 省略すると空白またはタブ
            -v オプション:  #// 変数を使ったオプション
                書式: awk  -v '__VariableName__=__Value__'
                OFS 変数:  #// 出力のフィールド区切り文字。Output Field Separator
                    awk -v 'OFS=/' {print $1,$2}  #// __1stRow__/__2ndRow__ と出力されます
                RS 変数:  #// 入力の行の区切り文字。Record Separator。改行は \n
                    echo 1:2/3:4 |awk -F'[:]' -v 'RS=/' '{print $1}'  #// 1(改行)3(改行)
                ORS 変数:  #// 出力の行の区切り文字。Output Record Separator
        応用 >> 列の合計:
            awk '{ sum += $2 } END { print sum }' list.txt
                #template_: awk '{ sum += $__ColumnNum__ } END { print sum }' __FilePath__
    tr コマンド:  #keyword: tr  #// 置き換えます、改行も置き換えることができます
        1文字ずつ置き換えます: |
            $ echo 012345 | tr 012 abc  #// 0→a, 1→b, 2→c
            abc345
        小文字に置き換えます: |  #keyword: tr to lower
            $ echo ABC | tr A-Z a-z
            abc
        改行を置き換えます:  #// 複数行を1行に置き換えます
            改行を空白に置き換えるコマンド: cat __FilePath__ | tr "\n" " "
            改行を削除するコマンド: cat __FilePath__ | tr -d "\n"
            サンプル: |
                $ echo  123 > _tmp
                $ echo  456 >> _tmp
                $ cat _tmp
                123
                456
                $ cat _tmp | tr "\n" " "
                123 456
                $ cat _tmp | tr -d "\n"
                123456
                $ rm _tmp
        改行コードを CR+LF から LF に置き換えます:  #keyword: CRLF
            cp "__FileName__" "_tmp.txt"
            tr -d '\r' < "_tmp.txt" > "__FileName__"
    cut コマンド:  #keyword: Linux cut  #// 文字数で削除します
        echo "abcdefghi" | cut -c 5-  #// 5文字目から表示します
    rev コマンド:  #keyword: Linux rev,  Linux reverse  #// 各行の文字を逆順にします
    tac コマンド:  #keyword: Linux tac,  Linux reverse  #// 行を逆順にします。最終行の内容から最初の行の内容の順に変えます。 tac は cat の文字を逆にしたものです
    sort コマンド:  #keyword: Linux sort
        出力をソート: __Command__ | sort
        ファイルをソートして出力: sort __FilePath__  #// 結果は表示されます
        ファイルをソート: sort __FilePath__  > __NewFilePath__  #// 同じファイルを指定すると内容が消えます
        CSV ファイルをソート: sort -t "," __CSV_FilePath__  #// -t "," ,  --field-separator="," オプション
        逆順: sort --reverse __FilePath__  #// -r, --reverse オプション
        データの型:
            数値: -n, --numeric-sort
            単位付き: -h, --human-numeric-sort  #// 単位付きデータの例： 4K, 1M, 5G
            バージョン番号: -V, --version-sort   #// バージョン番号の例： 1.1a
        キー列:
            __i__ 列目: -k __i__, --key=__i__
            __i__ 列目を数値型で: -k __i__n
            複数指定の例: -k 2 -k 1
        同じキーの値の行を 1行だけにする: -u, --unique
        参考: sort コマンド - @IT  #ref: https://www.atmarkit.co.jp/ait/articles/1611/09/news020.html
        関連: #search: Linux comm
    uniq コマンド:  #keyword: Linux uniq,  重複削除  #// 重複しないようにします。連続して同じ内容の（重複する）行があれば削除します。重複の検出。重複数
        基本:  #// 行ソート済みのテキストにおいて、重複しないようにします
            cat list.txt | sort | uniq
            #// sort を入れている理由は、同じ内容を連続させるためです
        ソートさせないで重複行の削除: #keyword: awk uniq
            基本:
                awk '!uniq[$0]++' __FilePath__
                #// uniq を他のシンボルに変えても実行内容は変化しません
                #ref: https://stackoverflow.com/questions/11532157/remove-duplicate-lines-without-sorting
            SSH の接続先で実行する場合:
                ssh  vagrant@localhost  -p $control_local_port  -i $control_private_key \
                    '_c="$(awk '"'"'!uniq[$0]++'"'"' /etc/hosts)";  echo "$_c"  |  sudo tee  "/etc/hosts"  > /dev/null'
        重複している行の内容: #keyword: uniq -d,  uniq 重複検出 同じ内容の行
            テキスト全体の場合:  #// 同じ内容の行が別の場所に離れていても対象にする場合
                コマンド: sort "example.txt"  |  uniq -d
                関数:  #search: bashlib GetDuplicatedLines
                サンプル入力:
                    aa
                    aa
                    bbb
                    cccc
                    aa
                    aa
                    dd
                    bbb
                    bbb
                    cccc
                サンプル出力:
                    aa
                    bbb
                    cccc
            連続する場合:  #// 同じ内容の行が連続している場合が対象。間をおいて同じ内容がある場合は対象外
                コマンド: uniq -d "example.txt"
                サンプル入力:
                    aa
                    aa
                    bbb
                    cccc
                    aa
                    aa
                    dd
                    bbb
                    bbb
                    cccc
                サンプル出力:
                    aa
                    aa
                    bbb
        重複している行数: #keyword: uniq -c,  uniq 重複数 重複行数
            コマンド: uniq -c "example.txt"
            サンプル入力:
                aa
                aa
                bbb
                cccc
                aa
                aa
                dd
                bbb
                bbb
                cccc
            サンプル出力:
                2 a
                1 bb
                1 ccc
                2 a
                1 d
                2 bb
                1 ccc
        関連: #search: Linux comm
    comm コマンド:  #keyword: Linux comm  #// 共通の行を一覧します
        サンプル:
            コマンド: |  #focus: comm, sort
                mkdir ~/_tmp
                cd    ~/_tmp
                echo "
                    Line1
                    Line3
                    Line2
                    Line4
                "   >  file_1.txt
                echo "
                    Line4
                    Line5
                    Line2
                "   >  file_2.txt

                comm -12  <( cat file_1.txt | sort)  <( cat file_2.txt | sort)
            出力:  #// 共通の行が無いときは、"$( comm -12 ____ ____ )" == "" になります
                Line2
                Line4
            順番: ソートした後の順番。ソートさせたくないときは  #search: CommonLines
            引数の注意:
                <( ) は、その中のコマンドによる echo 出力を内容にしたファイルを指定したときと同じ動きをします。
                comm -12  file_1.txt  file_2.txt を実行してもエラーにはなりませんが、
                ソートされていないので正しく処理されません。
                #search: Process Substitution
        ソートしないとエラーになります:  #// comm を使う場合はソートが必要です。bashlib CutCommonPartLines はソート不要です
            コマンド: |
                comm -12  <(cat file_1.txt)  <(cat file_2.txt)
            出力: |
                comm: file 1 is not in sorted order
                comm: file 2 is not in sorted order
                comm: input is not in sorted order
        関連: #glossary: bash array
            部分共通:  #search: grep -Ff
            差分: #keyword: bash array sub diff  #search: grep -Ff  #>> -v オプション  #search: bashlib CutCommonPartLines
            一致しない行:  #search: bashlib NotCommonLines
            重複しないようにします:  #search: Linux uniq
            関数定義順比較:  #search: sh-order.sh
    jq コマンド(JSON):  #keyword: Linux jq JSON,  jq
        手順:
            インストール:
                CentOS7:
                    sudo yum install -y jq
                Windows Git bash:
                    注意: ❗ jq の起動が遅すぎるため、PowerShell の ConvertFrom-Json を推奨します  #search: ConvertFrom-Json
                        #参考: Twitter 検索: "jq" windopws
                    ダウンロードします: https://github.com/stedolan/jq/ >>
                        Releases（右）>> jq-win64.exe（少し下へスクロール）
                    ダウンロードした jq-win64.exe のファイル名を jq.exe に変えます:
                        jq.exe
                    jq.exe を C:\Program Files\Git\usr\bin にコピーします:
                        C:\Program Files\Git\usr\bin
                    jq.exe の起動が時々15秒近くかからないようにします:
                        - ❗ 以下の方法でも解決しません
                        - jq.exe（を右クリック）>> 許可する（右下）>> OK  #// セキュリティ警告をさせないようにします
                        - jq.exe（をダブルクリック） #// 見えないくらい一瞬だけヘルプ表示をします。なぜか必要
                    Git bash を開いて動作確認をします:
                        jq --version
                関連ツール:
                    Ubuntu の JSON:
                        python3 -m json.tool: 整形します
            JSON を置き換えます: #keyword: jq replace
                フィルター:  #// 一部のフィールドだけ取り出します  #search: jq filters
                    "[]":
                        実行例: |  #// jq  [配列の場所 | [ 抽出するフィールド名の CSV ] | @csv]  #search: Object Identifier-Index
                            cat _output.json | jq '[.hits.hits[] | [._source.pref_id, ._source.city_id] | @csv]'
                        実行例 (2): |
                            $ cat _output.json | jq '[.hits.hits[] | [.fields.pref_id[0], .fields.city_id[0]] | @csv]'
                            [
                                "\"13\",\"13101\"",
                                "\"13\",\"13106\""
                            ]
                        入力例 (2) >> ./_output.json ファイルの内容: |
                            {
                            "took" : 2,
                            "timed_out" : false,
                            "_shards" : {
                                "total" : 1,
                                "successful" : 1,
                                "skipped" : 0,
                                "failed" : 0
                            },
                            "hits" : {
                                "total" : {
                                "value" : 2,
                                "relation" : "eq"
                                },
                                "max_score" : 0.18232156,
                                "hits" : [
                                {
                                    "_index" : "museum",
                                    "_type" : "_doc",
                                    "_id" : "44Mix3oBqF1u4elR0bef",
                                    "_score" : 0.18232156,
                                    "fields" : {
                                    "pref_id" : [
                                        "13"
                                    ],
                                    "city_id" : [
                                        "13101"
                                    ]
                                    }
                                },
                                {
                                    "_index" : "museum",
                                    "_type" : "_doc",
                                    "_id" : "5IMix3oBqF1u4elR0beg",
                                    "_score" : 0.18232156,
                                    "fields" : {
                                    "pref_id" : [
                                        "13"
                                    ],
                                    "city_id" : [
                                        "13106"
                                    ]
                                    }
                                }
                                ]
                            }
                            }
                    .__Field__:
                        cat _output.json | jq ".field"
                    配列要素:
                        特定のフィールドの値を持つ配列要素:
                            cat _output.json | jq '.__ArrayField__[] | select(.__FieldName__ == "__Value__")'
                    map:  #focus: name, color
                        置き換え前: [{"name":"Name-A", "color":"red", "others":""}, {"name":"Name-B", "color":"blue", "others":""}]
                        置き換え後: [{"name":"Name-A", "color":"red"}, {"name":"Name-B", "color":"blue"}]
                        コマンド: |
                            echo '[{"name":"Name-A", "color":"red", "others":""}, {"name":"Name-B", "color":"blue", "others":""}]' | jq 'map({name, color})'
                値をフィールド名にします:  #focus: Name-A, red, Name-B, blue
                        置き換え前: [{"name":"Name-A", "color":"red", "others":""}, {"name":"Name-B", "color":"blue", "others":""}]
                        置き換え後: {"Name-A": "red", "Name-B": "blue"}
                        コマンド: |
                            echo '[{"name":"Name-A", "color":"red", "others":""}, {"name":"Name-B", "color":"blue", "others":""}]' | jq 'map({(.name): .color}) | add'
            整形します:
                - cat _output.json | jq
                - cat _output.json | jq __Parameters__
            コンパクトにします:
                - cat _output.json | jq --compact-output
                - cat _output.json | jq --compact-output __Parameters__
        概念:
            基本フィルター:  #keyword: jq filters  #glossary: jq  #search: jq filters  #ref: https://jqlang.github.io/jq/manual/#Basicfilters
                Identity:  #// .  #ref: https://jqlang.github.io/jq/manual/#Identity:.
                    ピリオドだけの記述は、入力したものをそのまま返します。オブジェクトならルートに相当します
                ObjectValueIterator:  #// .[]  #ref: https://jqlang.github.io/jq/manual/#Array/ObjectValueIterator:.[]
                    ピリオドと [] は、配列のすべての要素を返します。JSON のルートが配列ならこれが必要です
                        .[] | .__FieldName__
                Object Identifier-Index:  #// .__FieldName__   #ref: https://jqlang.github.io/jq/manual/#ObjectIdentifier-Index:.foo,.foo.bar
                    オブジェクトのフィールドをたどります。
                        .__FieldName__
                        .__FieldName__.__FieldName__
                    配列のフィールドなら ObjectValueIterator ですべての要素を展開します。Pipe に渡しても渡さなくても構いません。
                        .__FieldName__[].__FieldName__
                        .__FieldName__[] | .__FieldName__
                Pipe:  #// |  #ref: https://jqlang.github.io/jq/manual/#Pipe:|
                    Pipe の左の出力が Pipe の右の Identity になります。
                    .__FieldName__[] | .__FieldName__
                Object Construction:  #// { }  #ref: https://jqlang.github.io/jq/manual/#ObjectConstruction:{}
                    - { __FieldNameA__: __ObjectIdentifier-Index__ }
                    - { (__ObjectIdentifier-Index__): __ObjectIdentifier-Index__ }
    yq コマンド(YAML):  #keyword: Linux yq YAML,  yq
        インストール:  #// 汎用  #ref: https://github.com/mikefarah/yq
