                            ./pack/
                            ./pack/example.txt
                            ./pack/example_a.txt

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude "su"
                            ./pack/
                            ./pack/example.txt
                            ./pack/example_a.txt
                            ./pack/sub/
                            ./pack/sub/example.txt
                            ./pack/sub/example_a.txt

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude ".txt"
                            ./pack/
                            ./pack/example.txt
                            ./pack/example_a.txt
                            ./pack/sub/
                            ./pack/sub/example.txt
                            ./pack/sub/example_a.txt

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude "*.txt"
