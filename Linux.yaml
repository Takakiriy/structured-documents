                            dnf repoquery --requires --resolve --recursive --tree  __Package__
                            - (❗) 依存パッケージがインストールしてないと、その依存パッケージは表示されません
                            - ルート以外をすべて選んで最初のインデントを 4 にします
                            - "|" を空白に置き換えます。
                        （ボツ）:
