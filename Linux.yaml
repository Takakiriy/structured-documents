                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude "./pack/example.txt"
                            ./pack/
                            ./pack/example_a.txt
                            ./pack/sub/
                            ./pack/sub/example.txt
                            ./pack/sub/example_a.txt

                            $ tar cvzf  "a.tar.gz"  "./pack"  --exclude "example.txt"
                            ./pack/
                            ./pack/example_a.txt
                            ./pack/sub/
                            ./pack/sub/example_a.txt

