                syslog メッセージ:
                    概要:
                        1024バイト以内のテキスト形式（実際はもっと大きいテキストもできます）
                        発生源の区別（ファシリティ）や優先度（プライオリティ）を設定することができます
                    構造: #keyword: syslog 構造
                        JSON サンプル:
                            {
                                "priority": 134,         // priority = (facility - 1) * 8 + severity
                                "facility": 17,
                                "severity": 6,
                                "timestamp": "2024-03-14T12:34:56.789Z",
                                "hostname": "host1",
                                "program": "logger",
                                "message": "Test message"
                            }
                        JSON サンプル2:
                            {"host":"pc01","ident":"user1","pid":"-","msgid":"-","extradata":"[timeQuality tzKnown=\"1\" isSynced=\"1\" syncAccuracy=\"3539\"]","message":"Test message"}
                        1行サンプル: |
                            Mar 14 12:34:56 __Host__ __Tag__: __Message__
                        facility:  #// JSON には下記の数値 + 1 が書かれます
                            0: kernel
                            1: user
                            2: mail
                            3: daemon
                            4: auth
                            5: syslog
                            6: lpr
                            7: news
                            8: uucp
                            9: cron
                            10: authpriv
                            11: ftp
                            12: ntp
                            13: security
                            14: console
                            15: cron2
                            16-23: local0-local7
                        severity:
                            0: Emergency (emerg)
                            1: Alert (alert)
                            2: Critical (crit)
                            3: Error (err)
                            4: Warning (warning)
                            5: Notice (notice)
                            6: Informational (info)
                            7: Debug (debug)
                参考: https://e-words.jp/w/syslog.html
