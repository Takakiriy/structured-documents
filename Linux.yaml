        手順: 高負荷の処理が途中で止まり、VSCode で SSH 接続によるフォルダーを開こうとしたとき。ssh コマンドでログインして mkdir を実行したら同じエラーが出るとき
        エラー:
            VSCode の Output タブ: |
                mkdir: cannot create directory ‘/var/lib/jenkins/.vscode-server’: Read-only file
            SSH でログインして mkdir: |
                $ ssh __SSHConfigName__
