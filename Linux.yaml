                    ${__-__}:  #keyword: variable with default value,  bash use default values,  ${__-__}  #search: bash parameter expansion  #// デフォルト値の参照
                        動き: 未定義のときは、__DeafultValue__ を返します。 定義済みのときは、値を返します
                        書式:
                            ${__Variable__-"__DefaultValue__"}  #// variable with default value
                        サンプル:
                            #// Set default values.
                            #// "${__Variable__-"__Default__"}" returns "__Default__" if __Variable__ is NOT defined; otherwise, it returns "${__Variable__}".
                            Options_SearchPath="${Options_SearchPath-""}"
                            Opt="${Opt-"(default)"}"
                    ${__+__}:  #keyword: bash variable is defined
                        動き: 定義済みのときは、__DefinedCaseValue__ を返します。 未定義のときは、"" を返します
                        書式:
                            ${__Variable__+"__DefinedCaseValue__"}  #// variable with default value
                            #// + の前に空白を入れることはできません
                        サンプル: |
                            if [ "${Options_SearchPath+"_is_defined"}" != "_is_defined" ]; then
                                echo "ERROR"; exit 1
                            fi
                    ${__:-__}: #// 非推奨  #keyword: ${__:-__}  #search: bash parameter expansion  #// デフォルト値の参照
                        ❗: 非推奨。空文字列 "" が設定できなくなるため。読みやすいですが残念ながらその問題があります。
                            __DefaultValue__ が "" の場合でも、この書き方をすると、デフォルト値が変わったときに問題になる可能性が高いため。
                            推奨は #search: variable with default value
                        動き: 未定義 または "" のとき、__DeafultValue__ を返します
                        書式:
                            ${__Variable__:-"__DefaultValue__"}  #// variable with default value
                            #// ${__Variable__} のデフォルト値は "" です
                    ${__:=__}: #// 非推奨  #keyword: bash assign default values,  ${__:=__}  #search: bash parameter expansion  #// デフォルト値の代入
                        ❗: 非推奨。空文字列 "" が設定できなくないため。また、行頭のコロンがタイプミスに見えてしまうため。
                            推奨は #search: variable with default value
                        サンプル: |  #// 非推奨。代入すること（の可能性）が分かりにくいため
                            : ${__Variable__:=__DefaultValue__}
                            echo  ${__Variable__:=__DefaultValue__}
                        コロン: 何もしない命令。ただし引数は評価します
                        動作: ${__:=__} を評価すると、__Variable__ 変数が空文字列だったら __Variable__ 変数に __DefaultValue__ を代入します。
                            また、__Variable__ 変数の値が返ります。__Variable__ 変数が空文字列だったら __DefaultValue__ が返ります。
