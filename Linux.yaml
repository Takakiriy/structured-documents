        WaitForRemoteFileExists:  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/others.sh#WaitForRemoteFileExists
            シーケンス:  #keyword: WaitForRemoteFileExists sequence
                図: |  #focus: _notify_transfered,  _notify_received
                    SSH client               SSH server
                    ------------------------------------
                    || (C1)                   || (S1)
                    || Wait                   ||
                    ||     _notify_transfered ||
                    | <=======================|
                    || (C2)                   | Wait
                    || _notify_received       |
                    |=======================> |
                    |                         || (S2)
                スクリプト: |  #focus: touch, WaitForRemoteFileExists, WaitForFileExists
                    if [ "SSH client" == "${current}" ]; then
                        PushBreadcrumb  " >> SSH client (1)"
                            ...(C1)
                        PopBreadcrumb  " >> SSH client (1)"
                    fi
                    if [ "SSH server" == "${current}" ]; then
                        PushBreadcrumb  " >> SSH server (1)"
                            ...(S1)
                        RunInGitBash \
                            touch  "____/_notify_transfered"  ||  Error
                        PopBreadcrumb  " >> SSH server (1)"
                    fi
                    if [ "SSH client" == "${current}" ]; then
                        WaitForRemoteFileExists  "__User__@__Host__"  "____/_notify_transfered"
                        PushBreadcrumb  " >> SSH client (2)"
                            ...(C2)
                        RunInGitBash  ssh  ${sshOptions}  \
                            touch  "____/_notify_received"  ||  Error
                        PopBreadcrumb  " >> SSH client (2)"
                    fi
                    if [ "SSH server" == "${current}" ]; then
                        WaitForFileExists  "____/_notify_received"
                        PushBreadcrumb  " >> SSH server (2)"
                            ...(S2)
                トラブルシューティング(WaitForRemoteFileExists):  #keyword: WaitForRemoteFileExists sequence trouble
                    永遠に待ち続ける場合:
                        - SSH client (1) などのログがどこまで出ているか確認します
                        - SSH client (1) または SSH server (1) が出ていない場合、このシーケンスが行われるもっと前にエラーが出ている可能性が高いです
                        - 待っている通知を発信する相手側の処理を確認します
                        - 時系列的には待っている処理の前の処理です(?)
                        - touch と Wait を上記のように書けば、時系列とコードの順番が一致します。ただし Wait の開始だけ早く行われます
        WaitForUpMySQL:  #ref: ${GitHub}/MyPrivateCode/ansible_vagrant/single_vm_ansible/others.sh#WaitForUpMySQL
