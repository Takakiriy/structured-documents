    kill: #// プロセスを終了するか再起動します。プロセスの有無を調べます  #keyword: kill
        プロセスを強制終了します:
            SIGKILL シグナルを送ります:
                書式 >> プロセスID: kill -9 __ProcessID__
                書式 >> ジョブID: kill -9 %__JobID__
        プロセスを再起動します:
            SIGHUP シグナルを送ります:  #keyword: Linux kill SIGHUP
                書式: kill -HUP __ProcessID__
                サンプル: kill -HUP $(pgrep -f "consul agent")
                    #// pgrep については #search: pgrep
        オプション:
            -9: 強制終了をリクエストします
            -2: Ctrl + C を送ります
            -0: #keyword: Linux kill zero  #ref: https://unix.stackexchange.com/questions/169898/what-does-kill-0-do
                リクエストを送らないが、プロセスの存在は確認できます  #search: bashlib IsProcessExists
            その他数字: |
                0   リクエストを送らない  #search: Linux kill zero
                1   SIGHUP  再起動
                2   SIGINT  割り込み
                6   SIGABRT 中断
                9   SIGKILL 強制終了
                15  SIGTERM 終了
                17  SIGSTOP 停止
                18  SIGCONT 再開
        プロセスの有無:
            if kill -0 "$PID" 2>/dev/null; then
        その他の kill 系コマンド:  #glossary: Linux
            pkill:  #// 条件付き。プロセス名、ユーザID、グループID、セッションID、制御端末など
                -f オプション: コマンドに入力した内容を検索対象にします
                Git bash の場合:  #// pkill が使えません
                    修正前: pkill -f "${pName}" 
                    修正後:
                        #// ただし、Git bash の ps は入力したコマンドは表示されず、コマンドのパスだけ表示されます
                        local  killingPID=$(ps | grep "${pName}" | awk '{print $1}' | head -n 1)
                        if [ "${killingPID}" != "" ]; then
                            taskkill //PID ${killingPID}
                        fi
            killall:  #// プロセス名 指定
            kill:  #// プロセスID 指定
        参考: #// https://xtech.nikkei.com/it/article/COLUMN/20060227/230806/
    wait:  #// プロセスの終了を待ちます  https://qiita.com/inosy22/items/341cfc589494b8211844#シェルスクリプト内でのバックグランド実行と同期待ち
        コマンド:
            wait "${parallelProcessID}"
            exitCode=$!
        終了コード:
            指定した子プロセスの終了コード
            すでに終了していても取得できます
    setsid:  #// 別セッションに隔離します。親プロセスと異なる PGID にします。プロセスをターミナルから切り離します（ファイルへリダイレクトで出力はできます）
        サンプル: |  #focus: setsid,  my-service
            PYTHONUNBUFFERED=1  setsid  ./my-service  >  >( tee "./service.log" )  2>&1  &  #search: pipe like process substitution
            local  servicePID=$!  #// $! は setsid の PID です。 通常、setsid 内部で exec を実行しているため、my-service の PID でもあります
            DeferKillProcessGroup  "${servicePID}"  #search: DeferKillProcessGroup
        PGID: #search:
    timeout:  #// タイムアウトを設定してコマンドを実行します。ただし、シェルスクリプトでは Ctrl+C が効かなくなるようです。
        ターミナルに入力する場合: |
            timeout 5s  read -s -p "Enter password: "  PASSWORD
        シェルスクリプトの場合: |  #focus: --foreground  #// --foreground はタイムアウトの時間の左に書いてください
            #!/bin/bash
            timeout --foreground 5s  read -s -p "Enter password: "  PASSWORD
            echo "done"
            exit
        -k, --kill-after オプション: |  #// 5秒後にSIGTERM、更に 2秒後に SIGKILL
            timeout -k 2s 5s  read -s -p "Enter password: "  PASSWORD
        --foreground オプション:
            _: シェルスクリプトの場合は、付けないとシグナルが届きません
            Ctrl+C が届く範囲, PGID:  #keyword: timeout Ctrl+C,  timeout PGID
                #// PGID が変わるため Ctrl+C が届きません
                ターミナルに --foreground なしで入力する場合:
                    bash(PGID=A)
                    └─ timeout(PGID=B) ← 並行して届く
                        └─ playwright(PGID=B) ← 並行して届く。--foreground なしでも PGID は変わらない
                ターミナルに --foreground ありで入力する場合:
                    bash(PGID=A)
                    └─ timeout(PGID=B) ← 並行して届く
                        └─ playwright(PGID=B) ← 並行して届く
                シェルスクリプトで --foreground なしの場合:
                    bash(PGID=A)
                    └─ script:bash(PGID=B) ← 並行して届く（既定の動き）
                        └─ timeout(PGID=C) ← 届かない（PGID が変わるため）
                                └─ playwright(PGID=C) ← 届かない
                シェルスクリプトで --foreground ありの場合:
                    bash(PGID=A)
                    └─ script:bash(PGID=B) ← 並行して届く
                        └─ timeout(PGID=B) ← 並行して届く
                                └─ playwright(PGID=B) ← 並行して届く
                確認コマンド:
                    timeout  5s  ps -eo pid,pgid,ppid,cmd
        #search: bash Ctrl+C
    flock:  #// 二重起動防止。先に使っている人がいたら待つ。または諦める。自分自身（同じスクリプトの次の時間など異なるインスタンス）でも待ちます
        基本:
            flock -n  __LockFilePath__ __Command__ __Parameters__
            flock -n  __FileDescriptorNumber__ __Command__ __Parameters__
        サンプル:
            コマンド:
                flock -n  "${PWD}/example.lock"  timeout -k 2s 10s  sh -c "echo start; sleep 5s; echo end"  ||  echo "$? (locked, time out or error)"
            flock や timeout の終了コード:
                ロック: 1
                タイムアウト: 124
            二重起動させます:
                ターミナルを 2つ開きます:  #// 左右に並ぶように開きます
                ターミナル1 でコマンドを実行します:
                    $ flock ... sleep 5s ...
                    start
                ターミナル2 でコマンドを実行します:  #// ターミナル1 の flock が終わる前に実行させて、すぐエラーになることを確認します
                    $ flock ... sleep 5s ...
                    1 (locked, time out or error)
                ターミナル1 の終了を待ちます:  #// 5秒後
                    end
            タイムアウトさせます:  #// snmpd exec の場合、snmpd 側のタイムアウトより短くしてください
                処理が長くなるようにコマンドを変更します:
                    sleep 5s を sleep 25s に変えます
                ターミナル1 でコマンドを実行します:
                    $ flock ... sleep 25s ...
                    start
                ターミナル2 でコマンドを実行します:  #// ターミナル1 の flock が終わる前に
                    $ flock ... sleep 25s ...
                    1 (locked, time out or error)
                ターミナル1 のタイムアウトを待ちます:  #// 10秒後
                    124 (locked, time out or error)
                ターミナル2 でコマンドをすぐ実行できます:
                    $ flock ... sleep 25s ...
                    start
        #↓ 待機
        -n オプション:  #// 即時失敗（推奨）
            待機させても良いことはほぼありません。
            -n も -w も指定しないときは、無限に待ちます。
        -w __Seconds__ オプション:  #// 最大待ち時間
            指定しないときは無限に待ちます
        タイムアウトの主体:
            SNMPクライアント:  #// 監視ツール側
                クライアント側のほうがタイムアウトが短いと、エージェント側は処理を継続する問題が発生するので、
                エージェント側に二重起動防止が必要です。
                クライアント側がリトライしたタイミングでも、二重起動防止が必要です。
            snmpd:  #// エージェント側
                エージェント側のほうがタイムアウトが短いと、クライアント側は失敗を返し、継続する問題は発生しません。
        #↓ 共有
        -s オプション:  #// 共有ロック、リード用
        -x オプション:  #// 排他ロック（デフォルト）、ライト用
        #↓ 共有
        -u オプション:  #// ロック解除
        関連:
            fcntl lock: #search:
    fcntl lock:
        概要:
            ファイルの一部だけロックできる
            同じプロセス内で同じファイルを reopen しても ロックは共有される
            flock と fcntl は互いに独立
        #↓ 参考
        ロックの種類:
            advisory lock:  #// 通常
                flock を使うプログラム同士だけ排他が成立する
            mandatory lock:
                ロックされていると、ロックしたもの以外のシステム全体で read / write 自体が失敗
    nohup:  #// ログアウトしてもプロセスを停止させません。バックグラウンド実行します
        #ref: https://qiita.com/inosy22/items/341cfc589494b8211844#nohupでログアウトしてもバックグラウンド実行
    strace:  #// プロセスをトレースします
        オプション:
            tt: 行頭にタイムスタンプをマイクロ秒単位で出力
            T: 行末にシステムコール内での所要時間を出力
            ff: 子プロセスのシステムコールもトレースし、-o との併用でプロセス（スレッド）毎に別ファイルに出力
            o: 指定したファイルに出力。-ff と併用すると、ファイルパス. に出力
            s: 出力文字数を指定。I/Oサイズが1MBなど大きい場合で、読書きした内容を確認したい場合は、大きくする。
            p: プロセスIDを指定。
            #ref: https://qiita.com/yoheia/items/22f7a85ac1b426e34d4e
        関連:
            #search: Linux http strace
    free: |  #// メモリーの使用量  #search: free
