            ZooKeeper:  #// 設定情報の集中管理  #keyword:
                概要: 
                    分散アプリケーションの実装に必要となる同期処理や設定管理などを行ってくれるミドルウェア  https://qiita.com/xkent/items/37322cb735c6c620a49b#kafkaの設定
                    複数のマシン（ノード）の設定情報の集中管理、同期、スラッシュ文字による階層的な名前付け、グルーピングなど。
                    Kafka などが使っています。
                    ZooKeeperノードへの問い合わせが失敗したら、他のノードに問い合わせることができる。
                    データの更新は一つのマスターノードだけが行う。
                    用途は、ディレクトリ・サービス、構成管理、同期 (計算機科学)、リーダー選出、メッセージキュー
                手順:
                    ZooKeeper サーバーの状態表示:  #search: ZooKeeper nc stat
