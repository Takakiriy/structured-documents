                    定義: |  #// import する側に定義します
                        function  DefineGlobalVariablesSafely() {
                            local  defineScriptString="$1"
                            local  cr=$'\r'
                            local  regularExpression="^([A-Za-z_][A-Za-z0-9_]*)='([^']*)' *${cr}?$"  #// Name='Value' format

                            local line
                            while IFS= read -r line; do  #// line=( read line from "defineScriptString" )

                                if ! [[ "${line}" =~ ${regularExpression} ]]; then  #// =~ operator is faster than grep command.
                                    continue
                                fi
                                local  name="${BASH_REMATCH[1]}"   #// from =~ operator
                                local  value="${BASH_REMATCH[2]}"  #// from =~ operator

                                if [ "${GlobalVariablesWhiteList[${name}=]}" != "" ]; then  #// Check by using white list

