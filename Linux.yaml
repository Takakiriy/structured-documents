    sed コマンド:  #ref: ${programming}/OS/UNIX-Linux/!Linux.svg#sed  #keyword: sed,  Linux sed
        基本: | #// 置き換えます  #focus: sed  #keyword: sed s
            mkdir -p ~/_work
            cd       ~/_work
            echo "aaaaa" >  "target.txt"

            sed  -E 's/aa/AA/g'  -i "target.txt"    #// -iE はエラーになりますが、-Ei はエラーになりません。 -i を指定しないと標準出力に出力されます
                                                    #keyword: sed -iE, grep -iE
                                                        #// sed -iE は、-i の引数として E を指定ている扱いになります。バックアップ拡張子に E を指定しています
                                                        #// grep -iE は -i オプションと -E オプションを指定ている扱いになります。ignore case と 拡張正規表現
            cat "target.txt"
                #// AAAAa

            rm "target.txt"
            cd ..
            rm -rf ~/_work
        / を含むとき:  #// たとえば /home/user1 を置き換えようとして s/${filePath}/__x__/ を指定するとスラッシュが制御文字として解釈されてエラーになります
            #// 以下のいずれかに変えます
            - s|${filePath}|__x__|
            - s^${filePath}^__x__^
        基本, 1行の中の編集: #🌟
            応用:
                1行の中の複数個所にマッチする場合:
                    s/____/____/g: すべてを置き換えます
                    s/____/____/: 最初の 1つだけ置き換えます
                key:value 形式の value の編集: |
                    mkdir -p ~/_work
                    cd       ~/_work
                    echo "key: aaaaa"            >  "target.txt"
                    echo "key: aaaaa  # comment" >> "target.txt"

                    sed -i -E  's/(key): *[^# ]*( *#.*)?/\1: __NewValue__\2/'  "target.txt"

                    cat "target.txt"
                        #// AAAAa

                    rm "target.txt"
                    cd ..
                    rm -rf ~/_work
                コメントアウト:  #keyword: comment out Linux command
                    (#形式): |
                        local  newSettings="$( cat "____" )"
                        local  oldPattern='baseurl=http:\/\/ftp.*\/extras\/\$basearch\/'
                        #// Comment out
                        newSettings="$( echo  "${newSettings}"  |  sed -E 's|^('"${oldPattern}"')|#\1|' )"
                    関連 >> 1行下に追加:  #search: sed add line regular expression
                末尾の / を削除します:
                    sed "s/^\(.*\)\/$/\1/g"
            置き換える前 >> 正規表現: #🌟  #search: 正規表現  #// s/__Before__/__After__/ の __Before__ に指定する特殊な意味がある記号
                #ref: ${programming}/検索技術、DB/正規表現.svg
                メタ文字:
                    一覧:
                        -E オプションあり: #keyword: sed -E  #// sed -E 's/a/b/'
                            Ubuntu 20.04, CentOS7:
                                メタ文字: . * ^ $  (  )  {  } [ ]  |  +  ? \
                            mac OS 13:
                                メタ文字: . * ^ $  (  )  {  } [ ]  |  +  ? \
                            #ref: https://stackoverflow.com/questions/3139126/whats-the-difference-between-sed-e-and-sed-e
                            #ref: https://stackoverflow.com/questions/18840175/find-and-replace-with-spaces-using-sed-mac-terminal
                        -e オプションあり:  #// sed -e 's/a/b/'
                            _: mac と互換がないため非推奨
                            Ubuntu 20.04, CentOS7:
                                メタ文字: . * ^ $ \( \) \{ \} [ ] \| \+ \? \
                            mac OS 13:
                                メタ文字: . * ^ $ \( \) \{ \} [ ]
                                使えないメタ文字: \| | \+ + \? ?
                        なし:  #// -e, -E オプションなし,  sed 's/a/b/'
                            _: mac と互換がないため非推奨
                            Ubuntu 20.04, CentOS7:
                                メタ文字: . * ^ $ \( \) \{ \} [ ] \| \+ \? \
                            mac OS 13:
                                メタ文字: . * ^ $ \( \) \{ \} [ ]
                                使えないメタ文字: \| | \+ + \? ?
                        確認手順: |
                            cat > sh
                                Option="-E"
                                echo "abc"    |  sed $Option 's/^a/@/g'     ;  echo  "@bc    #// ^"
                                echo "abc"    |  sed $Option 's/c$/@/g'     ;  echo  "ab@    #// $"
                                echo "abc"    |  sed $Option 's/(b)/@/g'    ;  echo  "a@c    #// ( )"
                                echo "abc"    |  sed $Option 's/\(b\)/@/g'  ;  echo  "a@c    #// \( \)"
                                echo "eee"    |  sed $Option 's/e{2}/@/'    ;  echo  "@e     #// { }"
                                echo "eee"    |  sed $Option 's/e\{2\}/@/'  ;  echo  "@e     #// \{ \}"
                                echo "abcd"   |  sed $Option 's/[^d]*/@/'   ;  echo  "@d     #// [^ ] *"
                                echo "abcd"   |  sed $Option 's/\[^d\]*/@/' ;  echo  "@d     #// \[^ \] *"
                                echo "abcd"   |  sed $Option 's/b|d/@/g'    ;  echo  "a@c@   #// |"
                                echo "abcd"   |  sed $Option 's/b\|d/@/g'   ;  echo  "a@c@   #// \|"
                                echo "abc"    |  sed $Option 's/b+c/@/'     ;  echo  "a@     #// +"
                                echo "abc"    |  sed $Option 's/b\+c/@/'    ;  echo  "a@     #// \+"
                                echo "abc"    |  sed $Option 's/bd?c/@/g'   ;  echo  "a@     #// ?"
                                echo "abc"    |  sed $Option 's/bd\?c/@/g'  ;  echo  "a@     #// \?"
                            chmod +x sh
                            ./sh
                            rm ./sh
                    ( ), キャプチャー グループ: #keyword: 正規表現 ( ), capture group
                        置き換えた後:  #search: back reference
                タブ文字, 空白, \t, \s:
                    タブ文字, \t:  #// [] の中に \t でタブ文字にマッチするように指定すると、mac と互換性が無くなります
                        printf '\t':
                            \t を置き換えた後: |
                                '"$(printf '\t')"'
                            CentOS7, mac OS 13: |
                                echo -e  "1\t2"  |  sed -E  's/'"$(printf '\t')"'/@/'      ;  echo -e  "1@2    #// OK"
                                echo -e  "1\t2"  |  sed -E  's/['"$(printf '\t')"']/@/'    ;  echo -e  "1@2    #// OK"
                                echo -e  "1\t2"  |  sed -E  's/[^'"$(printf '\t')"']*/@/'  ;  echo -e  "@\t2   #// OK"
                            #ref: https://rcmdnk.com/blog/2016/09/13/computer-gnu-bsd-linux-mac/
                        \t:
                            注意: |
                                [] の中の \t は、mac と互換がないため非推奨
                            CentOS7: |
                                echo -e  "1\t2"  |  sed -E  's/\t/@/'      ;  echo -e  "1@2    #// OK"
                                echo -e  "1\t2"  |  sed -E  's/[\t]/@/'    ;  echo -e  "1@2    #// OK"
                                echo -e  "1\t2"  |  sed -E  's/[^\t]*/@/'  ;  echo -e  "@\t2   #// OK"
                            mac OS 13: |
                                echo -e  "1\t2"  |  sed -E  's/\t/@/'      ;  echo -e  "1@2    #// OK"
                                echo -e  "1\t2"  |  sed -E  's/[\t]/@/'    ;  echo -e  "1@2    #// NG"
                                echo -e  "1\t2"  |  sed -E  's/[^\t]*/@/'  ;  echo -e  "@\t2   #// NG"
                                echo -e  "1\t2"  |  sed -E  's/[\\t]/@/'   ;  echo -e  "1@2    #// NG"
                                echo -e  "1\t2"  |  sed -E  's/[^\\t]*/@/' ;  echo -e  "@\t2   #// NG"
                                echo -e  "1\t2"  |  sed -E  's/[\\\\t]/@/'  ; echo -e  "1@2    #// NG"
                                echo -e  "1\t2"  |  sed -E  's/[^\\\\t]*/@/'; echo -e  "@\t2   #// NG"
                        タブ文字のエスケープ: #keyword: escape tab character  #// ターミナルではタブ文字が空白文字に置き換わってしまうことへの対処
                            補足: 空白文字に置き換わってしまうことで SSH でしかアクセスできないサーバーのファイルに含まれる
                                タブ文字のコピー（取り出すこと）ができませんが、\t にエスケープすることで取り出せます。
                            コマンド: cat __FilePath__ | sed 's/\t/\\t/g'
                            貼り付け後: \t を タブ文字 '	' に置き換えます
                    タブ文字または空白, \s, [[:space:]]:
                        互換性:  #// 互換性があるのは [[:space:]]  #// 未確認
                            ( [[:space:]] ): #keyword:
                                echo "a b" | sed -E 's/[[:space:]]b/B/'  #// aB  #// macOS13
                                #ref: https://stackoverflow.com/questions/18840175/find-and-replace-with-spaces-using-sed-mac-terminal
                            \s: #keyword:
                                macOS13:  #// 機能しません
                                    echo "a b" | sed -E 's/\sb/B/'  #// a b
                スラッシュ: #keyword: sed slash
                    \ から / へ:
                        echo "C:\a\b" | sed 's/\\/\//g'
                        echo  "${USERPROFILE//\\/\/}"
                escape-sed, パターンをエスケープします:  #keyword: escape-sed,  escape_sed,  escape regular expression
                    sed で実行:
                        書式:  #// 以下のいずれか
                            -E オプションあり:  #// 推奨
                                - echo 'a$^.*+?(){}|[]' | sed -E 's/([$^.*+?\(\){}\|[])/\\\1/g' | sed -E 's/]/\\]/g'  #// Escape
                            -E オプションなし:
                                - echo "__RegularExpression__" | sed 's/\([$^.*+?\(){}|[]\)/\\\1/g' | sed 's/]/\\]/g'  #// Escape
                        サンプル:
                            コマンド:
                                echo "^$.*+?\(){}/[]|" | sed 's/\([$^.*+?\(){}|\/[]\)/\\\1/g' | sed 's/]/\\]/g'
                            出力:
                                \^\$\.\*\+\?\\\(\)\{\}\/\[\]\|
                    bash:
                        EscapeRegularExpression: #keyword:  #ref: ${GitHub}/breadcrumb/breadcrumb.sh#function  EscapeRegularExpression
                    escape_sed コマンド:
                            escape_sed
                        #ref: https://github.com/Takakiriy/escape_sed
                        #ref: ${GitHub}/escape_sed
            置き換えた後 >> 特殊記号: #keyword: sed after special character  #// s/__Before__/__After__/ の __After__ に指定する特殊な意味がある記号（メタ文字と呼ぶ？）
                '\':  #keyword: back reference  #// 置き換える前の一部を、置き換えた後の一部に入れます。 \ の右の数字は特殊記号のパラメーターです
                    サンプル: |  #focus: \1
                        $ echo "password: 1234" | sed "s/password:\(.*\)/pass:\1/g"
                        pass: 1234
                    説明:
                        置き換える前の キャプチャー グループ ( ) にマッチ部分を置き換えた後の一部に設定します。
                        \ の右の数字は ( ) の番号です。
                    エスケープ: |  #focus: \\1
                        $ echo "password: 1234" | sed 's/password:\(.*\)/pass:\\1/g'
                        pass:\1
                        $ echo "password: 1234" | sed "s/password:\(.*\)/pass:\\\\1/g"
                        pass:\1
                '&':  #// 置き換える前の全体を、置き換えた後の一部に入れます
                    サンプル: |  #focus: &
                        $ echo "password: 1234" | sed "s/word:\(.*\)/(&)/g"
                        pass(word: 1234)
                    エスケープ: |  #focus: \&
                        $ echo "password: 1234" | sed 's/word:\(.*\)/(\&)/g'
                        pass(&)
                        $ echo "password: 1234" | sed "s/word:\(.*\)/(\&)/g"
                        pass(&)
                        $ echo "password: 1234" | sed "s/word:\(.*\)/(\\&)/g"
                        pass(&)
                    #ref: https://unix.stackexchange.com/questions/296705/using-sed-with-ampersand
                '/':  #// s/__Before__/__After__/ の区切り記号
                    エスケープ: |  #focus: \&
                        $ echo "password: 1234" | sed 's/23/\//g'
                        1/4
            一部を参照する, 一部を削除する: #keyword: sed delete
                キーワードより左:
                    最も左にマッチした場所より左: |  #// コロンより右
                        $ echo "http://example.com:80"  |  sed "s/:.*//"  #// マッチした場所と右側を削除
                        http
                    コロンと数字より左: |
                        $ echo "http://example.com:80"  |  sed "s/:[0-9][0-9]*//"  #// マッチした場所と右側を削除
                        http://example.com
                キーワードより右:
                    最も右にマッチした場所より右: |  #// コロンより右
                        $ echo "http://example.com:80" | sed "s/.*://"  #// マッチした場所と左側を削除
                        80
                    最も右にマッチした場所より左: |  #// m より左
                        $ echo "http://example.com:80" | sed 's/\(.*\)m.*/\1/'
                        http://example.co
