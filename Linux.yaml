                export  file_="urls.py"       &&  mkdir -p `dirname ${dst_}/${file_}` && cp -f  "${src_}/${file_}"  "${dst_}/${file_}"
                export  folder_="src/_ommon"  &&  mkdir -p `dirname ${dst_}/${folder_}` && cp -rapT  "${src_}/${folder_}"  "${dst_}/${folder_}"
                export  src_file_="src/index.js"  &&  export  dst_file_="dst/index2.js"  &&  mkdir -p `dirname ${dst_}/${dst_file_}` && cp -f  "${src_}/${src_file_}"  "${dst_}/${dst_file_}"
