            - #// dnf install 404
                手順: dnf install
                ログ: |
                    Status code: 404 for https://rpm.releases.hashicorp.com/fedora/8/x86_64/stable/repodata/repomd.xml
                対処:
                    sudo dnf config-manager --add-repo https://rpm.releases.hashicorp.com/fedora/hashicorp.repo
                    sudo sed -i -E  's/fedora/RHEL/g'  "/etc/yum.repos.d/hashicorp.repo"
                原因:  #ref: https://discuss.hashicorp.com/t/error-when-installing-packer-on-rhel-8/30186/2
                    /etc/yum.repos.d/hashicorp.repo
                        baseurl=https://rpm.releases.hashicorp.com/fedora/$releasever/$basearch/stable
                    の $releasever が Rocky Linux 8 の 8 ですが、対応する fedora のバージョンは 28付近でかなり違います。
                    RHEL のバージョンであれば、Rocky Linux バージョンと同じなので問題になりません。
