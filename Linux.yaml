                                find {}/: 末尾の / があることで、シンボリック リンク のリンク先のフォルダーの内容を出力します
                                2> /dev/null: シンボリック リンク のリンク先がファイルまたは存在しないときのエラー表示を抑制します
                                s/^\(.*\)\/$/\1/g: 末尾の / を削除します。削除しないとフォルダーのパスがある行がインデントだけの行に置き換わってしまいます
                    インストール:
                        コマンド:
                            mkdir -p ~/bin
                            echo 'separator=$(echo -e \\u1f)' > ~/bin/path-indenter
                            echo 'sed "s/\//$separator/g" | sort | uniq | sed "s/$separator/\//g" | sed "1d; s/^\.\///; s/\([^/]*\/\)/    /g"' >> ~/bin/path-indenter
                            chmod +x ~/bin/path-indenter
                        コマンドの解説:
                            #search: path-indenter explanation 1
                            ソートが正しくならない現象を再現するコマンド:  #// 上記の一部
                                echo 'sort | uniq | sed "1d; s/^\.\///; s/\([^/]*\/\)/    /g"' >> ~/bin/path-indenter
                    ケースの例:
                        - ./main/a.txt
                        - ./sub1 -> ./main
                        - ./sub2 -> ./other   #// リンク切れ
                        - ./sub3 -> ./main
                        - ./sub3-x -> ./main   #// ソートのテスト用
                        - ./a.txt -> ./main/a.txt
                    上記ケースを作るコマンド:
                        mkdir -p main  &&  echo a > main/a.txt
                        ln -sf  ./main  ./sub1
                        ln -sf  ./other ./sub2
                        ln -sf  ./main  ./sub3
                        ln -sf  ./main  ./sub3-x
                        ln -sf  ./main/a.txt  ./a.txt
                        ls -l
                    実行結果:
                        a.txt
                        main
                            a.txt
                        sub1
                            a.txt
                        sub2
                        sub3
                            a.txt
                        sub3-x
                            a.txt
                参考: https://qiita.com/yone098@github/items/bba8a42de6b06e40983b
