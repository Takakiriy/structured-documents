                        Options_InRemote="yes"
                    fi

                    function  Main() {
                        if [ "${Options_InRemote}" == "" ]; then
                            RestoreVMs
                            UploadAndRunThisScript
                        else
                            RemoteRun
                        fi
                    }

                    function  RestoreVMs() {
                        cd  "${ThisFolderFullPath}"

                        ____
                    }

                    function  RemoteRun() {
                        pwd

                        ____
                    }

                    function  UploadAndRunThisScript() {
                        local  scriptInLocal="____.sh"
                        local  sshConfig="____"
                        local  workingInRemote="____"
                        local  scriptInRemote="____.sh"
                        cd  "${ThisFolderFullPath}"
                        cd  "../.."  ||  Error  "cd"

                        scp  "${scriptInLocal}"  "${sshConfig}:${scriptInRemote}"
                        ssh  "${sshConfig}"  chmod +x  "${scriptInRemote}"
