マウント:  #// ドライブ
    mount: #keyword: Linux mount
        コマンド:
            - mount  __DeviceName__  __MountPoint__
            - mount -t __Type__  __DeviceName__  __MountPoint__
        コマンドの説明:
            __DeviceName__: /dev/sda3 など
            __MountPoint__: 空のフォルダーのパス
        nfs:
            #search: NFS
        vboxsf:
            実行例: |
                $ sudo mount -t vboxsf hostshare share -o uid=1000,gid=1000
                #// mount -t vboxsf [-o OPTIONS] sharename mountpoint
                /sbin/mount.vboxsf: mounting failed with the error: No such device
                Kernel Module に変更があった場合は「Guest Additions」を再インストールしなけれならないようです
            実行例2: |
                $ sudo mount -t vboxsf VirtuslBoxShare /mnt/VirtualBoxShare
                /sbin/mount.vboxsf: mounting failed with the error: Protocol error
                この Protocol error の大概の原因は、共有フォルダ名のタイプ名ミスで正しい名前に修正すればうまくいく。
                $ sudo mount -t vboxsf VirtualBoxShare /mnt/VirtualBoxShare
        参考: 
            Snap Note: #ref: ${programming}/OS/UNIX-Linux/!Linux.svg#mount
            オプション: #ref: https://atmarkit.itmedia.co.jp/ait/articles/1802/15/news035.html
    umount: #keyword: Linux umount (unmount)
        コマンド:
            - umount __DeviceName__  #// __DeviceName__ の例 /dev/sr0, /dev/sdb1
            - umount __MountPoint__  #// __MountPoint__ の例 /home/user1/share
        参考: #ref: https://atmarkit.itmedia.co.jp/ait/articles/1802/16/news025.html
            #ref: ${programming}/OS/UNIX-Linux/!Linux.svg#mount
    /etc/fstab:  #// mount コマンド用。autofs では使いません
        - share  /home/user1/share  vboxsf  defaults,uid=____,gid=____  0  0
        - share  __MountPoint__  __Type__  defaults,uid=____,gid=____  0  0
    autofs: #keyword:  #// 自動的にマウントします  #search: NFS
    Windows との共有フォルダー内: #keyword: Linux Windows shared file,  Linux shared folder
        環境判定 >> ファイルシステム:  #search: Linux file system
        読み取り専用:  #search: Linux read only
        制限: #keyword: Linux Windows shared file limit  #// 主に Vagrant + CentOS7 の制限
            差分コピー: |
                タイムスタンプは、ホスト OS の時計と ゲスト OS の時計のずれによって、新しいファイルだけコピーする動作が正しく動かない場合があります。
                NTP で時刻を自動調整していても最大 1秒のずれがあるでしょう。
                    status 1:
                        git add  "edit.txt"
                        git status --short
                    status 2:
                        function  CheckIfGitResetState() {  #// All files are git added or not git added
                            local  status="$( git status --short )"
                        echo "${status}"
                bashlib の RsyncFromTemporary や RsyncToTemporary にデフォルトで待ちを入れることで対応しています。
            読み取り専用ファイルの削除: #keyword: Linux read only behavior
                Linux: |  #// 質問されます
                    cd ____
                    echo a >   a.txt
                    chmod 444  a.txt
                    rm         a.txt
                        rm: remove write-protected regular file ‘a.txt’? y
                Ubuntu 20.04 in WSL2:  #// Linux と同じ動きをします
                CentOS7 in Windows shared folder by Vagrant: |  #// 質問されますが y を入力しても削除できません
                    cd ____
                    echo a >   a.txt
                    chmod 444  a.txt
                    rm         a.txt
                        rm: remove write-protected regular file ‘a.txt’? y
                        rm: cannot remove ‘a.txt’: Operation not permitted
                    chmod 777  a.txt
                    rm         a.txt
                環境判定 >> ファイルシステム:  #search: Linux file system
            読み取り専用フォルダーの削除:  #// 中に読み取り専用のファイルがある場合
                Linux: |  #// 読み取り専用ではないときと変わりません。削除できます
                    cd ____
                    mkdir -p  sub
                    echo a >  sub/a.txt
                    chmod 444 sub/a.txt
                    rm -rf    sub
                Ubuntu 20.04 in WSL2:  #// Linux と同じ動きをします
                CentOS7 in Windows shared folder by Vagrant: |  #// 削除できません
                    cd ____
                    mkdir -p  sub
                    echo a >  sub/a.txt
                    chmod 444 sub/a.txt
                    rm -rf    sub
                        rm: cannot remove ‘sub/a.txt’: Operation not permitted
            フォルダーの移動:
                移動できないことがあります。
                locommit >> Test_PullBase_Conflict で StartInTemporary .. EndInTemporary をなくして再現できます
