                    正常性確認:
                        systemctl status:
                        ログファイルの確認:
                        ログが滞留していないかの確認:  #search: check fluentd buffer
                    設定変更:  #search: fluent.conf
                コマンド:
                    td-agent-gem: #keyword:
                        install: |
                            sudo td-agent-gem install fluent-plugin-kafka --no-document
                        list:
                            sudo td-agent-gem list | grep fluent-plugin-kafka
                概念:
                    レコード, ログ: #keyword: fluentd record  #// fluentd が扱う syslog などのこと。システムやアプリケーションが生成する時間順の記録です。
                        レコード出力に関する設定 td-agent.conf: |
                            <match fluent.**>
                                @type stdout
                            </match>
                        #ref: http://chopl.in/post/2013/04/27/fluentd_internal_log/
                        #ref: https://www.sambaiz.net/article/64/
                        デフォルト: /var/log/td-agent/td-agent.log か？
                            #ref: https://qiita.com/tan_teco/items/630967aeed5ac0c97f1c
                    イベント:  #// syslog の 1行
                    タグ: #keyword: fluentd tag  #// イベントの内容に応じてイベントにタグを付けることでイベントを分類します
                        #// fluentd の設定ファイルに付けられるタグ名が書かれています
                        追記されたファイルで分類する場合 >> 設定ファイル: | #keyword: fluentd <source>  #focus: path, tag
                            <source>
                                @type tail
                                path /var/log/system.log
                                tag system.log
                        内容によってタグを付け替える場合 >> 設定ファイル: | #keyword: rewrite_tag_filter,  fluentd <match>  #focus: rewrite_tag_filter,  pattern
                            <match __TagPattern__>
                                @type rewrite_tag_filter    <!-- タグを付け替えます -->
                                <rule>
                                    key message
                                    pattern /\/Common\/(\w+)-(\w+)-wf-dp/
                                    tag system.log.$1.$2
                                </rule>
                            </match>
                        タグ名の末尾に .user.notice が付いてしまう: #search: fluentd .user.notice tag
                    プラグイン: #keyword: fluentd plug in
                        標準 input プラグイン:  #search: fluentd input
                            - in_http     HTTPのPOSTリクエスト経由でイベントを受け取る  #search: install fluentd
                            - in_syslog   UDPのsyslogプロトコル経由でイベントを受け取る  #search: fluentd syslog
                            - in_forward  TCP/IPを使ってイベントを受け取る。主にほかのfluentdや各言語向けのロギングモジュールからイベントを受け取るのに使われる  #search: fluentd @type forward
                            - in_tail     テキストファイルを監視し、そこに書き込まれたテキストをイベントとして受け取る
                                #// https://knowledge.sakura.ad.jp/1336/3/ >> Apache
                            - in_exec     指定された外部プログラムを実行し、その出力をイベントとして受け取る。指定されたプログラムは永続的、もしくは指定された時間間隔で定期的に実行される
                            - in_scribe   Facebookが開発したログ収集サービス「Scribe」のプロトコル経由でイベントを受け取る
                            - MessagePackベースの独自プロトコル
                            - Unix Domain Socket
                            - 任意のテキストファイルを監視
                        標準 outputプラグイン:  #search: fluentd output
                            - out_stdout        Non-Buffered  標準出力にログを出力する
                                #search: install fluentd
                            - out_file          Time Sliced   指定したファイルにログを記録する
                                #search: install fluentd
                            - out_exec          Time Sliced   引数としてログを与えて外部プログラムを実行する
                            - out_copy          Non-Buffered  1つ以上の出力先にログを転送する
                                #// https://knowledge.sakura.ad.jp/1336/3/ >> ログをMongoDBに記録する
                                #// https://papix.hatenablog.com/entry/2014/11/05/185449
                            - out_null          Non-Buffered  なにも出力しない
                            - out_roundrobin    Non-Buffered  指定した1つ以上の出力先にラウンドロビンアルゴリズムを使ってログを転送する
                            - out_exec_filter   Buffered      引数としてログを与えて外部プログラムを実行し、その入力をイベントとして受け取る
                            - out_forward       Buffered      ほかのfluentdにネットワーク経由でログを転送する
                                通信相手は in_forward プラグインを使う
                                #// https://knowledge.sakura.ad.jp/1336/3/
                            - out_mongo         Buffered      MongoDBにログを記録する
                                #// https://knowledge.sakura.ad.jp/1336/3/
                            - out_mongo_replset               MongoDBにログを記録する
                            - out_s3            Time Sliced   Amazon S3ストレージにログを記録する
                            - out_webhdfsQ      Time Sliced   HDFS（Hadoop Distributed File System）にログを記録する
                            #// 情報元:  柔軟なログ収集を可能にする「fluentd」入門:  #// https://knowledge.sakura.ad.jp/1336/
                        追加プラグイン:
                            - copy_ex  #// out_copy プラグインが推奨
                                #// https://github.com/sonots/fluent-plugin-copy_ex
                                    #// td-agent-gem install fluent-plugin-copy_ex
