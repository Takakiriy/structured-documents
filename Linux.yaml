                    RedHat:  #ref: https://access.redhat.com/documentation/ja-jp/red_hat_enterprise_linux/7/html/rpm_packaging_guide/packaging-software
                ❗バージョンに注意: #keyword: rpmbuild OS version
                    RPM を作る OS とその メジャー バージョン は、
                    RPM のサービスが動くサーバーの OS とその メジャー バージョン に一致させてください
                手順:
                    インストール:  #// rpmbuild コマンドのインストール
                        sudo yum install -y  rpmdevtools
                    RPM ファイルを作ります:  #// ビルドします
                        最も簡単なパッケージ:  #keyword: rpmbuild example
                            参考: https://access.redhat.com/documentation/ja-jp/red_hat_enterprise_linux/7/html-single/rpm_packaging_guide/index
                            （初回のみ）rpmdev-setuptree コマンドで作業用フォルダー ~/rpmbuild を作ります:  #keyword: rpmdev-setuptree
                                - sudo yum install -y rpmdevtools yum-utils  #// rpmdev-setuptree コマンドなどをインストールします
                                - rpmdev-setuptree  #// ~/rpmbuild フォルダーが作られます
                            SPEC ファイルのサンプルを作ります:  #search: rpmbuild .spec file
                                - mkdir ~/try_rpm
                                - cd    ~/try_rpm  #// このフォルダーを __Project__ とします
                                - code  __Project__/hello-world.spec : | #// template: __Name__.spec
                                    Name:       hello-world
                                    Version:    1
                                    Release:    1
                                    Summary:    Most simple RPM package
                                    License:    FIXME

                                    %description
                                    This is my first RPM package, which does nothing.

                                    %prep
                                    # we have no source, so nothing here

                                    %build
                                    cat > hello-world.sh <<EOF
                                    #!/usr/bin/bash
                                    echo Hello world
                                    EOF

                                    %install
                                    mkdir -p %{buildroot}/usr/bin/
                                    install -m 755 hello-world.sh %{buildroot}/usr/bin/hello-world.sh

                                    %files
                                    /usr/bin/hello-world.sh

                                    %changelog
                                    # let's skip this for now
                            （必要なら）SPEC ファイルのスタイルを検査します（サニティーチェック）:
                                rpmlint:  #keyword: rpmlint
                                    参考: https://access.redhat.com/documentation/ja-jp/red_hat_enterprise_linux/7/html-single/rpm_packaging_guide/index#checking-rpms-for-sanity_packaging-software
                                    rpmlint をインストールします:
                                        sudo yum install -y rpmlint
                                    rpmlint を実行します:
                                        rpmlint __Name__.spec
                            .rpm ファイルを作ります（ビルドします）:
                                - cd __Project__
                                - rpmbuild -ba hello-world.spec
                                    #// -ba ば ソースRPM と バイナリRPM の両方を作ります
                                    #// -bs は ソースRPM のみ作ります
                                    #// -bb は バイナリRPM のみ作ります
                            出力ファイルの場所:
                                ソースRPM:   ~/rpmbuild/SRPMS/hello-world-1-1.src.rpm
                                バイナリRPM: ~/rpmbuild/RPMS/x86_64/hello-world-1-1.x86_64.rpm
                            できた RPM パッケージをインストールします（rpm コマンド）:
                                sudo rpm -ivh  ~/rpmbuild/RPMS/x86_64/hello-world-1-1.x86_64.rpm
                                    #// template: sudo rpm -ivh  __RPM_FilePath__
                            インストールしたコマンドを実行します:
                                hello-world.sh  #// %files に設定したファイルが実行されます
                            インストールされていることを確認します。RPM パッケージの名前を表示します:
                                rpm -qa | grep hello  #// hello-world-1-1.x86_64
                            アンインストールします:
                                sudo rpm -ev hello-world-1-1.x86_64  #// template: rpm -ev __FullName__
                        コンパイルするパッケージ(bash, Python, C言語):
                            参考: https://access.redhat.com/documentation/ja-jp/red_hat_enterprise_linux/7/html-single/rpm_packaging_guide/index#working-with-spec-files
                            パッケージに入れるプロジェクトを作り、~/rpmbuild/SOURCES フォルダーに配置します:
                                bash:
                                    cd ~/rpmbuild/SOURCES
                                    wget https://github.com/redhat-developer/rpm-packaging-guide/raw/master/example-code/bello-0.1.tar.gz
                                    wget https://github.com/redhat-developer/rpm-packaging-guide/raw/master/example-code/pello-0.1.2.tar.gz
                                    wget https://github.com/redhat-developer/rpm-packaging-guide/raw/master/example-code/cello-1.0.tar.gz
                                    wget https://raw.githubusercontent.com/redhat-developer/rpm-packaging-guide/master/example-code/cello-output-first-patch.patch
                            SPEC ファイルを作ります:
                                rpmdev-newspec を使って SPEC ファイルのテンプレートを作る場合:  #keyword: rpmdev-newspec
                                    cd ~/rpmbuild/SPECS
                                    rpmdev-newspec bello  #// bello.spec ファイルが作られます  #// template: rpmdev-newspec __Name__
                                code ~/rpmbuild/SPECS/bello.spec : |  #// bash シェルスクリプト用の SPEC ファイルのサンプル
                                    Name:           bello
                                    Version:        0.1
                                    Release:        1%{?dist}
                                    Summary:        Hello World example implemented in bash script

                                    License:        GPLv3+
                                    URL:            https://www.example.com/%{name}
                                    Source0:        https://www.example.com/%{name}/releases/%{name}-%{version}.tar.gz

                                    Requires:       bash

                                    BuildArch:      noarch

                                    %description
                                    The long-tail description for our Hello World Example implemented in
                                    bash script.

                                    %prep
                                    %setup -q

                                    %build

                                    %install

                                    mkdir -p %{buildroot}/%{_bindir}

                                    install -m 0755 %{name} %{buildroot}/%{_bindir}/%{name}

                                    %files
                                    %license LICENSE
                                    %{_bindir}/%{name}

                                    %changelog
                                    * Tue May 31 2016 Adam Miller <maxamillion@fedoraproject.org> - 0.1-1
                                    - First bello package
                                    - Example second item in the changelog for version-release 0.1-1
                                code ~/rpmbuild/SPECS/pello.spec : |  #// Pytho 用の SPEC ファイルのサンプル
                                    Name:           pello
                                    Version:        0.1.2
                                    Release:        1%{?dist}
                                    Summary:        Hello World example implemented in Python

                                    License:        GPLv3+
                                    URL:            https://www.example.com/%{name}
                                    Source0:        https://www.example.com/%{name}/releases/%{name}-%{version}.tar.gz

                                    BuildRequires:  python
                                    Requires:       python
                                    Requires:       bash

                                    BuildArch:      noarch

                                    %description
                                    The long-tail description for our Hello World Example implemented in Python.

                                    %prep
                                    %setup -q

                                    %build

                                    python -m compileall %{name}.py

                                    %install

                                    mkdir -p %{buildroot}/%{_bindir}
                                    mkdir -p %{buildroot}/usr/lib/%{name}

                                    cat > %{buildroot}/%{_bindir}/%{name} <←EOF
                                    #!/bin/bash
                                    /usr/bin/python /usr/lib/%{name}/%{name}.pyc
                                    EOF

                                    chmod 0755 %{buildroot}/%{_bindir}/%{name}

                                    install -m 0644 %{name}.py* %{buildroot}/usr/lib/%{name}/

                                    %files
                                    %license LICENSE
                                    %dir /usr/lib/%{name}/
                                    %{_bindir}/%{name}
                                    /usr/lib/%{name}/%{name}.py*

                                    %changelog
                                    * Tue May 31 2016 Adam Miller <maxamillion@fedoraproject.org> - 0.1.1-1
                                    - First pello package
                                code ~/rpmbuild/SPECS/cello.spec : |  #// C言語用の SPEC ファイルのサンプル
                                    Name:           cello
                                    Version:        1.0
                                    Release:        1%{?dist}
                                    Summary:        Hello World example implemented in C

                                    License:        GPLv3+
                                    URL:            https://www.example.com/%{name}
                                    Source0:        https://www.example.com/%{name}/releases/%{name}-%{version}.tar.gz

                                    Patch0:         cello-output-first-patch.patch

                                    BuildRequires:  gcc
                                    BuildRequires:  make

                                    %description
                                    The long-tail description for our Hello World Example implemented in
                                    C.

                                    %prep
                                    %setup -q

                                    %patch0

                                    %build
                                    make %{?_smp_mflags}

                                    %install
                                    %make_install

                                    %files
                                    %license LICENSE
                                    %{_bindir}/%{name}

                                    %changelog
                                    * Tue May 31 2016 Adam Miller <maxamillion@fedoraproject.org> - 1.0-1
                                    - First cello package
                            ソースRPM ファイルを作ります:
                                cd ~/rpmbuild/SPECS
                                rpmbuild -bs bello.spec
                                rpmbuild -bs pello.spec
                                rpmbuild -bs cello.spec
                        途中だけ再実行する場合:  #search: rpmbuild skip option  #// ビルドの途中
                        トラブルシューティング(rpmbuild):
                            失敗したビルドを調べるとき: ~/rpmbuild/BUILD フォルダーの内容を調べます
                オプション:
                    --define: #keyword: rpmbuild --define  #// マクロ定義
                        --define 'with___SubMPackagName__ 1'
                    スキップ:  #keyword: rpmbuild skip option
                        -ba: (%prep, %build, %install, %file, .rpm, %clean)
                        -bb: (%prep, %build, %install, %file, .rpm, .src.rpm, %clean)
                        -bp: (%prep)  #// 未確認
                        -bc: (%build) #// 未確認
                        -bi: (%install) #// 未確認
                        -bl: (%file) #// 未確認
                        --short-circuit: -bc, -bi, -tc, -ti のいずれかと同時に指定できます（パラメーター取る？） #// 未確認
                ログ:
                    rpmbuild コマンドのログ: |  #focus: __Command__, %prep, %build, %install, %doc, Processing files
                        Executing(%prep): /bin/sh -e /var/tmp/rpm-tmp.__Random__
                        + __Command__
                        __Output__
                        + __Command__
                        __Output__
                        Executing(%build): /bin/sh -e /var/tmp/rpm-tmp.__Random__
                        + __Command__
                        __Output__
                        + __Command__
                        __Output__
                        Executing(%install): /bin/sh -e /var/tmp/rpm-tmp.__Random__
                        + __Command__
                        __Output__
                        + __Command__
                        __Output__
                        Executing(%doc): /bin/sh -e /var/tmp/rpm-tmp.__Random__
                        + __Command__
                        __Output__
                        + __Command__
                        __Output__
                        Requires(interp): /bin/sh /bin/sh /bin/sh /bin/sh
                        Requires(rpmlib): rpmlib(CompressedFileNames) <= 3.0.4-1 rpmlib(FileDigests) <= 4.6.0-1 rpmlib(PayloadFilesHavePrefix) <= 4.0-1
                        Requires(post): /bin/sh systemd-units
                        Requires(preun): /bin/sh systemd-units
                        Requires(postun): /bin/sh systemd-units
                        Processing files: __SubPackageName__
                ファイル:
                    _topdir フォルダー: #keyword: _topdir
                        指定方法:
                            rpmbuild  --define "_topdir __FullPath__"  ____
                        構成:
                            (%_topdir):
                                BUILD:
                                BUILDROOT:
                                RPMS:
                                SOURCES:  #keyword: _topdir/SOURCES
                                SPECS:
                                SRPMS:
                    .spec ファイル: #keyword: rpmbuild .spec file
                        サンプル:  #search: rpmbuild example
                        コメント:
                            行頭に #
                        設定セクション: #keyword: .spec setting section
                            Name: パッケージの名前。
                            Version: パッケージのバージョン番号。
                            Release: パッケージのリリース番号。通常は 1 から始まり、パッケージの更新ごとに増加します。
                            Summary: パッケージの簡単な説明
                            License: パッケージのライセンス
                            URL: パッケージのホームページの URL。
                            Source0: |  #// ソース コード (__Project__/SOURCE/____.tar.gz) のパス、または URL
                                #// __Project__/SOURCE/example.tar.gz
                                Source0: example.tar.gz

                                %prep
                                %setup -q
                            Source1, Source2, ...: #keyword: rpmbuild .spec Source1  #// 2つ目以降の ソース コード
                                サンプル: |
                                    Source1: syslog-ng.conf
                                    Source2: syslog-ng.logrotate
                                    Source3: syslog-ng.service
                                相対パスの基準: SOURCE  #search: _topdir/SOURCES
                                注意:
                                    _topdir/SOURCES/ にあるファイルは %prep セクションなどで編集しないでください
                            Patch0: |  #// .patch ファイルのパス
                                Source0: http://example.com/source/package-1.0.tar.gz
                                Patch0:  http://example.com/patches/fix-bug.patch

                                %prep
                                %setup -q
                                %patch0 -p1
                            Patch1, Patch2, ...: |  #// 2つ目以降の .patch ファイルのパス
                                %patch1
                                %patch2
                            BuildRequires: パッケージのビルドに必要な依存関係を指定します。
                                yum install してから rpmbuild してください。
                                BuildRequires は通常複数行書きます。
                            Requires(pre): パッケージの実行に必要な依存関係を指定します。
                            Requires: パッケージの実行に必要な依存関係を指定します。
                        セクション ディレクティブ:  #// %build, %install など。スクリプトまたは設定を書く場所
                            テキストのセクション:  #glossary: rpmbuild
                                (%description): パッケージの詳細な説明を記述します。スクリプトではありません。
                                    サブパッケージがあればそれぞれ設定します  #search: rpmbuild subpackage
                                (%changelog): |  #// パッケージの変更履歴を記述します。
                                    %changelog
                                    * Thu Feb 2 2020 My Name <example@example.com> - 1.0.1-1
                                    - New release.

                                    * Thu Feb 1 2020 My Name <example@example.com> - 1.0.0-1
                                    - First release.
                            行の並びのセクション:  #glossary: rpmbuild
                                (%files):  #// パッケージに含めるファイルとディレクトリを指定します  #ref: https://rpm-packaging-guide.github.io/#files
                                    -   (%doc) や (%license) マクロを使用してドキュメントやライセンスファイルを含めます。
                                    -   Linux ルート付近のパスはなるべくマクロを使います  #search: .spec root dirs
                                    -   サブパッケージがあればそれぞれ設定します  #search: rpmbuild subpackage
                            スクリプト セクション:  #glossary: rpmbuild
                                (%prep):  #// パッケージの準備作業を行います。通常、ソースコードの展開を行う %setup マクロを使用します。
                                    サンプル: |
                                        %prep
                                        %setup -q
                                    サンプル2: |
                                        %prep
                                        %autosetup -p 1
                                    カレント フォルダー:
                                        初期:
                                            _topdir/BUILD
                                        autosetup 実行後:
                                            _topdir/BUILD/__SourceFileNameWithoutTarGz__
                                    (%setup) マクロ: #keyword: rpmbuild .spec %setup,  %setup0 %setup1 %setup2
                                        公式:
                                            #ref: http://ftp.rpm.org/max-rpm/s1-rpm-inside-macros.html#S2-RPM-INSIDE-SETUP-MACRO
                                            #ref: https://rpm-packaging-guide.github.io/#setup
                                        -q: 静かに動作します。詳細な出力を抑制します
                                        -n __DirectoryName__: デフォルトのディレクトリ名（package-version）ではなく、指定した名前のディレクトリにソースを展開します
                                            -n を指定しない場合、%{name}-%{version} を指定したものと同じです
                                        -c: 新しいディレクトリを作成して、そのディレクトリに移動します
                                        -T: #// 通常のソースアーカイブの展開を行いません
                                            -T -b 0:
                                                省略しても同じ動きをします  #// 未確認
                                            サンプル: |
                                                %prep
                                                %setup -T -c -n custom_dir
                                        -a __SourceNumber__: 追加のソースアーカイブを展開します（Source1 なら __SourceNumber__ を 1 に置き換えます） #search: rpmbuild .spec Source1
                                        -b __SourceNumber__: 追加のソースアーカイブを指定したディレクトリに展開します（ビルド中に追加のソースを使う場合）
                                        (%setup*): (*) の部分は無視されます
                                    (%autosetup) マクロ: #keyword: rpmbuild .spec %autosetup
                                            #ref: https://github.com/rpm-software-management/rpm/blob/master/docs/manual/autosetup.md
                                            #ref: https://rpm-software-management.github.io/rpm/manual/autosetup.html
                                        -p: patch コマンドに渡す -p オプション
                                        (%setup と %patch に分解する):  #// %autosetup より細かく制御ができます
                                            (%autosetup のサンプル): |
                                                %autosetup -p 1
                                            (%setup と %patch のサンプル): |
                                                %setup
                                                %patch0 -p1
                                            #search: rpmbuild .spec %setup
                                        トラブルシューティング (%autosetup):
                                            - #// SOURCE0 を展開後、cd コマンドに失敗する
                                                対処: |
                                                    %setup と %patch に分けて %setup の -n オプションを使います
                                    (%patch) マクロ: #keyword: rpmbuild .spec %patch,  %patch0 %patch1 %patch2 %patch3 %patch4
                                        公式: #ref: http://ftp.rpm.org/max-rpm/s1-rpm-inside-macros.html#S2-RPM-INSIDE-PATCH-MACRO
                                        動き: patch コマンドと同じです
                                        (%patch[1-9]): |
                                            %patch1 なら SOURCE1 をパッチとして処理します。%patch なら %patch0 と同じです（未確認）
                                (%build): #// パッケージのビルド手順を記述します。通常、%configure マクロと make コマンドを使用します。
                                (%pre): #// パッケージのインストールが開始される前に実行されるスクリプトを指定します。
                                (%install): #// パッケージのインストール手順を記述します。通常、make install コマンドと DESTDIR を使用します。
                                    サンプル:
                                        rm -rf %{buildroot}
                                        make install DESTDIR=%{buildroot}
                                        echo "@@@@@@@@ Debug 1"    #// rpmbuild コマンドを実行するときなどに表示されます #keyword: rpmbuild .spec debug,  rpmbuild .spec debug print pause
                                        #search: Linux install command
                                    手順 >> 設定ファイルを変更します:
                                        sed コマンドを使う場合: #keyword: rpmbuild .spec sed
                                            #// インストールする ユニット ファイル の ExecStart をカスタマイズします
                                            (%install セクション): |  #search: rpmbuild (%prep)
                                                %{__install} -p -m 644 %{SOURCE3} %{buildroot}%{_unitdir}/%{name}.service

                                                # Support syslog-ng.service file _prefix macro
                                                %{__sed} -i 's|ExecStart=/usr/sbin/syslog-ng|ExecStart=%{_prefix}/sbin/syslog-ng|' %{buildroot}%{_unitdir}/%{name}.service
                                            SOURCE3 マクロ:  #search: rpmbuild .spec Source1
                                                - Source3 に指定された ファイル パス
                                                - 設定セクションの Source3 に ユニット ファイル のパスが指定されていることを前提として、
                                                    上記の sed コマンドは書かれています
                                                - SOURCE3 など _topdir/SOURCES/ にあるファイルは編集しないでください
                                        コピーする場合:  #// RPM ファイル に含まれている既存のファイルの内容をビルド環境のあるファイルに配置します
                                            設定セクション: #keyword: rpmbuild .spec cp |  #search: rpmbuild .spec Source1 
                                                Source1: syslog-ng.conf
                                            (%install) セクション: |  #search: rpmbuild %install
                                                cp -p %{SOURCE1} %{buildroot}/etc/syslog-ng/syslog-ng.conf
                                            (%files) セクション: |  #// インストール先に新しいファイルを作る場合のみ必要です
                                                %{buildroot}/etc/syslog-ng/syslog-ng.conf
                                (%clean): #// ビルドディレクトリをクリーンアップするためのコマンドを指定します。
                                    RPM ファイルのビルドが成功した後に実行されます。
                                    rpmbuild コマンドの --clean オプションが使用されたときに実行されます。
                                    rm -rf %{buildroot}
                                (%post): #// パッケージのインストールが完了した後に実行されるスクリプトを指定します。
                                (%preun): #// パッケージのアンインストールが開始される前に実行されるスクリプトを指定します。
                                    アンインストール自体は RPM のシステムが自動的に行います
                                    if [ $1 -eq 0 ]; then
                                        systemctl stop example.service
                                        systemctl disable example.service
                                    fi
                                (%postun): #// パッケージのアンインストールが完了した後に実行されるスクリプトを指定します。
                                    if [ $1 -eq 0 ]; then
                                        systemctl daemon-reload
                                        systemctl reset-failed
                                    fi
                        ディレクティブ:  #// マクロ定義, 設定条件, フィルター
                            マクロ定義:  #// %global, %define, %undefine
                                (%define): |  #// マクロを定義します
                                    %define use_suse (%{_suse_ver} >= 1315)
                                (%global):  #// グローバル マクロ を定義します
                                    サンプル: |
                                        %global _prefix   /my/local
                                        %global __provides_exclude_from ^/opt/%{name}/.*\\.so.*  #search: .spec provides
                                        %global __requires_exclude libjemalloc.*|libruby.*|/opt/%{name}/.*  #search: .spec requires
                                    仕様:
                                        値の前に空白をいくつ並べても、値としては取り除かれます
                                (%undefine): |  #// マクロを非定義します
                                    %undefine __brp_mangle_shebangs
                            設定条件: #keyword: rpmbuild condition  #// %if, %else, %endif
                                (%if, %else, %endif):
                                    条件マクロのサポートの有無: #keyword: rpmbuild condition macro support
                                        条件マクロは Fedora 以外は（派生 OSも）使えません:
                                            #ref: https://docs.fedoraproject.org/en-US/packaging-guidelines/#_spec_legibility
                                        使えない OS:
                                            - Rocky 8, RPM 4.14.3
                                        条件マクロの代わり:
                                            コメントに置き換えます:
                                                # Deleted geoip by --disable-geoip2
                                            コメントの中に % を含むとエラーになります:
                                                #ref: https://stackoverflow.com/questions/78307960/rpm-spec-how-do-you-suppress-the-error-macro-expanded-in-comment-without-dele
                                        使えない OS での条件マクロの動き:
                                            (%if 0): |  #// %if 0 は %package redis が定義されます。
                                                %if 0
                                                %package redis
                                                %endif
                                            (%if !0%{?enable_autotools}): |  #// %if 0 と同様
                                                %if !0%{?enable_autotools}
                                    条件別の設定: |
                                        %if %{defined with_suse}
                                        BuildRequires:	libopenssl-devel
                                        BuildRequires:	pkg-config
                                        %else
                                        BuildRequires:	pkgconfig
                                        BuildRequires:	openssl-devel
                                        BuildRequires:	nss-softokn-freebl-devel
                                        %endif
                                    条件別のマクロ定義: |
                                        %if %{_centos_ver} <= 6
                                        %define scl_ruby_ver 24
