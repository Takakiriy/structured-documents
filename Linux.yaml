                    Uninitialized:  #// --state で表示される状態ではありません
                        - 新しい開発環境で、tasks.sh を含むプロジェクトを git clone した後
                        - --initialize で Initialized 状態にできる。--initialize と --start を同時に指定したら Active 状態にできる
                        - --state の出力は不明
                    Initialized:  #// --state で表示される状態ではありません
                        - --state の出力は Inactive
                        - ストレージのデータはサービス稼働開始時の内容。ただし、ストレージのサービスなら、データは存在しない
                        - その他は Inactive 状態と同じ
                    Inactive:
                        - --state の出力は Inactive
                        - ストレージのデータは稼働中のもの、または Initialized 状態と同じ
                        - --start で Active 状態にできる
                        - systemd なら、プロセスは起動していない
                        - Docker なら、コンテナーは削除済み
                        - 関連するリソースはロックされていない
                    Active:
                        - --state の出力は Active
                        - サービスは稼働している
                        - プロセスは起動している
                    Locked:
                        - デバッガーなど tasks.sh --start 以外でサービスが起動している
                        - Locked の場合、サブコマンド initialize, start, stop, restart を呼び出しません
                    Done:  #// 成功終了
                        - --state の出力は Done
                        - ストレージのサービスなら、ストレージのデータをサービス稼働時の内容にした後
                        - プロセスは起動していない
                        - コンテナーが残っている。Docker の Exited (0) 状態に相当
                        - Done 状態から再起動する場合は --stop してから --start します
                    Undefined:  #// 不明またはエラー
                        - --state の出力は Undefined
                        - tasks.sh のサブコマンドがサポートしていない状態
                        - tasks.sh が内部で呼び出すコマンドをユーザーが実行して対処します
                        - --stop や --initialize で対処できる可能性はあるがサポート対象外
                --delegate-to-root: #keyword: tasks.sh --delegate-to-root  #// サービスの起動などのユーティリティな処理を実行します
