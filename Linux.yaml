                        Kafka と Zookeeper のリーダーとフォロワー: #keyword: Kafka ZooKeeper leader follower
                            Kafka のリーダーとフォロワー:
                                各パーティションに対してリーダーが存在し、パーティションごとにリーダーとフォロワーが異なる。
                                Kafka のリーダーはそのパーティションへのすべてのクライアントリクエストを処理し、フォロワーはデータをリーダーからレプリケートする。
                            ZooKeeper のリーダーとフォロワー:
                                ZooKeeper クラスター全体で1つのリーダーのみ。
                                リーダーは書き込みを処理し、フォロワーはリーダーからレプリケートされたデータを持ち、リーダー選出の候補にもなります。
                                ZooKeeper は Kafka クラスターのメタデータの管理やブローカーの監視、リーダー選出のために使用されます（Kafka の新しいバージョンでは ZooKeeper 依存がなくなる方向にあります）。
                        選出:  #// リーダーを選出しなおします
                            (@Kafka server)
                            kafka-leader-election.sh --bootstrap-server localhost:9092 --election-type preferred  --all-topic-partitions
