                    - #// fluent.conf ファイルをデバッグする  #search: debug fluent.conf
                    - #// タグ名の末尾に .user.notice が付いてしまう: #keyword: fluentd .user.notice tag
                        対処:
                            fluent.conf: |  #search: fluentd Ruby placeholder_values
                                ${tag_prefix[1]}
                        参考:
                            tag_prefix のサンプル: ["slog", "slog.eventlog", "slog.eventlog.user", "slog.eventlog.user.notice"]
                            tag_parts のサンプル: ["slog", "eventlog", "user", "notice"]
                        原因:
                            type syslog の場合、自動的にプライオリティなどをタグ名の末尾に付けてしまいます。
                            標準的らしい。
