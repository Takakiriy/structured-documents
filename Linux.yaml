                        Defaults        timestamp_timeout=30
                        #search: visudo  #ref: https://unix.stackexchange.com/questions/382060/change-default-sudo-password-timeout
                    sudo -v: #keyword:  #// タイムアウトのタイマーをリセットします。今から timestamp_timeout 分 後にパスワードが要求されます
                        alias sudo='sudo -v; sudo '.
                        #ref: https://wiki.archlinux.jp/index.php/Sudo
