        cron, crontab:  #keyword: cron,  Linux 定期実行 スケジュール  #// 定期的にスクリプトを自動実行します。クロンタブ。読みは様々 クーロン、クロン、クローン
            概要: cron は、指定した日時になると、ジョブ（スクリプト）を自動実行するデーモン・プロセスです。
                デフォルトでは、すべてのアカウントが使うことができますが、制限することもできます。
            編集します:
                起動コマンド: crontab -e   #// 現在のユーザーの cron 設定ファイルを編集します /var/spool/cron/$USER
                    #// /var/spool/cron/$USER に設定されたタスクは、$USER のアカウントを使って、実行します。
                設定ファイルの書式 /var/spool/cron/$USER :  #keyword: cron 式
                    5つの場合:  #// 分  時  日  月  曜日
                        #// 分  時  日  月  曜日  左の時刻に実行するコマンド
                        - |
                            0 5 * * 1  $HOME/cron_task.sh  #// 毎週月曜の 5:00
                        #// 分  時  日  月  曜日
                        - |
                            0 8 * * *  #// 毎朝 8:00。毎日起動する場合でも、日,月,曜日 は省略できません
                        - |
                            * * * * *  #// 毎分
                    6つの場合:  #// 秒 分  時  日  月  曜日
                        #search: 6 cron
                注意:
                    テストの際には、少なくとも2分以上先の時刻を実行時刻として指定する必要があります
                秒  分  時  日  月  曜日:
                    - 分は、0～59
                    - 時は、0～23 または *、 *=毎時
                    - 日は、1～31 または *、 *=曜日によって決めるか、毎日
                    - 月は、1～12 または jan ～ dec または *、 *=曜日によって決めるか、毎月
                    - 曜日は、0=日、1=月、2=火、3=水、4=木、5=金、6=土、7=日、または *
                複数指定:  #// それぞれの単位（分、時など）には、下記のように複数を指定できます
                    - 0,15   #// 0 と 15 の両方
                    - 1-5    #// 1,2,3,4,5
                    - 1-5/2  #// 1,3,5。1～5 分の間を 2分間隔で（2 は割る数ではなく足す数）
                    - 0/33   #// 0,33。毎時 0 分から 33分間隔で
                    - _ */33 #// */33: 0,33,66,...。33分間隔  (開始は？)
                        #ref: https://localcoder.org/cron-expression-to-run-every-n-minutes
                その他:
                    - "* * * * *"  #// 毎分
                    - "* * * * * *"  #// 毎秒
            設定を表示します:
                sudo less  /var/spool/cron/__User__
            ログ:
                /var/log/cron または /var/log/cron.log（Red Hat系）
                /var/log/syslog（Debian/Ubuntu系）
                journalctl -u cron（systemd環境）                
            Go 言語の cron:
                公式: #ref: https://github.com/robfig/cron
                サンプル コード: schedule, err := cron.Parse("* * * * *")
                6つ指定すると 秒  分  時  日  月  曜日 になります: |  #keyword: 6 cron
                    * * * * * *  #// 毎秒
            参考:
                - Wikipedia  https://ja.wikipedia.org/wiki/Crontab
                - cron の設定ガイド  http://www.express.nec.co.jp/linux/distributions/knowledge/system/crond.html
                #ref: ${programming}/OS/UNIX-Linux/!Linux.svg#cron
