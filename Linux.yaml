    ポート:  #keyword: Linux port,  port,  Linux network port num
        ポートの状態を表示します:  #// ポートが開いていることを確認します
            ss を使う場合:       #search: Linux ss  #// CentOS7  #// PID も表示します
                #snip:  sudo ss -tulnp
            netstat を使う場合:  #search: Linux netstat  #// プログラムも表示します。インストールすれば使えます
