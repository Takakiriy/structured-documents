                            #// Set default values using Bash parameter expansion.
                            #// ${__Variable__-"__Default__"} returns __Default__, if __Variable__ is not defined.
                            if [ "${__Variable__}" == "" ]; then  __Variable__=__DefaultValue__  ;fi
