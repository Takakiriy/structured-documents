                （初回のみ）インストールします:
                    sudo yum -y install telnet
                接続してみます:  #// 127.0.0.1 はすべてのホストで共通のローカルの IP アドレス
                    #// どんなサービスのポートでも使えます
                    注意: 必要なら ミラー サーバー も確認してください
                    開いているときの動き:  #// 下記 3001 はポート番号
                        $ telnet 127.0.0.1 3001
                        Trying 127.0.0.1...
                        Connected to 127.0.0.1.
                        Escape character is '^]'.
                        ^C        #// Ctrl + C と Enter キーで終了します（Enter キーが不要な場合もあります）
                        #// Ctrl + C が効かないときは Ctrl + ] と telnet> quit
                        #// または  #search: kill telnet
                    ポートは開いているがサービスが起動していないときの動き: |  #// 下記 3990 はポート番号
                        $ telnet 127.0.0.1 3990
                        Trying 127.0.0.1...
                        telnet: connect to address 127.0.0.1: Connection refused
                    ポートが開いていないときの動き: |  #// 下記 3990 はポート番号。ポートが開いていないのは、サーバー側のファイアウォールの設定
                            $ telnet 127.0.0.1 3990
                            Trying 127.0.0.1...
                            （2分後）
                            telnet: connect to address 127.0.0.1: Connection timed out
                        #search: Systemd IP Accounting
                        #search: 疎通確認 trouble
                    開いてから Ctrl + C が効かないとき: #keyword: kill telnet
                        別の端末からログインします:
                        telnet の PID を表示します:
                            ps aux | grep telnet 
                        telnet のプロセスを強制終了します:
