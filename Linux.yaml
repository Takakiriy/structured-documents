    jobs: #// ジョブ（として扱われているプロセス）を一覧します
        ジョブ:
            ジョブは、シェルを起動したプロセスから起動した子プロセスです。
            jobs コマンドで表示されるジョブは、job コマンドを実行したシェルから起動したプロセスだけです。
        サンプル:  #keyword: Linux jobs example
            新しい端末: |
                $ jobs
                $ sleep 100010 &
                [1] 11783
                $ sleep 100022 &
                [2] 11807
                $ jobs
                [1]-  実行中               sleep 100010 &
                [2]+  実行中               sleep 100022 &
                $ fg 2
                sleep 100022
                ^Z
                [2]+  停止                  sleep 100022
                $ jobs
                [1]-  実行中               sleep 100010 &
                [2]+  停止                  sleep 100022
                $ bg 2
                [2]+ sleep 100022 &
                $ jobs
                [1]-  実行中               sleep 100010 &
                [2]+  実行中               sleep 100022 &
                $ jobs -l
                [1]- 11783 実行中               sleep 100010 &
                [2]+ 11807 実行中               sleep 100022 &
                $ kill -9 %1
                [1]-  強制終了            sleep 100010
                $ jobs -l
                [2]+ 11807 実行中               sleep 100022 &
        コマンド:
            一覧:
                - jobs  #// ジョブを一覧します
                - jobs -l  #// ジョブとプロセスIDを一覧します
            起動: __Command__ &  #search: linux ampersand
            直前に起動したジョブの情報:
                PID: $!
                ジョブ番号: （取得方法はありません）
            中断:  #search: Linux kill
        フォアグラウンド ジョブ: #keyword:
            ターミナルに表示されているプロセス
        バックグラウンド ジョブ: #keyword:
            (&) で起動したプロセス
        カレント ジョブ: #keyword:  #// 最近でバックグラウンドで起動されたジョブか、最後に停止したフォアグラウンドジョブ
            概要:
                最近でバックグラウンドで起動されたジョブか、最後に停止したフォアグラウンドジョブ
                jobs コマンドでは + で表示されます。
                fg, bg コマンドでジョブの番号を省略したときは、カレント ジョブ が対象になります。
            サンプル: |  #focus: +
                $ jobs
                [1]-  実行中               sleep 100010 &
                [2]+  実行中               sleep 100022 &
        関連:
            ジョブを強制終了します: #search: kill
    fg: #// バックグラウンドのジョブをフォアグランドに移動します
        サンプル: #search: Linux jobs example
    bg: #// 停止中のジョブを再開します
        サンプル: #search: Linux jobs example
    (Ctrl + Z): #keyword: bash 一時停止  #// フォアグランド ジョブ をバックグラウンドに移動して、停止します
        サンプル: #search: Linux jobs example
