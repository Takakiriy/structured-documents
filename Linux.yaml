    diff:  #keyword: Linux diff,  diff
        比較します: #🌟
            ファイルを比較します:
                - diff  __PathA__  __PathB__ > /dev/null  &&  echo  "same"
                - diff  __PathA__  __PathB__ > /dev/null  ||  Error  "ERROR:_different"
                #// && や || だけでは意味が分かりにくいので echo の内容や Error（という名前の）関数を使うことで分かるようにします
            フォルダーを比較します: #keyword: Linux diff folder
                ファイル名一覧:  #// フォルダーの中を調べて、違いがあるファイル名を一覧します
                    標準コマンドの場合:
                        コマンド: |
                            $ diff -rq  "__LeftFolderPath__"  "__RightFolderPath__"
                                Files __LeftFolderPath__/__RelativeFilePath__ and __RightFolderPath__/__RelativeFilePath__ differ
                                Only in __LeftOrRightFolderPath__/__RelativeFolderPath__: __FileName__
                        注意: Only in はフォルダーの可能性があります
                    diff-files, 独自コマンドの場合: #keyword: diff-files  #// 出力がシンプルに相対パスだけになります
                        コマンド:
                            $ diff-files  "__LeftFolderPath__"  "__RightFolderPath__"
                                __RelativeFilePath__
                                __RelativeFilePath__
                        注意: __RelativeFilePath__ はフォルダーの可能性があります
                        コード: | #keyword: bashlib GetDiffFilePaths
                            #!/bin/bash

                            function  Help() {
                                echo  "diff-files"
                                echo  "Compare folders and show relative paths of different files."
                                echo  '    diff-files  "__FolderPathA__"  "__FolderPathB__"'
                            }

                            function  Main() {
                                GetDiffFilePaths  "$@"
                            }

                            function  GetDiffFilePaths() {
                                local  folderPathA="$1"
                                local  folderPathB="$2"

                                diff -rq  "${folderPathA}"  "${folderPathB}"  |  DiffFilesFilter  "${folderPathA}"  "${folderPathB}"
                            }

                            function  DiffFilesFilter() {
                                local  standardOutput="$( cat )"  #// function stdin
                                local  folderPathA="$1"
                                local  folderPathB="$2"

                                local  simpleOutput="$( echo  "${standardOutput}"  |  sed -E  's|^Files (.+) and .+ differ$|\1|' )"
                                local  simpleOutput="$( echo  "${simpleOutput}"    |  sed -E  's|Only in (.+): (.+)|\1/\2|' )"
                                local  simpleOutput="$( echo  "${simpleOutput}"    |  sed -E  "s|^${folderPathA}/||" )"
                                local  simpleOutput="$( echo  "${simpleOutput}"    |  sed -E  "s|^${folderPathB}/||" )"

                                echo  "${simpleOutput}"
                            }

                            Main  "$@"
                その他:  #search: VSCode diff compare folders
            コマンドの出力を比較します: #keyword: Linux diff command output  #// コマンドの標準出力の内容を比較します
                diff  <(__Command1__)  <(__Command2__) > /dev/null  &&  echo  "same"
                #search: <( )
            変数を比較します:  #search: Linux diff command output  #// 変数を比較するときは echo コマンドを使います
            バイナリ 比較: #keyword: binary diff,  バイナリ ファイル 比較
                cmp, シンプル:  #search: Linux cmp
                    cmp file1.bin file2.bin
