                ユーザー指定:  #// ユーザーを指定してコマンドを実行します
                    基本:
                        sudo --user user1  printenv  #template__: sudo --user __User__  __Command__
                    通常:
                        sudo su -
                        cd ____
                        sudo --user __User__  __Command__
                    グループに所属させる:  #// 毎回ユーザーを指定しなくても済みます（所有グループなら）
                        #search: usermod -aG
                    #search: bash variables in command
                ファイルを作ります:  #search: sudo tee  #// root ユーザーだけがアクセスできる場所にファイルを作ります
                リダイレクト: #search: sudo tee  #// 標準出力のリダイレクト先が root ユーザーのみがアクセスできるとき
                パスワード入力不要に:  #// sudo 実行時にパスワードの入力を不要にします  #search: sudo no password
