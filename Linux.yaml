                        auto.create.topics.enable, KAFKA_AUTO_CREATE_TOPICS_ENABLE: true, false  #search: Kafka server.properties replication factor
                        default.replication.factor, KAFKA_DEFAULT_REPLICATION_FACTOR: 1, 3, ...  #search: Kafka server.properties replication factor
                        KAFKA_ADVERTISED_HOST_NAME:
                            概要: Kafkaブローカーが自身のアドレスをクライアントに通知するために使用するホスト名
                            Docker ホストまたは Docker コンテナ―から接続できない:
                                原因: |  #keyword: Kafka advertised listeners
                                    - 初期接続時は bootstrap_servers='localhost:9092' で正しく接続できます
                                    - しかし、Kafka ブローカーは KAFKA_ADVERTISED_HOST_NAME: kafka の設定により、
                                        クライアントに「私のアドレス（advertised listeners）は kafka:9092 です」と通知します
                                    - Python クライアントは次の通信から kafka:9092 に接続しようとしますが、
                                        ホストマシンからは kafka というホスト名を解決できないためタイムアウトします
                                    - KAFKA_ADVERTISED_HOST_NAME は単一のリスナーのとき（KAFKA_ADVERTISED_LISTENERS が設定されていないとき）だけ使えます
                                対処:  #// 複数のリスナーを受け付けられる詳細設定  #focus: INSIDE,  OUTSIDE
                                    環境変数: |  #glossary:
                                        KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:19092,OUTSIDE://localhost:9092
                                        KAFKA_LISTENERS: INSIDE://0.0.0.0:19092,OUTSIDE://0.0.0.0:9092
                                        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
                                        KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
                                    ポート番号を分けるメリット:
                                        - Kafka の起動が失敗しません
                                        - INSIDE:PLAINTEXT,OUTSIDE:SSL といった設定ができます
                                        - 内部/外部トラフィックの独立した監視が可能
                                補足:
                                    KAFKA_ADVERTISED_LISTENERS:  #focus: 9093  #// 複数のリスナーを設置することで、ホスト名の違いに対応できます
                                        設定A: |  #// kafka は Docker ネットワーク内のホスト名, localhost は Docker ホスト のネットワークのホスト名です
                                            KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9092
                                            KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:9092
                                        設定B: |
                                            KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9092
                                            KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093
                                        _: のように同じポート番号は使うと起動に失敗します。
                                    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:  #keyword:
                                        単一リスナー → デフォルト設定で PLAINTEXT が設定されます
                                        複数リスナー → 明示的な設定が必要
                                        INSIDE:PLAINTEXT,OUTSIDE:SSL といった設定ができます
