                                        Sat 2023-10-11 01:00:00 JST  8h left  Fri 2023-10-10 01:00:00 JST  15h ago  __ServiceName__.timer  __ServiceName__.service
                                        Sat 2023-10-11 01:02:00 JST  8h left  Fri 2023-10-10 01:02:00 JST  15h ago  __OtherServiceName__.timer  __OtherServiceName__.service
                                        ...
                                無効も含めたすべての タイマー ユニット:
                                    $ systemctl list-unit-files --type=timer
                                        ssdwatch.timer               enabled 
                                        systemd-tmpfiles-clean.timer static  
                                        unbound-anchor.timer         disabled
