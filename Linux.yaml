                        対処A:  #// 常に起きる場合
                            buffer に チャンク キー を設定します  #search: fluentd buffer chunk key
                    - #// Use 'topic' field of event record for topic but no fallback. Recommend to set default_topic or set 'tag' in buffer chunk keys like <buffer topic,tag>
                        手順: fluentd 起動
                        ログ: |
                            [warn]: #0 fluent/log.rb:383:warn: Use 'topic' field of event record for topic but no fallback. Recommend to set default_topic or set 'tag' in buffer chunk keys like <buffer topic,tag>
                        対処:
                            fluent.conf の <buffer> を <buffer topic,tag> に変えます
