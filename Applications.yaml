正規表現: #keyword: regular expression application  #ref: https://regex101.com/
    Snap Note: #ref: ${programming}/検索技術、DB/正規表現.svg#regex
    文字の種類:
        #// bash では使えません
        \s: 空白文字（タブ文字など）
        \d: 数字、0～9 のいずれか１文字
        \w: 英数字、アンダースコア
    .* を短くマッチさせる:
        記号: .*?   #keyword: .*?
        注意: いくつかの環境で使えません（下記互換性を参照）
        互換性:
            使える: Perl, Node.js, Ansible replace module, CentOS7 grep -P
            使えない: CentOS7 grep,  Ubuntu sed
            代用: |  #// .*? が使えないときの代わりの方法
                [^,]*   #// 区切り文字（左記の場合コンマ）以外を指定します
        サンプル:
            .*? :
                $ echo  "1a2 1b2"  |  grep  -oP '1.*?2'
                1a2
                1b2
            .* :
                $ echo  "1a2 1b2"  |  grep  -oP '1.*2'
                1a2 1b2
        参考: #ref: https://unix.stackexchange.com/questions/441927/how-or-why-using-is-better-than
    グループ名: #keyword: regular expression group name
        Python: (?P<group_x>[a-zA-Z]+)  #search: Python regular expression group name
        JavaScript: (?<groupX>[a-zA-Z]+)  #search: JavaScript regular expression group name
    試すサイト:
        regular expressions 101: #ref: https://regex101.com/
            基本操作を試します:
                操作:
                    URL: https://regex101.com/
                    REGULAR EXPRESSION（上）: cd
                    TEST STRING（中）: abcde
                補足:
                    マッチした部分:
                        TEST STRING（中）の cd の部分の背景色が変わり、マッチした部分が分かります
                    正規表現の説明:
                        REGULAR EXPRESSION（上）の記号にマウスを合わせると、説明がポップアップ表示されます
                    ( ) にマッチした部分:
                        MATCH INFORMATION（右）に一覧されます。
                        Match __Num__ をクリックすると TEST STRING（中）の該当部分が強調表示されます
