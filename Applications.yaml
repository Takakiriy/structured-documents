                Text タブ: 16pt（右上）>> Font Color >> 白
                Style タブ: Fill の色 >>（下から4行目の色がおすすめ）>>
                    Line の色 >>（同じ色合いの下から2行目がおすすめ）
                フォント:
                    メニュー: Text タブ >> Font（の下）>> Custom...
                    System Fonts: （日本語で入力できます） #search: Windows font
            人: General（左）>>（人型）
            雲: General（左）>>（雲型）
            線（接続）:
                メニュー: 図形にマウスを合わせる >> 矢印（四方）の上からドラッグ >>
                Style タブ: 色（Line の中の右上）>> 黒（右上）>> 2pt（Line の中の右上）
            枠: General（左）>> Rounded Rectangle（2番目）>> Fill（をオフ：右）>>
                Line = - - - - （点線：Line の中の左上）>> 3pt（Line の中の右上）>>
                色（Line の中の右上）>> 2行目の色
            背景:  #search: draw.io background
        図形の編集:  #// ここは編集開始のみ。属性の設定は「追加」の項目を参照
            文字: 文字を含む図形をダブルクリック
            スクロール: 右ドラッグ
            最前: Arrange タブ（右上）>> To Front
            スタイルのコピー: Style タブ（右上）>> Copy Style（右下）>> Paste Style
            折れ線: Style タブ（右上）>> ／（Line の中の左下）
            拡大縮小:  #search: draw.io resize
        奥にある図形の選択:
            Alt + クリック（mac なら option + クリック）を何回か行います
        スタイルのコピー: #keyword: draw.io style
            手順:
                Format ビュー（右）を表示 >> Style タブ >>
                図形を選択 >> Copy Style（右下）>> 図形を選択 >> Paste Style（右下）
            対象:
                テキスト: 文字の色、文字の大きさ、太字
            対象外:
                テキスト: 枠の色、Spacing（枠までのマージン）
                #// 複数選択して、まとめて編集することはできます
            VSCode で書式をコピーしない:  #search: VSCode copyWithSyntaxHighlighting
