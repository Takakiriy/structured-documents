圧縮ファイル(.zip):  #keyword: zip
    パスワード付き Zip ファイルを作ります:
        7-Zip:    #keyword: 7-Zip, 7z,  7zip  #ref: https://7-zip.opensource.jp/
            インストール:
                mac:
                    7z2501-mac.tar.xz をダウンロードしてダブルクリック
                    #search: mac 7zz encrypt
                    #search: mac 7zz decrypt
            圧縮するフォルダーを作ります:
            パスワードを生成します:
            Zip ファイルを作ります:
                メニュー: フォルダー（を右クリック）>> 7-Zip >> 圧縮
                アーカイブ形式: zip
                パスワード: 1_UgFiW9
                OK ボタン:
            コマンド: #keyword: 7-Zip command
                圧縮:
                    #// Windows Git bash の場合
                    #// 7-Zip をインストールしてからコマンドが使えます
                    書式: |  #// a コマンドは追加です。.7z ファイルの中にある既存のファイルは .7z の中に残りつつ、.7z ファイルの中に追加されます
                        "C:\Program Files\7-Zip\7z.exe" a  "__New7zFilePath__"  "__SourceFileOrFolderPath__"
                    サンプル: |  #focus: SevenZipExe
                        SevenZipExe="/c/Program Files/7-Zip/7z.exe"
                        FolderPath="/c/Users/user1/BigFolder"
                        "${SevenZipExe}" a  "${FolderPath}.7z"  "${FolderPath}"
                    直下の全フォルダーを圧縮します: |
                        SevenZipExe="/c/Program Files/7-Zip/7z.exe"
                        ParentPath="/c/Users/user1/BigFolders"
                        ls -d *  |  sed 's|/$||'  |  xargs -i  "${SevenZipExe}" a  "${ParentPath}/{}.7z"  "${ParentPath}/{}"
                    圧縮して暗号化します (mac): | #keyword: mac 7zz encrypt  #// 末尾に .7z が付いたファイルができます
                        read  "?Unzipped path (quotations are ignored): " UnzippedPath  &&  \
                        UnzippedPath="$(echo "${UnzippedPath}" | sed "s/^'//" | sed "s/'$//" )"  &&  \
                        read -s  "?Enter password: " PASSWORD  &&  \
                        '/Users/user1/Downloads/7z-mac/7zz'  a  "-p${PASSWORD}"  "${UnzippedPath}.7z"  "${UnzippedPath}";  \
                        unset  PASSWORD
                展開:
                    展開: |
                            "C:\Program Files\7-Zip\7z.exe" x  "__7zFilePath__"  -o"__OutputFolderPath__"
                        #// __OutputFolderPath__ に指定したフォルダーが存在しなくても、作られます
                        #// -o の右に空白を入れることはできません
                        #// .7z ファイルを Windows で開いたときにフォルダーが 1つだけ見えたときは、そのフォルダーが作られます
                    復号化して解凍します (mac): | #keyword: mac 7zz decrypt  #// mac でダブルクリックしてパスワードを入力しても解凍できません。 末尾に .out が付いたフォルダーができます
                        read  "?Zipped path (quotations are ignored): " ZippedPath  &&  \
                        ZippedPath="$(echo "${ZippedPath}" | sed "s/^'//" | sed "s/'$//" )"  &&  \
                        read -s "?Enter password: " PASSWORD  &&  \
                        '/Users/user1/Downloads/7z-mac/7zz'  e  "-p${PASSWORD}"  "${ZippedPath}"  -o"${ZippedPath}.out";  \
                        unset  PASSWORD
                情報表示:
                    いろいろ: |
                        "C:\Program Files\7-Zip\7z.exe" l  "__7zFilePath__"  "__RelativePathIn7z__"

                        7-Zip 19.00 (x64) : Copyright (c) 1999-2018 Igor Pavlov : 2019-02-21

                        Scanning the drive for archives:
                        1 file, 2399538374 bytes (2289 MiB)

                        Listing archive: __7zFilePath__

                        --
                        Path = __7zFilePath__
                        Type = 7z
                        Physical Size = 2399151574
                        Headers Size = 154
                        Method = LZMA2:24
                        Solid = -
                        Blocks = 1

                        Date      Time    Attr         Size   Compressed  Name
                        ------------------- ----- ------------ ------------  ------------------------
                        2024-10-15 18:05:03 ....A   8245340160   2399538220  __RelativePathIn7z__
                        ------------------- ----- ------------ ------------  ------------------------
                        2024-10-15 18:05:03         8245340160   2399538220  1 files
                    展開後のファイルサイズ: #keyword: 7-Zip file size
                        #search: GetFileSizeIn7z
