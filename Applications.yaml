discord: #keyword:
    ログイン: #ref: https://discord.com
    リンク: #search: discord link
    手順:
        検索:
            フリーワード: 右上
            チャンネル名: (mac) command + k
        投稿: #keyword: discord post  #// メッセージを投稿します
            改行: Shift + Enter
            プレビューなしリンク: http を ttp に変えます
            タイトル: 『』付きで投稿
            連投: 連投すると空行が入らなく投稿の区切りが分からなくなるので注意
            文字修飾: |
                **太字**, __下線__, ~~取り消し線~~
                `コード`,
                ```__Language__
                コードブロック1行目
                コードブロック2行目
                ```
            画像付き投稿:  #keyword: discord post image
                文字列を入力します:
                画像を添付します:
                    #// 以下のいずれか。ただし、スレッド内ではドラッグ＆ドロップだけできます
                    - (+) ボタン（をダブルクリック：左） >> 画像ファイルを選択（複数可能）>> アップロード ボタン（右下）
                    - ファイルを投稿文字列にドラッグ＆ドロップ
                    #// 編集中は文字列の上に画像が表示されますが、投稿したら文字列の下に画像が表示されます
                投稿します:
                    （文字列の部分をクリック）>> Enter キー
        文字のコピー:
            リンク文字: リンクの右の文字からドラッグ開始、リンク文字の先頭でドラッグ終了、Cttl + C
        複数画像のダウンロード:
            Chrome 拡張 >> Image Downloader
    機能:
        通知: #keyword: discord notification
            ブラウザー版 >> 全体: #// ブラウザー版の初期設定はオフです
                ユーザー設定（PC:左下にあるアカウントの右の歯車, スマホ:アカウント：右下）>>
                （アプリの設定 グループの）通知 >> デスクトップ通知を有効にする
            サーバー・チャンネル単位:
                メニュー: （サーバー・チャンネルのボタンを右クリック：左上）>> 通知設定 >>（通知する種類）
                通知しない: 通知しない設定をした直後は、既存の通知が残るようです
            一時的に通知をオフにします:
                (PC)（サーバー・チャンネルのボタンを右クリック：左上）>> サーバー・チャンネルを通知オフ >>（時間）
                (スマホ) …（サーバー名の右）>> 通知（中央）>>（サーバー名）を通知オフ >>（時間）
                (スマホ)（チャンネル名を長押し）>> （チャンネル名）を通知オフ >>（時間）
            参考: #ref: https://1-notes.com/discord-settings-to-the-desktop/
    概念:
        サーバー: #// 左上に一覧されるアイコン  #ref: ${my_images}/2022/discord.jpg?name=server&x=39&y=123
            招待を受ける:
                招待メールの該当箇所をタップします
            閲覧:
                左上に一覧されるアイコンをタップします
            新規作成:
                左上に一覧されるアイコンの下の方にある＋ボタン >> オリジナルの作成 >> 自分と友達のため >>
                （サーバー名を入力）>> 新規作成（右下）>>
                初めてのメッセージを送ってみる
        チャンネル: #// ＃から始まる  #ref: ${my_images}/2022/discord.jpg?name=channel&x=199&y=139
            チャンネル名をコピーします:
                discord アプリ（mac）>> 歯車アイコン（チャンネル一覧の中のチャンネル名の右。管理者が非表示にしていたらコピーできない）>>
                チャンネル名（をドラッグして Ctrl + C）
            検索 >> チャンネル名で絞り込みます: #keyword: discord search in:
                discord（ブラウザー版）>> 検索ボックス（右上）>> "in:"（と入力）>> チャンネル名の一部を入力 >>
                （表示されたチャンネルをクリック）
            検索 >> 日付で絞り込みます: #keyword: discord search after: before:
                - discord（ブラウザー版）>> 検索ボックス（右上）>> "after:"（と入力）>>（検索する前の日）
                - discord（ブラウザー版）>> 検索ボックス（右上）>> "before:"（と入力）>>（検索する次の日）
                - 古（古い順）
                #// 例： 2022-05-02 の場合、after: 2022-05-01 before: 2022-05-03
            作成:  #// チャンネルを作ります
                メニュー: ＋（チャンネルのグループの右）
                チャンネル名: _____
                （必要なら各種オプションを選択）:
                新規作成 ボタン（右上）:
        メッセージ: #// 投稿内容
            投稿: #search: discord post
            メニューを表示します: （メッセージの）…
                (PC) メッセージに マウス カーソル を合わせるとメッセージの右端に … が表示されます
                (スマホ) メッセージを長押しします
        リンク: #keyword: discord link
            ＃__Channel__: #// チャンネルへのリンク
                入力: |
                    # を押すと一覧されます。続いて入力した文字を含むチャンネルだけ一覧されます
                リンク先:
                    リンク先のチャンネルの前回見ていた場所。ユーザーごとに異なります
            ＠__User__: #keyword: discord user mention  #// ユーザーへのリンク, メンション
                入力: |
                    # を押すと一覧されます。続いて入力した文字を含むユーザーだけ一覧されます
                メンション付きメッセージを投稿したとき:
                    メンションした相手に通知が行きます
            ＠__Role__: #keyword: discord role mention  #// ロールへのリンク, メンション
                入力書式: <@&__RoleID__>
                サンプル: |
                    @everyone
            メッセージへのリンク:
                リンク先のメッセージの URL をクリップボードにコピーします:
                    （メッセージの）…
        メンション: #keyword: discord mention  #// ＠__User__ で表示され、その相手に通知が行きます
            ユーザー: #search: discord user mention
            ロール: #search: discord role mention
        ピン留め: #keyword: discord pin  #// チャンネル内で特定の1つ以上のメッセージを一覧表示できるようになります
            一覧: #// ピン留めされたメッセージを一覧します
                ピン ボタン（上） #ref: ${my_images}/2022/discord.jpg?name=channel&x=1086&y=47
            ピン留めします: #// 一覧に表示させます。チャンネルを見ることができるすべてのユーザーが一覧を見ることができます。
                （ピン留めするメッセージの）… >> メッセージをピン留め
                #// 「__User__ がメッセージをチャンネルにピン留めしました。」というメッセージが自動的に投稿されます。
            外します: #// 一覧に表示しないようにします
                （ピン留めを外すメッセージの）… >> メッセージのピン留めを解除
                #// ピン留めを外しましたというようなメッセージは投稿されません。
            メッセージがピン留めされているかどうか確認します:
                （メッセージの）… >>（ピン留めに関するメニュー項目の表示内容から判断します）
        スレッド: #keyword: discord thread  #// メッセージから枝分かれしたメッセージ列
            表示:
                メッセージに付いた枝: #ref: ${my_images}/2022/discord_thread.png?name=thread&x=915&y=280
                スレッドの一覧: #ref: ${my_images}/2022/discord_thread.png?name=thread_list&x=674&y=39
                参加中のスレッド: 左ペインのツリー表示  #ref: ${my_images}/2022/discord_thread.png?name=joined_thread&x=144&y=439
            作成: （枝分かれを始めるメッセージの）… >> スレッドを作成
            参加: …（右ペインの上）>> スレッドに参加
            退出: …（右ペインの上）>> スレッドを退出
