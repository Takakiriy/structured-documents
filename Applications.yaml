フォルダーを比較する - node_modules フォルダーを除いた2つのフォルダーを WinMerge で比較する:
    設定: #settings:
        __FolderA_Path__: ${HOME}/Desktop/project-master
        __FolderB_Path__: ${HOME}/Desktop/project-develop
        __FolderA_Name__: project-master
        __FolderB_Name__: project-develop
        __NewDiffPath__:  ${HOME}/Desktop/_diff
        __ExcludeFolderName__: node_modules
    Git bash:
        下記は一度に実行できます: |
            rm -rf  "${HOME}/Desktop/_diff"  #template: "__NewDiffPath__"
            mkdir   "${HOME}/Desktop/_diff"  #template: "__NewDiffPath__"
            pushd   "${HOME}/Desktop/project-master" > /dev/null  #template: "__FolderA_Path__"
            tar cvzf  "${HOME}/Desktop/_diff/_bk-project-master.tar.gz"  --exclude "node_modules"  "."
                #template: tar cvzf  "__NewDiffPath__/_bk-__FolderA_Name__.tar.gz"  --exclude "__ExcludeFolderName__"  "."
            cd  "${HOME}/Desktop/project-develop" > /dev/null  #template: "__FolderB_Path__"
            tar cvzf  "${HOME}/Desktop/_diff/_bk-project-develop.tar.gz"  --exclude "node_modules"  "."
                #template: tar cvzf  "__NewDiffPath__/_bk-__FolderB_Name__.tar.gz"  --exclude "__ExcludeFolderName__"  "."
            cd  "${HOME}/Desktop/_diff"  #template: "__NewDiffPath__"
            mkdir  "project-master"  #template: "__FolderA_Name__"
            tar xvf   "_bk-project-master.tar.gz"  --directory  "project-master"  #template: "_bk-__FolderA_Name__.tar.gz"  --directory  "__FolderA_Name__"
            mkdir  "project-develop"  #template: "__FolderB_Name__"
            tar xvf   "_bk-project-develop.tar.gz"  --directory  "project-develop"  #template: "_bk-__FolderB_Name__.tar.gz"  --directory  "__FolderB_Name__"
            popd  > /dev/null

            pushd  "${HOME}/Desktop/_diff" > /dev/null  #template: "__NewDiffPath__"
            "/c/Program Files/WinMerge/WinMergeU.exe" -r  "project-master"  "project-develop" &  #template: "__FolderA_Name__"  "__FolderB_Name__"
            popd  > /dev/null
BunBackup: #keyword:
    参考:
        - https://forest.watch.impress.co.jp/library/software/bunbackup/
        - #snote: %prog%\BunBackup\BunBackup.svg
    インストールしないで起動:
        exe へのショートカットを作り、.lbk ファイルをショートカットにドラッグ＆ドロップ
        #ref: c:/home/mem_cache/prog/BunBackup/BunBackupS500/BunBackup.exe
    インストール:
        https://forest.watch.impress.co.jp/library/software/bunbackup/ >> ダウンロード >>
            exe ファイルを実行
    サンプル, 手順:
        特定の拡張子だけコピーします:
            メニュー: BunBackup >> 対象の行をダブルクリック >> 詳細（左下）
            対象ファイル（中央）: |
                *.__Extension__
    マージが必要なケース:
        #ref: R:/home/mem_cache/prog/BunBackup/BunBackup.svg#BunBackup_merge_case
    大量のコピーをするケース: #keyword: BunBackup many files
        バックアップ対象をある程度の規模に分けます:
            時系列のフォルダーがあるときは、過去のフォルダーをスキャンしないようにバックアップの設定ファイルを分けます。
            size 16GB disk 24GB 13000ファイルなら正常動作の実績あり
        コピーできることを確認します:
            少しコピーしてから、もう一度最初からバックアップしなおしたときにコピーしたファイルが再びコピーされないこと
        失敗事例:
            - 前回正常な手順で取り外さなかったという警告が出て、
                ディスク全体をバックアップしようとしたときは、
                コピー先にファイルができなかった
    詳細（設定）:
        メニュー: BunBackup >> バックアップの表の１行をダブルクリック >> 詳細
            #// 詳細ウィンドウに表示されるタブは一部しか表示されていません
        タブの表示の切り替え: BunBackup >> 設定 >> 機能表示設定 >> バックアップ設定（左上）
        ミラーリング:
            - バックアップ元にないファイルやフォルダーに対応するバックアップ先のファイルやフォルダーを削除します
        除外フォルダ:
            - 指定したフォルダーの中のファイルやフォルダーがバックアップから除外されます
            - バックアップ先にすでにファイルやフォルダーがあるときは、それらを削除します
            - それらを削除しないようにするには、実行するたびに手動で除外させる必要があります
            - フルパス、または名前でフォルダー指定します
    関連: #search: ファイル転送
