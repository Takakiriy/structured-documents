                        #// ページ（サブ ページ ではない）へのリンクはメンションと見た目が変わるため非推奨
                        #ref: https://www.youtube.com/watch?v=Tx9-99ruedo&t=555s
                ページリンク:
                    注意:
                        - 代わりにメンションを使うことを推奨します #search: Notion mention
                        - サブ ページ へリンクすることはできません #search: Notion sub page
                        - ページリンクでデータベースへのリンクを作るのは禁止（コピーすると複雑になるため）
                            #ref: https://www.youtube.com/watch?v=Tx9-99ruedo&t=220s
                    追加します:
                        追加する場所の上のブロックに マウス カーソル を合わせる >> ＋（左）>> pagelink（と入力）>> ページリンク
                            #ref: https://www.youtube.com/watch?v=Tx9-99ruedo&t=43s
            実体を子に持つリンク:
                サブ ページ: #search: Notion sub page
                データベース: #search: Notion database
                リンクドビュー: #search: Notion linked view  #// データベースの実体を持たない表（実体）
    データベース: #keyword: Notion database  #// 表示上はテーブルやリスト
        データベース:  #// データベースの実体を持つブロック
            新規作成:
                現在のページに追加します:
                    追加する場所の上のブロックに マウス カーソル を合わせる >> ＋（左）>> data（と入力）>> データベース | インライン
                子要素に追加します:
                    追加する場所の上のブロックに マウス カーソル を合わせる >> ＋（左）>> data（と入力）>> データベース | フルページ
        リンクドビュー: #keyword: Notion linked view  #// データベースの実体を持たない表
            新規作成:
                追加する場所の上のブロックに マウス カーソル を合わせる >> ＋（左）>> linked（と入力）>> リンクドビュー
                    #ref: https://www.youtube.com/watch?v=Tx9-99ruedo&t=295s
        共通:  #// データベース（実体）とリンクドビューに共通すること
            ビュー: #// データベースやリンクドビューの表示の種類
                ビューの種類を切り替えます:
                    （現在のビュー名）（ビューの左上）>> ビューを編集 >> レイアウト >>（ビューの種類）
                テーブル ビュー: #keyword: Notion table view
                    （PC）:
                        値を編集します:  #// 値はデータベース内ページのタイトルになります
                            1つのセルをタップ
                        データベース内ページとして編集します:
                            1つのセルの上に マウス カーソル を移動 >> 開く
                    （スマホ）:
                        タップすると必ずデータベース内ページを編集します
                リスト ビュー:
                    タップすると必ずデータベース内ページを編集します
            インライン表示に変える:
                データベースへのリンクに マウス カーソル を合わせる >> ハンドル（左）>> インラインに変換
            リンクに変える:
                テーブルビュー（に マウス カーソル を合わせる）>> ハンドル（左）>> フルページに変換
Outliner:
